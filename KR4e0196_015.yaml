body:
  text: 具茨遺藁明王立道撰論聖王貴以禮讓為國立經所以定分也守志所以明節也表行所以勵俗也核異所以抑詭也經不立則爭分不可得而定矣志不守則爽節不可得而明矣行不表則慕者弛俗不可得而勵矣異不核則巧者飾詭不可得而抑矣然立經者存乎古表行者存乎當時核異者存乎後世而守志以明節固存乎其人焉耳漢韋賢之薨也則國宜授之長子𢎞者也𢎞以國繫家人於是乎矯賢令而屬國於玄成焉玄成之拒而不受也守志明節之人也其友人侍郎章謂聖王貴以禮讓為國宜優養玄成勿枉其志此固表行勵俗之説而君子復何議之有焉蓋在玄成之讓則可學玄成而讓者吾恐其未協於中不由其誠而徒以詭道教天下也則亦安得而無以核其異哉夫傳子之説何始也傳必以嫡以長其法又何以始也古之聖人固有舉天下而授之於素所非望者矣而奚必於子也然猶慮天下後世之不能舜禹則爭端且自我始故不得已而定於與子焉韓子曰傳之人則爭未前定也傳之子則不爭前定也而其法又必以嫡以長長以明其宗嫡以貴其出父也死則子也立子也死則孫也立故微子雖賢不得代紂公儀仲子舍其孫而立衍檀弓之所為免也聖人垂之以為法而天下萬世守之以為經而卒無以易焉於是乎以私愛奪嫡者懼矣覬幸者息矣強有智而欲竊位者釋矣故曰立經所以定分也然法之所制者常也而人之不能盡守者變也故或取舍以愛豫奪以賢貴賤以功廢置以勢顧不在其身則在其身後而嫡庶長幼之分於是乎大亂矣然而俠者圖之貪者取之靜者安之賢者守之而夷齊兄弟至於終身餓死而不受孤竹之封豈非以其情有未安而其志不可奪哉其次則曹之子臧吳之季札是已子臧之言曰聖達節次守節下失節為君非吾節也而札之賢至於使其父兄三致國而卒不受焉此其與夷齊不亦相先後哉嘗觀扶陽侯之病也固以𢎞之被繫而念之矣至其立玄成之命則賢初未之有也此其與夷齊季札受父命於生前者又大不同矣玄成安得而有之且兄以罪廢弟以次立則仁心者其獨忍之哉而世之僭竊窺覬之人又孰不僥幸其兄之廢黜而已代之哉其甚者又孰不設詐以陷其兄於罪而已代之哉蓋玄成之立大抵與子臧同而其拒而不受亦庶幾為能守節者故曰守志所以明節也然吾聞漢之法侯而無後則廢其國所以明彞典重嗣續止盜竊也𢎞既不可立玄成復不欲立則扶陽之國漢其絶之矣然玄成之佯狂而去也固非不知國之當絶也其意固欲知賢之賢不可無後則有賢之子𢎞在或者寬其繫而授之國也不然猶或權其功罪薄其封而不泯其嗣也而何當時之弗諒也自御史以實不病劾奏之而玄成之望又絶矣此章也所以有禮讓為國之云也於乎旌别淑慝表厥宅里彰善疸惡樹之風聲豈聖人者以是為塗飾生民之具哉正以風天下之不能發其慕心而變其汚習也故君好仁而民興仁矣君好讓而民興讓矣尚廉退則志士益修崇名節則君子競進昔人謂朝廷有教化則士人有廉恥士人有亷恥則天下有風俗其機係乎上之所與耳故以玄成之讓而欲一以律令從事正以嗣續之常繩以廢置之法不然則司憲得而劾之又不然則司封者得而絶之使玄成而不度於義不明其節晏然嗣而侯之漢固將遂侯之矣侯之法也而何以勵天下也哉故枉一玄成之志而後世之為玄成者怠矣故曰表行所以勵俗也夫相噓而為風相染而為俗一人倡之百人和之其漸使之然也然人情多詐而挾偽之習行焉故有始佯為之而終不然者其心欲之而外為是以徼譽者知其獲退讓之名而終不失其利而為之者而天下之俗反以是薄矣孟子曰好名之人能讓千乘之國茍非其人簞食豆羮見於色則知以介心於簞食豆羮之時而為是讓國之節以徼名者為不無矣不然則或其氣之所激情之所徇而不免溺於一節之偏要亦未可以為吾道之中也故許由一讓而卞隨務光者出焉申徒狄蹈於河矣徐衍負石而入海矣此非幾於有激而偏者乎故玄成既讓而丁鴻劉愷興焉二子之讓蘇子瞻子由皆嘗論之愚以為玄成之讓有為而讓者也且以弟鴻愷之讓無為而讓者也且以兄有為而讓誠也以弟順也無為而讓偽也以兄逆也吾欲以讓為高而胡為使其弟之義非分之獲也弟而復如我之讓則將無故而頓令絶先人之國而謂孝子忍之乎然則所謂貴禮讓者適所以率天下於偽而已故曰核異所以抑詭也雖然天下之人自一介而上皆將役役焉求之而况於一國之利乎而乃有一朝釋而去之而不置吝色焉者亦難矣其清風高節至今猶足以汗貪人之顔而泚其顙而况於當時乎雖其氣有所激情有所矯而何夫人之不能皆然也漢以下寥寥乎二三人止矣先儒有言求士於三代之上惟恐其好名求士於三代之下惟恐其不好名吁良有見哉一元文明之會君子不取必於適然之運而取必於當然之理故或治或亂一歸之人而天弗與焉夫世之言治亂者莫不曰人事亦莫不曰氣化氣化在天者也人事在人者也在天與在人者相為感遇而治亂生焉其治也氣化之盛也人事之得也而不然者反是若是乎治之不可獨責於人而天實為之也與哉非也氣化其適然者也人事其當然者也是故君子不取必於彼而取必於此不求之天而求之人焉夫古今言天下之治之盛者莫如堯説者謂其當一元文明之會意者天固有以相堯之治而堯亦有以得天之時者乎夫元會之説何始也蓋自康節以數窮天地之始終於是乎皇極經世之書作焉有元以統會有會以統運有運以統世其元起於子究於亥中於午堯之興適於午之會故曰堯得天地之中數此其治之所以為盛而古今以為不可及也夫邵子之數吾不得而知也堯之興果於午之會與否吾亦不得而知也嘗觀諸日矣出於旦昃於夕而獨盛於中天焉嘗觀諸月矣明生於朔魄死於晦而其光獨全於望焉又嘗觀諸嵗之時矣生於春收藏於秋冬而獨長育於夏焉易曰相見乎離離南方之卦萬物皆於是乎相見也堯之時語其德則蕩蕩乎與天同其大而無能名矣語其業則巍巍乎其有成功而煥乎其有文章矣當時雖朝野有所不與知史臣有所不及記其治化之盛蓋亦窮天地而一時者耳其上為黃帝為神農為伏羲又其上為洪荒太古之世而已其下為虞為夏為商為周又其下為漢唐而益無足道矣夫前乎此則未之或至後乎此則無以尚之不猶日之中月之望時之夏而易之所謂離乎是則堯之所以獨得乎氣化之盛而一元文明之會兹其時耳吾則以為天之道逺而難知人之道近而可見六經之論治者其言不可悉舉而未聞有一言諉於氣化者豈非以人事既盡則雖氣化之衰不能使之亂人事既失則雖氣化之盛亦不能使之治耶時乎時乎亦存乎其人焉耳人徒知堯之治古今而一時而未知堯之為君固古今而一人者也善言治者其可求之天哉易曰聖人者先天而天弗違後天而奉天時天且弗違而况於人乎吾是以知文明之會意者天之不能違堯而非堯之必有得乎天也不然則天之會人之事夫亦有不相期而適相遇者耳故有君如堯則雖如周之衰如秦晉及隋之季之亂而文明之會可還天時可復不然則唐虞之治亦且否矣其又如時何哉其又如天何哉當堯之時洪水猶泛濫也民之巢居而穴處者猶未安其所也百穀未播而民之阻飢猶自若也逸居無教而民之逺於禽獸者無幾也使堯而徒默然兀然一無所用心焉以坐待夫天下之治曰吾有得乎天之時矣則吾不知洪水孰治五穀孰播而五教孰敷時雍於變之治又孰為而孰成之也則文明之會固亦自成於天地之間耶故曰運不獨亨時不獨成有舜則一元之會在於虞有禹則一元之會在於夏有湯則一元之會在於商有文武則一元之會在於周天無常人有定也是猶日必有中月必有望歲必有夏何獨至於元而疑之哉使必曰惟堯為得其中則吾恐天地之會不可以常午而後世之治之不如古也亦天為之而已故曰盡人事而後可以言天吾慮夫後之人主惑於氣數之適然而忘其人事之當盡也故不容於不辨識重亟反論曰保天下之治存乎勢制天下之勢存乎變察天下之變存乎幾幾者動之微而變之會勢之所以為輕重而天下之所以為治亂者也不知其幾無以通變不知其變無以制勢勢不制則其趨也莫之或禦而天下之事將遂至於不可為其原始於不知其幾而已故先其幾而逆防之則雖常人亦易為力待其勢之成而後救之則雖聖賢亦竭力而莫能及也幾之動其可畏哉易曰臣弒其君子弒其父非一朝一夕之故其所由來者漸矣又曰知幾其神乎君子見幾而作不俟終日蓋所以不俟終日者正所以辨之於早而速防其漸云爾周子曰天下勢而已矣勢輕重也極重不可反識其重而亟反之噫其知此哉昔嘗怪夫有天下者其始莫不恬然以安肅然以一相統紀於操縱豫奪之中而莫敢有離遏者而其後乃至於渙散決裂潰敗四出而不復可收拾者豈天之亡人國其禍固有出於不意而非人之所能為者歟木之生也有萌水之流也有源勢之成也有幾松柏生于山林其長千尋其大百圍先其未成則一手足可以擢而拔蹶而絶洪水之來漂山蕩陵而其流固涓涓焉善圖治者亦審其幾而已幾審則變通變通則其勢解勢解則其重固嘗在我而人不得以乘其隙焉不然則持太阿而授之柄幾何其不反中其鋒也哉故曰權之所存雖疏必重勢之所去雖親必輕制其勢也又曰為政而不行甚者必變而更化之更化則可善治通其變也又曰明者逺見於未萌而智者避危於無形審其幾也故天下之勢雖聖人不能使之常平而其所以不至于甚重者審其幾而速變之而已昔周之有天下也並建親賢藩屏王室宜若可以久安長治而卒并於秦者秦得其勢也然犬戎之難秦人盡取岐豐之地八百里此其幾之所在而周若罔知焉其亡不待赧王之入而後決矣秦有天下盡收其重其勢與周大異而反以二世亡者其重偏於內也然指鹿為馬其幾已成而胡亥不能見其亡又何怪哉漢興矯周之枉監秦之弊其勢之重常在朝廷故吕氏不能危七國不能亂然而其勢卒移於外戚者蓋自武帝以霍子孟受顧命自是大將軍之權重赤鳳五侯迭居更秉而漢遂失其勢矣此其幾又豈無自耶光武中興則又監西漢而變更之者也然桓靈之世勢歸宦官卒以傾國中間以李杜諸人之賢欲收其重不能一措手而顧身不免焉其幾始於不任三公而鄭衆以誅竇憲功受封賞則尤其輕重之分界也向使此數代者知其幾之所在而亟變之則雖至今存可耳故曰封建非能弱周周自弱也宦官非能亡漢漢自亡也周書曰惡之易也若火之燎于原不可嚮邇其猶可撲滅秦漢以下固皆待其勢之燎原而後救之者也而何能及哉善持勢者亦審其幾而已雖然君不勝勢勢不勝道故重勢不能危明君而昏庸之主則雖盡操天下之權亦無救於亂亡也故諸侯之禍不起於文武成康之周而起於平赧外戚宦官之禍不起於文景明章之漢而起於哀平桓靈蓋可見矣故欲制天下之勢者雖以審幾為先尤以自治為急聖人至公至神之化會試聖人有鼓舞之機以妙天下之感此天下之人所以日入於善而不知而治功之盛古今以為不可及也夫天下之道二善與惡而已矣天下之民二亦善與惡而已矣聖人不能使天下必無惡而常有以消其惡不能使天下必皆善而常有以作其善此其機之所在固不疾而速不行而至而莫知其所以然者而亦初非外民以為之也聖人不能外於民以為之機而民亦不能外聖人之機以妙其感此其一好惡一賞罰所以見聖人至公至神之化言天下之盛治而不可加也蓋嘗論之天地之常以其心普萬物而無心聖人之常以其情順萬事而無情若是乎聖人無情也又曰天地無心而成化聖人有心而無為若是乎聖人無為也今而好惡著則有情矣賞罰行則有為矣以是而語至公至神之化則聖人之化得無幾於褻乎噫是正不足以知聖人且不足以知天也天之生物必因其材而篤焉故栽者培之傾者覆之是故觀諸天地之栽培傾覆而聖人之化可識矣以栽培傾覆為非天地之化可乎今夫天下之人之異齊也古今之所同也廣谷大川異制剛柔緩急強弱輕重異俗衣服飲食器械異宜然要其所歸不過善與惡兩端而已聖人者出樹之風聲分之物采陳之藝極引之表儀豫之法制告之訓典著之律度宣之話言是故有會朝表著周旋行列之等焉有參伍殷輔陪臺之役焉有射鄉食饗井田學校軍師之制焉有親疏貴賤長幼之節焉凡所以慮民之心甚詳而治民之道甚備也使天下而皆如聖人之意則即是而守之固可以不賞而勸不怒而威而吾聖人亦得以無為而治矣然而天下不能皆如聖人之意也故其善與惡終有不可約之同歸要之一致者而聖人之心於是乎戚然甚矣於乎此好惡之情賞罰之制所以甚不得已於天下而亦初非外於天以為之也何則天有生殖長育聖人象之以制賞於是乎有車服之庸有宅里之表有名位章物之旌而善用丕勸天有震曜聖人象之以制刑於是乎有甲兵之威有斧鉞刀鋸之戮有梏拲鞭朴流放之慘而罪用丕懲故書曰天命有德五服五章哉天討有罪五刑五用哉夫命討出於天子而皆以天言之吾是以知聖人之所以鼓舞乎萬民者即天之所以鼓舞乎萬物而造化之妙所以非人之所能測也而亦何嘗外於民以為之機哉故其機之所動捷於影嚮機之所向順於風靡好一人焉賞一人焉而民莫不曰吾惟無善善則上好之而賞將及矣惡一人焉罰一人焉而民莫不曰吾惟無惡惡則上惡之而罰將及矣故不必其人人而好之而惡之而賞之而罰之而機動於此誠動於彼懦者起怠者奮乖戾者熙然其大和舊染而汚者翕然其維新矣由是而皇極可建也大猷可秩也降𠂻之恆性夫人皆可復也推而極之又將有順則而不識日遷善而不知為之者機之所感其妙矣哉聖人至公至神之化其盛矣哉故堯用是機而百姓昭明萬邦協和矣舜用是機而從欲以治四方風動矣禹用是機而政乃乂黎民敏德矣成湯用是機而商邑用協四方用丕式見德矣文武用是機而有德有造垂拱而天下治矣是機也公而溥微而彰寂而能感何謂公而溥程子曰廓然而大公物來而順應是也何謂微而彰周子曰幾微故幽神應故妙是也何謂寂而能感張子曰無我得正已之盡存誠妙應物之感是也是機之妙可以成變化可以行鬼神用之於天地而範圍不過也用之於萬物而曲成不遺也發微不可見充周不可窮也以言乎逺則不禦以言乎邇則靜而正也皇之所以為皇帝之所以為帝而王之所以為王也使聖人而安於無情樂於無為而不用其機以鼓舞天下則吾恐善無所於勸而日益消惡無所於懲而日益肆而天下之治且隳矣而何以成其至公至神之化也哉抑愚又有説焉董仲舒曰天任德不任刑故陽常居大夏而以生育長養為事隂常居大冬而積於空虛不用之地故古之聖人雖好惡不偏賞罰並用而善善之意恆長惡惡之意恆短故書曰與其殺不辜寧失不經傳曰與其失善寧其利淫此聖帝明王所以養忠厚之德以凝和平之福而享夫雍熙悠久之盛者也而亦何妨於至公至神之化哉愚也敢併及之謹論帝王應天下之務論曰天下之變無窮也人主欲以一身焉處之而使之各得其當則固不外乎明理之功而已蓋事之在天下其變雖無窮而要之各有當然之理學也者夫固將明理以治心以盡窮天下之變而善處之云爾然則君人者可不以務學為急而其學又可不以明理為先也哉夫人君以一人之微居天下之上言其地則曰萬邦也言其人則曰萬姓也言其事則曰萬幾也夫以其地之廣人之衆幾事之煩多若是而皆委諸吾身焉則雖聖智亦日不足矣故一日二日紛至沓來則精神必有所限而莫之盡賢否異人常變異時可否異勢則心思必有所遺而莫之悉憸邪以眩之讒諛以逢迎之則聰明必有所蔽而莫之通若是則天下之務無所於應而治且隳矣而何以君天下哉學也者所以廣其聰明啓其心思而扶植其精神者也古之人君其所以為學者何如也自孩提有識而三公三少即明孝仁禮義以導習之則其教也豫精一以傳心多聞以建事前言往行以畜德則其具也大有終始之典有緝熙之益則其功也勤盤盂几杖刀劒户牖莫不有銘則其防也密侍御僕從皆正人旅賁官師瞽史皆有規戒則其輔也周故教豫而漸之久具大而守之正功勤而得之深防密而習之恆輔周而養之善夫是以物無不格知無不致意無不誠心無不正而天下之務莫不於我應焉而裕然有餘矣堯舜之所以帝者此也禹湯文武之所以王者此也商太甲高宗周成王之所以守成業致盛治而伊傅周召之所以致其君者亦此也帝王所以應天下之務者其果有外於學而帝王之學其果有外於明理以治心乎哉然而世之人君夫孰無天下之務者而其善窮天下之變而處之者又何其寥寥也噫吾知之矣大抵不學之弊有三而學之弊亦有三何則庸君不知有所謂學而明君有絶人之資者又以為無所事學中才之君其性可導而上下者則又溺於聲色田逰之娛馳于土木神仙甲兵之好而不能學此三者固不學之弊也其或知悅學矣宜遂可以應天下之務矣然而黃老之學惑於異端詞藝之學類於文士記覽之學近於儒生斯亦何與於理何得於心而何關于天下之務哉故或不得其要則學之弊正與不學等此唐虞三代之盛所以不復見於後世也雖然其所以致是者大學之道不明于天下而已何則格物致知誠意正心皆大學修身之事而天下之務又未有出于齊家治國平天下之外者此勉齋氏之有意於人君而體吾夫子之意以為説也然則人君欲應天下之務者無他焉亦惟明乎大學之道而已人君納諫之本人君欲有以來天下之言必先有以為受言之地而後天下之言有所入焉夫人君以一人之尊臨天下之上其勢嚴其威重蓋不獨人之視之以為凜然而不可犯而其自視亦甚異矣自視異則其中恆侈然自滿而猶欲責之以難挽之以所不欲其不以為謗已而賣直者幾希矣於乎此天下之言所以不來而人主所以孤立於上也然其所以為受言之地豈有他哉要惟在於虛已而已在書益贊于禹曰滿招損謙受益蓋所謂謙者即虛已之謂而滿固虛之反也在易益之彖曰自上下下其道大光傳曰益德之裕也蓋惟虛已故能下下下下則其道大光而所謂裕者在是矣夫曰益曰裕此固人君德之所進治之所資而一本於虛焉信乎納諌之本於是乎在而訑訑自足未有不距人於千里者也今夫海非不茫然大也其東無東也其西無西也其南無南而其北無北也震蕩天地吞吐日月而不知津涯畔岸之所在也然其所以能成其大者虛而已虛故能受而凡天下之水微若畎澮大若江淮河漢流若川匯若澤其來不一而一收之無遺勺焉其量定也故夫知海之大者可以知人君之大知海之受者可以知人君之受矣虛之道其善矣哉天下之言之弗一也猶夫水也其理有顯微其辭有逆順其情有緩急而其人有親疏貴賤也惟夫不震以威不絶以勢不窮以辨不蔽其路而一以虛受焉夫然後下無匿情上無遺聽君無蔽明臣無隱忠而凡天下國家之大萬幾之煩民情物理雜出而不窮者莫不知之明處之當而無有遺憾焉故曰為川者決之使導為民者宣之使言不宣無以通其來不虛無以廣其受受之不廣則亦其中之未虛而已譬則溝洫焉雨倐然集則瀵然盈其量固然無足異也納諫之本其有外於虛哉今夫堯舜禹湯皆古所謂大聖人者後世無及也而稱之者則固曰稽衆舍已也取諸人以為善也聞善言則拜也從諫弗咈也噫是可以觀聖人之虛矣是可以知唐虞夏商之所以為盛治矣吾故謂海之大也衆水為之也聖人之大也衆言為之也距衆言以為聖不猶之塞衆川以為海哉况夫臣之於君本以義合自非其性忠義而為國者鮮不因其君之意向而逢迎焉古之人君賞以勸之罰以激之而猶恐其不言也今也不諫者賞而諫者罰矣彼亦安肯以其身而自試於不測之淵哉信乎納諫之本之在於虛也雖然虛固無弗受矣受之則或未必皆是也而將一施之乎曰非也虛則明明則能擇擇而行之則是非固有所取舍矣舜所以執兩端而用其中也然則虛其納諫之本歟明其從諌之用歟李斯諫逐客甚矣辨詐之傾國也假忠益而飾身謀功利之惑人也徇近效而忘逺害故巧説之士可以欺貪君而不可以欺明主而善為國者未嘗不黜一時之利而為千萬年久大之圖也茍徒見其效而不見其害喜其有謀國之忠而不察其情之自為也則其説行其詐售一時君臣之間非不知各自以為得而不知釀成莫大之憂者於是乎在矣可不戒哉昔始皇之世其臣有因國之間而建為逐客之議者始皇聞李斯之諫而正史氏録其書而歸之功謂秦卒用其謀兼天下意若幸李斯之不去而信其言之酬者噫甚惑矣且善觀人者不先辨其言之是非而先察其意之向背斯之意其果為秦謀之乎無也斯固客耳其所以厯明用客之效要皆不過自為之地而何有於秦哉嘗觀蔡歸生之於楚木備道晉大夫之賢析公雍子巫臣苗賁皇之所以去楚而謀之者其言雖若為楚忠計而其實為一伍舉言之故夫聲子假人之患以懼楚而李斯援客之功以啖秦斯之所以得留者即伍舉之所以得復也然以始皇之智而不免為斯之所欺則以功利之説有以動其心而惑之耳夫內紹四君之功外明王者之德五帝三王之所以無敵此誠始皇之所欲急聞者而豈悟其言之為大謬哉自今觀之秦之興自繆公始再廓於孝公繼盛於惠昭至始皇而天下一矣其所以寖昌而寖大者繄客之功也故由余百里奚蹇叔丕豹公孫支之屬植其機商鞅張儀范睢之徒踵其轍而後李斯者要其成人亦孰不信客之真無負於秦哉吾則以為秦之衰自繆公始積微於孝惠昭而遂滅於始皇之世何也天之亡人國不必其貧弱寡小之足憂而凡廣之以疆宇厚之以憑藉增之以勢焰皆所以滋其毒而降之罰故仁積之謂富德勝之謂強義行之謂威道隆之謂盛昔之所以世大其業而因有天下於長久者用此道也不然則其所謂一時之大邦者其根本元氣已斬然消滅久矣而尚何以有天下為哉昔者嘗嘆吳之有國僻在荆蠻已厯數百載矣至其末世因巫臣之來教之乘車使其子為行人以通吳於晉後又得楚人伍員者用之闔閭夫差之世非不赫然盛也主黃池之盟且與晉爭執牛耳然盟血未入口而越已破其國殺其太子未幾而吳沼矣越本夏胤其封猶久於吳至勾踐而有泄庸大夫種范蠡計然之徒教之生聚教誨料兵搜乘與吳競強於夫椒檇李之間卒兼吳國而有之修覲聘馳兵車以進於中國文明之會曽不一再傳而楚縣之矣向使夫差勾踐不為伍員種蠡之所教界封疆而守之則泰伯夫餘諸君猶可延血食於殷久奚至於遽餒哉秦之為國猶不可與吳越同日語始但邑西戎以保西陲後因犬戎之難遂力戰取豐鎬盡有成周之故地傳及繆獻已數與晉爭衡要不待孝惠而後強盛也使數君而能屏遊士却賓客之言縱橫者修仁義務道德擁雍州之地守殽函之固則天下必不能與爭而秦世世無患矣嘗聞漢人論建都之利謂山東雖亂秦地可全而有則知秦之處勢誠便守國誠固正使不能有天下猶可祀柏翳於千百年之後也况其勢又非終為諸侯者乎不知出此而乃聽諸客之言惑功利之説刑爭末事任為上圖一時算計見效若甚可喜孰知其國愈大其亡愈蹙其勢愈強而其祀愈不久也中間若百里奚由余頗賢然夷考其事亦不出并國圖伯而殊無一二及於仁義道德之為衛鞅而下復何言哉夫以鞅之鷙酷儀之狡險睢之隂賊得一人焉亦自足以夷秦之種而何必代有其人也其強兵則坑屠掩滅至於殺十萬人而不以為慘其聚財則辟地增賦箕斂頭會至於盡壞先王之法而不以為賊其峻刑則曹誅族剷膏流節離至於血波於道刑黥師傅而不以為忍其自為利也則欺執誘殺至於虜公子戕國君離親戚廢太后而况其淫狡暴厲又有不可一一言之者哉孟子曰今之所謂良臣古之所謂民賊若數子者其何啻民之賊也謂之國賊可耳斯而為秦忠計者顧不明言用客之害而猶曰以客之功豈非更為秦生一鞅也烹滅諸侯焚燒六經破壞井田要其所為不過襲鞅之故轍而尤加甚焉當時事勢正如大病之人其氣垂盡又從而膺之以木索施之以箠楚其不遂奄然絶者幾希天下不勝其毒一旦起而乘之適戍強於五伯閭閻逼於戎狄嚮應憯於謗議奮臂威於甲兵不數年而秦無遺育者斯之罪顧不大哉夫混一之樂不足以償殄滅之慘南靣之榮不足以洗係頸之辱死而有知則數君者亦自悔于地下思其逐客之不早也雖然秦之用客固足以僨其宗而客之用於秦者亦未有不反中其身覆其族姓者也睢之免猶賴蔡澤儀以殺死鞅以車裂斯具五刑惡之甚其受禍亦酷故秦既迄兹無聞家而諸人之後亦斬矣昔人謂不韋以人易貨揚子雲曰以國易宗故愚謂李斯諸人亦若是而已不然則數子輔秦之功可以比伊吕之在殷周與國咸休也而胡為不克庇其身哉愚故併及之使後為人臣無效李斯也雋不疑引經斷獄善定天下之事者必先假一説以服人之心使之無敢異議然後可以徐而處之以得其情而其義之合與不合殆有所不及詳矣夫事之在天下也未嘗不敗于狐疑而成於決斷况夫事變倉卒之時衆志叵測不可以逆防不可以詳諭使無一説以徵諸大義而折服其心則姦萌一兆天下未必無異議焉其禍有不可勝言者矣蓋嘗觀之經曰蓄疑敗謀又曰惟克果斷乃罔後艱言事之貴乎斷也傳曰無徵不信不信民弗從言信之存乎徵也子産曰夫從政有所反之言制事明民當有權以解其惑而不能拘拘焉蹈其故常也敏以斷之徵以信之權以反之不疑之説春秋將於是乎在豈若彼經生者流哉陳册牘操觚翰據時事首尾考諸義而精取諸類而當以是從容議論几席間夫亦誰不可者而可責備於應變倉卒之頃乎方在廷之臣左右顧愕莫敢一言而首倡其説以消其隂圖則其所稱引亦不過假是以濟其變而已而尚及區區焉較擇其經義之合與不合而後立之辭哉戾太子之事班史載之詳焉可覆也吾不暇多述獨怪夫當昭帝之時男子成方遂因舍人貌類之言而為誣罔之計犢車詣闕自稱太子此其心固僥幸于一時之富貴而非有深謀逺慮以大有所圖自今事定之後觀之疇不謂是煩一獄吏決耳然而蒯聵盟孔悝以求國陳涉假扶蘇以鼓衆衛秦之亂實由是基昭帝之在當時正田文所謂主少國疑大臣未附百姓未信之日也犢車之入朝野變色天子詔朝臣雜識視而至者噤不一啓口則安知其真太子耶其非太子也安知不有踵秦人之故智而為之者其真太子也安知不有左右之臣隂為之羽翼顧天子所以處之何如而因以階亂耶安知不有東宫舊人素知太子仁厚憚少帝嚴明故召之入而欲為廢立䇿耶數者有一焉則漢之為漢且未知攸底而何暇謀為昭帝地也昔晉耳立而吕郤焚宫鄭子儀亹忽之亂傅瑕實外市焉使漢而有如二三臣者亦甚可為寒心也已夫太子之死去是已數十年廷臣之疑無足怪者疑於是則雖智者亦不知所處疑於非則又未能使之帖然無辭以退也今也不斥其非而直以大義斷之於是乎天子之心釋大將軍以下之疑決而犢車男子之姦塞卒不能措一辭焉以就廷尉非固不待言是亦無所冀數語之間其獄立辨不疑之善斷大事固如是哉或者咎其是轍拒蒯聵為戾於春秋之旨於乎其於春秋之旨誠戾也是果何時而暇為是裁度考據耶呼吸之間事機立異使尚可以從容安緩而圖之則其真妄是非亦自有説又何以引春秋為哉何則方遂之為是詐也實動心於舍人貌類之言則知當時之識太子者未為無人也天子一發明詔使內而掖庭太子宫外而朝廷又外而及於京邑之民凡及見太子者莫不至至則求其肖而别焉則衆目攸萃情狀莫匿其何説之辭此其一説也不然則詰之曰泉鳩之匿拒户之經太子死有明徵矣而何為者此又一説也又不然則詰之曰闕下之戰三公自將先帝震怒有斬反者之詔矣既而壺關三老有疏田千秋有言上心悔悟而江充族矣蘇文焚矣歸來望思之臺作矣其欲赦太子明甚而弗聞乎時胡不束身歸罪今焉自詣何嗟及也此又一説也又不然則詰之以當時宫禁之事如皇后之所教衛融之所譛訴用法大臣之所以不悅以至太子幼之所經厯阿保乳母壯之所通賓客以至江充之姦石德之計闕下之戰任安暴勝之之死之詳使其是也周能言之使其非也則雖其甚黠亦必不能一一記憶况宫省事祕又有所不及知者摘其一二矛盾亦自成獄此又一説也夫持是數説以詰太子不出於此必出於彼宜若無遁情者然反覆曲折非纍千百言不可決以是處事吾恐口語未終而肘腋生變議者不旋踵而社稷已移之他人矣是可不深慮耶使其議已決矣太子其果非真矣而吾前所謂是則愈不可處非則不能使之帖然無辭者是又可不深慮耶吾是以謂不疑之能斷大事也折諸經所以徵聖責之罪所以正法而其是與否一不計焉故能不移時不廢辭而其獄決矣吾是以謂不疑之能斷大事也而尚可以經術未精為之病哉雖然經術所以經世務而春秋者尤聖人經世大法所在吾聞之董生為人臣子者不可以不知春秋處經事而不知其宜遭變事而不知其權其尤不可不究心尚矣然古之善經術者不明於當事之際而明於未事之先蓋其胸中事事有定一旦有感而通則口如其心心如其經經如其事事如其義而動不失其當焉其宜其權惟吾之所處而何嘗有牽合附會之説是其所非非其所是以罔一時之不知者乎然則論不疑者當如何取其應變之權置其所引之經而無深求焉可也謹論陳平周勃天下之事不可以幸而成也以幸成斯以不幸敗古之所謂大臣者當不若是機可以先圖勢可以逆制而直依阿巽懦茍安目前僥幸以自定而後之人猶從而稱之曰某之功某之功吾不知其説也嘗觀平勃之在漢也奮身徒步際髙祖之興而景附之非內參謀議則外應征代天下未定則設竒應變攻城掠地如彼其勞也天下既定則誅亂制暴持危扶傾又如此其艱也吕氏之亂微二人者其孰不為漢危之蓋髙祖安劉必勃之語至今以為知人而二子所謂安社稷定劉氏後者亦莫不以為能踐其言也然吾聞之大臣之所以任天下之事者非徒以其一時之權譎小數可以愚敵人之耳目亦非以其椎魯朴鄙一無所事而徒以竊夫長者之稱而已也鎮之以望本之以忠守之以義謀之以豫而經緯之以才然後可以折姦萌遏亂源動無不克行無過舉而天下國家之事於我乎濟焉此固非有所僥幸於適然者也今觀平之在當時也臣魏事楚而卒亡命於漢回節易行於數主之間受金之汚亦且直任不愧而勃固織薄吹簫之徒也此其素望之不能明矣及其髙惠繼世吕雉擅命意欲貴其私戚而猶未敢公言之也天下之事豈一孺子之所能知平勃顧因辟疆之言遽推諸吕而王之度其意不過以太后哭泣不可止畏其有圖已之心而姑為是以順適其欲不知夫周陳氏安而劉氏危矣忠於謀國者顧若是乎哉故説者謂當時以義爭之陵既不可平又不可勃又不可則吕氏亦必有憚而不敢而胡為乎既不能諫又從而導諛之也要之平勃於漢草莽相從不過以強弱定君臣之分軋之以權勢縻之以祿爵而初非誠有為漢之心一旦勢殊事異則皆渙然離耳而欲以伏節死義責之不亦過耶夫既不能正之於先猶宜深察其變而豫為之所當時操兵柄典宿衛者悉為吕氏兄弟其不能使之帖然於下必矣而乃優遊以卒年歲寂寂而無一謀其平日所謂祕䇿奇計者一無所見而徒燕居深念至於陸賈直入坐而不知亦甚可笑也已蓋平之才不過權譎小數而勃者直一椎魯朴鄙之人而止耳而何足與言社稷之大計耶故當諸吕之發難也非朱虛侯章則其隂謀有所不及知非灌嬰齊王襄連兵於外則諸吕之心無所憚非平陽侯窋則賈壽之言無自聞非酈寄之紿説紀通之矯節則太尉不得入北軍而漢家之事於是乎敗矣逮其劉章諸人布置已定而勃猶未敢誦言誅之左右袒之問其心蓋尚業業也然則平勃固亦坐收其成功而已而豈真有安漢之才者哉故愚嘗謂二子之成功實有四幸髙后既殂一也人心為漢二也樊噲早死三也諸吕皆愚人四也何則使髙后尚在則雖其罪惡甚彰姦宄畢露而城社依憑決不可動不然吾恐事未克而先就菹醢之地矣彼太后者其何有於平勃耶沛公之有天下也剪除煩苛與民更始其德澤之在人心久矣傳一二世而吕氏乃欲竊而取之此固天下之所憤鬱也故絳侯以一節入北軍一呼而士皆左袒豈誠勃之能使然也哉樊噲之死蘇氏嘗幸之矣使噲也後太后而死則乘之以僣竊之權而濟之以雄桀之氣雖其妻吕嬃之智亦自高諸吕數等終不能遂成大事易劉氏而帝之而漢已深受其弊矣其肯安然受刃於諸將之手耶彼吕氏諸人皆庸奴俗子不過藉后勢以幸旦夕之富貴而非有雄才大計深識逺圖足與計子孫者也故酈寄一紿遽欲解組而去之正如司馬懿之料曹爽所謂駑馬戀棧豆者曽不思其主兵也何功其享有漢氏之祿爵也何道其所以服當時之將相大臣也何能獨恃一太后而后則死矣而猶欲歸封國享富貴以為吕氏不拔之業噫亦太愚矣且諸老人亦嘗有言其不便者使産祿當時僅得中人之識但據南北軍而不去則雖十勃百酈寄吾亦不知其何以措手故曰平勃之成功亦幸而已大抵平之機詐有餘而忠正不足至於吕氏之難則併其機詐而亡之諺所謂老將至而耄及之者平之謂矣事變既平而雍雍文帝之朝錢榖決獄之所弗與知以修宰相之度夫何難者勃之木強有餘而才識不足觀其就國之後執兵見守尉處事猶周章若此而况於變故之頃乎渭橋之迎倉卒請間所謂招之不來麾之不去者器度當不若是也要之二子於大臣之道均未之講論其優劣則勃之重厚猶可倚仗而陳平者特一巧詐小人而已奚其智奚其智表擬輔臣謝賜夏日同遊詩表嘉靖某年某月某日伏蒙聖恩賜臣等夏日同遊詩若干首者景際文明鸞簉徯觀于龍御志同上下奎章紀盛於宸遊方驚覩乎賁文遽拜嘉於晉錫捧緘知重拭目生輝臣等誠歡誠忭稽首頓首上言竊惟聖人之情見乎辭猶化工之妙著於物心存解阜徽音遐想於虞絃戒切荒淫家法明徵於禹訓六府三事修和之政可歌天保采薇經綸之迹具在慨聖人之不作因刪後以無詩大風惟猛士之思徑草溢諫臣之美芝房天馬紀祥未數於休徵玉樹後庭導欲徒彰於否德惟先王無流連之樂必明聖乃述作之資兹蓋伏遇皇帝陛下乾健統天震明御極發孝思於明倫之典闡聖學於敬一之針禮舉耕桑復千年之曠典祀分丘澤決數代之疑文治既切于時幾道尤通於張弛朱明甫屆釋一日之萬幾玉輅有來肅千官於羣從君臣相悅泮奐爾遊顧惟鼎覆之徒亦與泰交之會仁覃茂對每先天而奉時學有緝熙自因聲以成律景隨心暢樂與人同掞睿思之春容飛雲章之藻麗經緯乎天地之運炳煥乎日星之明光燭寶奎香浮錦軸信乎陋唐宗苦炎熱之句而未與爭驅視聖祖醉學士之歌而庶幾嫓美者也臣某等叨竊無能遭逢有幸翠華飛而臣扈已濫具茨之遊叢雲起而帝歌共駭洞庭之奏臣敢不敷言是訓傳世為榮捧觀已眩於珠璣珍襲允同於琬琰忠慚召奭矢詩未遂於卷阿志效袁絲諷諫尚懸於峻坂伏願典則丕承乎祖訓怠荒時警於聖謨武文為天下君永見堯言之布遊豫作諸侯度重興夏諺之休受丕丕基建極會歸于一統惟明明后保厯聿至于萬年臣無任瞻天仰聖欣戴屏營之至謹奉表稱謝以聞擬賜衍聖公孔彥縉宅於京師謝表永樂二十二年伏以道崇梁木爰推覆幬之恩眷及樗材曷罄涓埃之報儒林有慶吾道增輝竊惟尼山育將聖之英洙泗衍斯文之統宫牆入望日月快瞻綏來動和神化功於俄頃道德仁義作宗主於萬年秩祜申錫於後人殊寵屢頒乎前代褒成錫號漢尊孔霸之稱文宣襲封宋下孔宜之命雖屋烏之推愛自昔有聞而澤鴈之究安于今僅見兹蓋伏遇皇帝陛下沉幾先物英斷若神文治煥於無為武功昭於不殺聰明盡下恭儉守成抑祥瑞以逺佞諛購遺書以備省閲民流動念天變咎躬納北狄之降志存柔逺罷西域之貢心恐煩民重詒謀必嚴宫臣輔導之敕崇儒術既謹先師釋奠之儀復延賞於後昆遂濫恩於庇賤趣司徒以課後走繕部以鳩工是經是營乃慰乃止俾當虞廷之肆覲無煩鄒館之假留環堵之素分太踰夏屋之懷居已甚一朝盛典世羡為榮千載奇逢人誇其美惟漢哀賜董賢之第祗示寵私若唐玄侈祿山之居徒資譏訕新宅以徙晏子景公尚昧於卜鄰殿材以賜魏徵太宗不終夫舊好崇德象賢光前裕後未有如今日之命者也臣彥縉叨承聖後忝列儒流過庭之訓雖聞入室之功未致襲爵繆仍乎世命悚恧已深賜宅俄出於新恩感思何既敢不勉圖報效期帝眷之莫辜益勵學修求家聲之弗墜道同時而俱泰身與國以咸休伏願治不下堂薄海際文明之盛身先建極敷天同歸仰之誠天下為一家永示建瓴之勢春秋大一統恆固宅中之基臣無任瞻天荷聖激切屏營之至謹奉表稱謝以聞擬文華殿新造九五齋恭默室成廷臣賀表會試伏以日新聖學昭龍德之正中天啓宸居仰明哲之作則大人已孚於利見良弼冀協於旁求歡洽臣民光昭海宇臣等誠歡誠忭稽首頓首竊惟宫室之營實係國家之重詩歌築室書美肯堂禮謹月令之居易兆棟隆之吉禹卑宫而民悅文作臺而子來顧後王之汰無窮而離宫之營益廣未央壯麗昭儉德以何禆仁夀紛華敝侈心於無用惟一人之立極以四海而為家動必有成書皆可法恭惟皇帝陛下德懋重華道隆峻極闡孝思於明倫之典邃帝學於敬一之針禮舉耕蠶復千年之曠典祀分丘澤決數代之疑文爰觀土木之興每見時幾之敕無逸有殿心存稼穡之艱豳風有亭義昭風化之自頃於文華之殿復新齋室之營軒轅草圖羲和練日罄玉石於隴阪空瓌材於瀟湘梓人效審曲之能司空董繩直之役美兼輪奐户列西南匪徒為即安之謀抑以寓藏修之益虹梁雲繞揭九五以名齊螭柱星羅采恭默而扁室心罔安於上治志常切於交修期進德修業之及時求多聞建事以永世庸言之信庸行之謹已徵健法於天行汝惟舟楫汝惟鹽梅會見思通於帝賚臣等官聫禁省學愧通儒啓沃無能恆懷憂於夕惕遭逢有幸每傾望於雲從爰觀鼎建之成益喜泰來之會伏願懋商宗有獲之學體周文未見之心龍飛溥出震之功兩儀耀德虎變協繼離之照三極呈祥夢兆熊羆衍百男之鴻慶化行麟趾詒萬葉之燕謀臣無任瞻天仰聖欣躍屏營之至謹奉表稱賀以聞擬重修大明會典進呈表伏以盡倫盡制宏猷逺酌於百王載筆載言大典繼明於昭代人存政敏君舉必書述作信明聖之徵摩編效臣工之職政由俗革治以道同竊惟堯言存舜典九功之敘可歌武烈繼文謨六典之文具在惟太祖之御極暨列聖之承宗治定而功成已見重熙於千載議禮以制度式存會典之一書纂成肇始於敬皇潤色再厪於武廟上自洪武戊申之歲下迄𢎞治壬戌之秋法始正家俯陋仙源之講恩終懷逺下嗤王會之圖夏典明明而可徵周文郁郁乎大備顧自書成之日已幾數十年中間法制之殊何止二三册前規雖在近事靡徵兹蓋伏遇皇帝陛下舜孝蒸蒸文心翼翼道則天而同大德與日以俱新敬一有針逺妙傳心之法明倫有典丕昭嗣服之心謂兹會典之成實出先朝之志離明繼照紹述逺發於宸衷巽命重申續纂上承於手札臣等草茅賤質樗櫟散材學不足以知今文非善於記事勉勤鉛槧繆正金根特書屢書事曲盡於當代識大識小道豈資於在人爰攄終歲之功用塵乙夜之覽伏願對揚光訓法近守於祖宗率由舊章動必徵諸方册自家而國而天下恆享和平之休曰夀與福與多男永膺祚胤之盛臣無任瞻天仰聖激切屏營之至謹以重修大明會典隨表上進以聞䇿問成帝罷中書宦官髙宗遣天竺方士歸國何如有可法之善者君子不能泯其迹無為善之誠者君子不能掩其非蓋政之所行固有善否之殊而事之所由尤有誠否之别由於已者誠也雖明君不是過也不由於已者非誠也雖善政無足取也此漢成之罷宦官唐髙之遣方士君子所以存其迹而著其非歟請因明問而復之古今論小人之害國者必曰宦官也方士也蓋宦官以隂柔蠧國政方士以左道蕩主心其術不同而同歸於亂古今論人主之善政者必曰不任宦官也不信方士也故君身為之強固君德為之清明其善不同而同歸于治君子是以善成帝高宗之舉也夫宦寺之設昉於周公觀周官分職太宰司徒宗伯之屬皆有所謂奄人然而其事微其勢甚不得已也浸淫於春秋至秦而禍極矣伊戾以坎盟殺宋痤寺栁以熾炭蠱元公閽人之狀戴吳趙髙之賊二世皆是物爾自漢言之則如武帝之英明而𢎞恭石顯猶得以竊其權焉故宋人論奄尹之禍如毒藥猛獸未有不裂肝碎首吁亦可畏矣彼成帝者乃能一朝罷而去之此綱目所以有罷中書宦官之書也方士之説昉于周穆觀今傳記所載得八龍騎之西遊與王母宴于瑶池之上然而其年耄荒其國亦幾失也崇信於秦皇至漢武而其惑甚矣新垣候日於再中少君夜祠以致鬼五利之鬬棊公孫卿之仙迹皆是物爾自唐言之則如太宗之神武而娑婆昧者猶得以售其術焉故漢人論神怪之説聽其言洋洋滿耳若將可遇求之蕩然如繫風捕影終不可得吁亦知言矣彼髙宗者乃能一朝遣而去之此綱目所以有遣天竺方士歸國之書也然以二君之政無一可書而偉然此舉逺非武帝太宗之所能及君子是以疑於其故焉何則中官外戚相為低昂此勢盛則彼勢衰當其時赤鳳秉樞機五侯越政軌成帝之不能有為明矣故宦官之去正恐其與已分權事在元舅而不在天子也罷一宦官任一宦官君子謂其亂則均爾漢祚之移于王氏其禍不基於是哉長生淫欲相為出入彼念去則此念專當其時才人長髮於尼寺昭儀煽豔於房闥高宗之迷於情欲甚矣方士之遣正恐其妨於淫欲事在女后而不在天子也遣一方士惑一方士君子謂其害尤甚爾唐祚之移于武氏其兆不萌於此哉於乎不納叛人其説非不正也而莒僕之黜季文實因是以執魯柄焉不用外戚其事非不善也而穰侯之罷范睢實因是以得秦權焉二事亦甚類矣善觀人君之政者先觀其所由可也問王蘇德學何如君子之律人也以道而其取人也以長律人以道則其辭不得不嚴而凡一言一行之不合於聖賢者皆在所必黜取人以長則其論不得不恕而凡一言一行之能自立於天下後世者皆在所必與何則道固不可以少假而無求備於一人則先王之所以存忠厚之道於天下也知乎此斯可與論王蘇二公之德學矣夫事之成敗莫不有已然之明迹而善探本者不遺其始而徇其終人之是非亦莫不有已然之定論而善原情者不觀其顯而釋其隱故世之論二公者吾嘗聞之矣病天下者莫如新法而荆公信以為可行於是青苗均輸紛然變其祖宗之舊而熙豐之政亂矣壞國家者莫如小人而荆公恃以為可用於是惠卿李鄧顯然布於執政之地而紹聖之禍基矣任王韶以開邊而百萬之生靈殱於兵刃逐韓富以專國而三朝之舊臣委于外藩其所以蔽主而蠧民者要未可一二數而蘇氏則無之此其已然之成敗是非固未有不罪王氏而釋蘇氏者也殊不知二公心事無大懸殊而其謀猷論議固相出入生財之説蘇氏亦嘗言之非荆公為之先發則新法之禍在蘇氏而不在王氏也用兵之説蘇氏亦嘗言之由荆公為之首倡故熙河之敗在王氏而不在蘇氏也親少遊之徒則所與者皆浮薄訾程氏之黨則所崇者非正學其所以不貽禍于天下者要亦當時之不大用而已此其隱然之成敗是非又未可釋蘇氏而罪王氏也所以然者蓋由二公於聖賢之道均未之講故雖所為或可知或未可知而皆無以逭乎君子之譏耳然人之所為失於彼者未必無得于此而有所短者不可遂掩其長君子於是乎每取節焉何則以荆公之行言之則其不愛官爵固逺過于富貴利達之徒而不溺聲色亦誠可為清正修潔之士故先儒嘗謂公之素履與溫公大略相同使其政事不大謬焉誠亦未易得矣以坡公之文言之則其自謂如千里之駒御以王良萬斛之泉隨地而出蓋信然也故當時其父子隱然名動京師而得與歐陽氏並稱於世使其學術稍以正焉誠亦不多見矣惜乎功利詞章有以沒溺二公之心而終不悟也噫問陳蕃薦五處士詔徵皆不至夫五人者之行果有可稱者歟其不至豈各有所見歟見賢而舉者大臣為國之公見幾而作者君子保身之哲何則妨賢病國不免於徇私意而忘公道入亂居危將至於蹈險地而履禍機由前言之則不忠由後言之則不智不忠非大臣也不智非忠臣也吾是以知見賢而舉大臣之所以為其國見幾而作君子之所以保其身也請因明問而復之漢自光武再興鼎遷東洛九傳而至桓帝運且否矣幸而人豪如陳蕃實維持之處困亨屯為國柱石擴好善之心廣進賢之路推轂士類側陋俱揚當時膺其薦者在豫章則為徐稚在彭城則為薑肱在汝南則為袁閎在京兆則為韋著在潁川則為李曇而是五處士者則皆匿以為高往而不返崇廉靖之真守退讓之志白駒皎皎空谷遐心雖安車玄纁之徵囂囂不顧略不為漢一屈而為蕃一出焉夫無知薦陳平常何薦馬周皆為其有可用之才山公之啓事王旦之疏名皆為其有可取之實則知薦人者當於其行而不可沽舉善之美名陳蕃薦五人而五人者其行果足薦歟如廣漢楊厚之來則陳漢三百年之厄江夏黃瓊之至則有明習政事之稱而李固以直言舉又嘗以尚書之非人為對則知為士者當行其志也不可負見舉之美意五人者之不至其見果何居歟今以五人考之如徐稚則業勤耕稼而自食其力恭儉義讓而人服其德行何懿也薑肱則博通五經兼明星緯友愛諸弟感悔賊冦行何良也身居土室而以耕學為業則袁閎之行為足稱隱居教授而為三輔冠族則韋著之行為可取以至遭值少孤家貧力學繼母嚴酷事之惟謹則李曇之行之優又可見矣是蕃之薦為能薦其所當薦矣非有為國之心而能若是乎以當時言之則國步多艱根本已蹶四海橫流非砥柱之所能遏三綱將墜豈一木之所能支黨錮殺戮之慘已於是而可以覩其機中官專恣之惡已於是而可以窺其非故郭有道既明且哲以保其身申屠蟠見幾而作不俟終日觀魏桓對其鄉人所謂生行死歸於諸子何有之言則知其時之不可以有為而五人之不至亦各有見不失為可以處而處矣愚不佞敢以此為獻惟執事其與進焉問程朱之門人衆矣願詳其行義而推其善學者傳道於先正者或得其一偏或得其全體君子不可不究其實而别其優也蓋不究其實則行義之詳無自而知不别其優則善學之士又何自而可見哉故或得其一偏或得其全體傳道雖同而造德各異君子其可以弗辨哉執事發䇿下詢而以程朱之門人為問欲有以詳其行義而推其善學者愚請掇拾其一二以為復蓋自夫五星聚奎宋啓文明之運諸儒繼出身當道統之傳誨人存不倦之誠而立教有因材之篤在洛有如二程夫子焉明道德性寬大規模廣濶伊川氣質剛方文理密察此其有得於道者也而門外尺雪師道尊嚴座上春風意象渾厚當時門人寧無可言者乎是故純粹宏深簡易平淡而為老師俗儒所推先則楊時其人也問學日進政事絶人而為公卿大夫所尊信則遊酢其人也才識頴悟則有若李端伯力排異端則有若朱光庭蘇季明德性純茂強學篤志吕與叔修身好學行如古人范淳夫資質平正謝顯道行學可師吕和叔任道擔當風力甚徑而深潛縝密不及與叔張思叔窮理造微鮮能及之而持守工夫不及和靖周恭叔持身嚴苦塊然一室貴娶瞽女愛過常人侯師聖安於羇苦守節不移經術通貫不窮時事纖微皆察志在行道如馬伸雖勇於為義而恥以釣名也資質魯鈍如尹焞雖持守有餘而格物未至也程子之門人其行義之可見者如此在閩則有如朱子焉豪傑之才足以折羣疑於百家格致之學有以集大成於諸子此其有得於道者也而廣信鵝湖之寺從遊者多長沙敬簡之堂依歸者衆當時門人又豈無可言者乎是故進學可畏處事不茍則有若李燔義所當為勇不可奪則有如張洽黃直卿明睿端莊造詣純篤㬊亞夫進學意氣頗多激昻陳才卿一室蕭然有以自樂工夫精進尤為可喜蔡季通有精詣之識卓絶之才不可屈之志不可窮之辨陳安卿論顔子卓爾之説甚善論大本達道意甚備鄭可上説易中庸甚孜細論人心道心益精密方賓王親切的當不失乎為學之序蔡仲默注書明範不愧乎父師之托學有根據而為政能舉先王之典以活無告之人者寥德明其人焉身在都城而能味衆人之所不味以至卒究大義者輔漢卿其人焉朱子之門人其行義之可見者又如此然而升堂濟濟莫非一時之俊彥論道侃侃率皆天下之英材伊欲推其善學者而表章之則愚得以折諸當時同列之所稱與者矣何則和靖尹氏之言有曰河南二程夫子以孔孟絶學為天下之倡而升堂覩奧者三人曰廣平遊定夫上蔡謝顯道龜山楊中立是已則知三人者之於程子可以為善學矣勉齋黃氏之言有曰季通於先生之門可謂傑然者則知季通之於朱子可以為善學矣夫曰行義者論其槩也曰善學者舉其尤也行義或得其一偏而未盡乎程朱之妙善學則得其全體而可續夫道統之傳若夫諸門人之淺深髙下則豫豈敢以輕議哉敢執此以為明問復具茨遺藁
