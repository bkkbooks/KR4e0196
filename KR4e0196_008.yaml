body:
  text: 具茨文集卷三明王立道撰傳郭索傳郭索軹人父郭解以俠橫行一時睚眦殺人甚衆帝怒族解解有妾瑣姞方娠以賤故屏居外舍然遂不及禍逃之山中露夜奔走歎曰天乎使郭氏有後雖箝我於市我乃死無憾矣道遇異人為之易易已喜曰是卦內柔而外剛遇后緍歸於有仍之吉其兆字於凶乃濟厥宗匡體而黃中利見大人無咎已而生男益深自匿護視良謹數年解客有知其處者亟往物色母子方貧餒拾遺穗田間見客媻姍却行然不得避也客遂挾與俱歸言於衛將軍將軍曰促見之非我誰為郭氏立孤者衣食之與舍中兒等問名客曰是兒索而獲宜名之索矣將軍唯或曰索蓋其母姓將軍善其存孤名之以示不忘今莫可考云比壯旦夕侍衛將軍雖休沐遇將軍夜燭治軍簿輒望明而出匍伏將事將軍每倚為爪牙間嘗語索曰而父俠也多惠亦多怨今獨以我故他日或將魚肉女奈何女勿輕出出必介索涕泣受教自是嵗輒一出嘗以七八月往來江湖間未嘗不介也索短小青黑大類父而精悍過之又性喜鬬小不快意輒盛氣勃怒兩目耽耽唾沫流噴不已諸少年相戒無犯索曰是夫腹中有芒毋自取疾其知索者輒為解曰索無腸徒外悻悻耳諸少年顧又相率親索呼索為無腸公子然索故俠種又倚衛將軍橫甚嘗過吳吳人不為饋食乃率黨類盡蹂其田稻無遺種人言將軍將軍弗信也青舍人蘇姓者建族人索父故相善人或毒索輒居中解索亦畏事蘇如將軍云及後青稍稍失勢門下士多往事去病唯索與任安不肯去青薨以避仇不知所往其子孫亦遂散處江湖間或徙海上其族最著者曰蝤蛑氏彭蚏氏擁劒氏往往不一姓亦時以俠聞太史公曰解任俠恣睢布衣權動卿相始終藉衛將軍保持之疑亦有過人者然不免赤族遺孤㷀㷀哀哉解多賊虐於人區區義信不掩其惡天之報施豈不明甚矣然余行關中關中人乃不識有郭氏後豈當時徙者既以族故絶至索復轉徙與孔方傳孔方泉人也小字阿堵先祖有功虞夏間佐禹治水以濟民命始封於泉桀紂之季再絶再續周成王時太公立九府圜法王命泉侯與東伯等乘傳周流天下既反命益地加爵國始大其别子入為王官世守泉府至景王時録其功欲大用之單穆公慮其權重將厚自聚斂絶民用以實王府力諫王王不聽數年民果大困窮歷戰國秦之亂子孫失爵遂散處民間泉獨盛漢髙后二年方生方父先以避亂冒孔姓故方亦謂孔方云方性圓轉機變善諧俗輕重必得時海內乂安上下奉法循謹方雖不能以功名自見然自朝廷公卿貴人下至富民商賈無不欲交歡方者見方輒握手不置無論新故方亦多技能能與物低昻或責以事事立辦雖宫禁官府出入如私家人人卒值患難或甲乙相讐賊方居間輒解四方來求仕者亦多依方方皆為奔走之無不意滿方或舍去輒羈困無所成列侯公卿有求車馬宫室子女諸玩好方往無不得方所至粟帛羡溢材貨坌集逺方珍異山海之藏頥指立具於是衆疑方有祕術能使鬼通神方笑曰方無術也將鬼神亦自喜方耶名公卿若申屠嘉張釋之賈誼輩亦時時取給於方然終懼為己汙辱遇方落落或以非禮自致輒正色謝絶以是賢豪多不親附方方稍自失又素病體臭鄧通新得幸於上相工以通法當餓死上憂之召通謀所以富貴久長於通通叩頭泣曰陛下誠憐臣者使臣得孔方與居臣無患矣方時在蜀上促召貴方使續祖官職為嚴道使奉朝請既拜上屬方曰女廢族也賴通陶鑄女女其無忘通虛心以共通事方頓首謝益晝夜自磨礪盡斂芒角通所使不復愛身或忌方譛於通曰方多反覆背面各異與方昵者皆齷齪小人然通知方無他益愛任方㑹文帝崩景帝以齰癰之恨下詔錮方使不得為通用卒餓通以死後七國反又以方族嘗佐助吳囚方京師盡收繫方之族至貫索朽絶不得釋方死帝乃憫其非罪稍復其族云太史公曰鄧通以色幸假符衣裻釋楫櫂被紳紱無秋毫輔益人主負乘致冦其敗宜然而方為之使陋矣然以方圓轉多通能生死榮辱人人趨之如水走下晚乃不能庇一通卒負帝委託何哉人多尤方余竊謂太子既立固通命卒之時矣方曷能左右通耶即帝未崩太子未立通無餓死相一日疾病先犬馬填溝壑帝雖以方殉通如通何而懵者猶惜方事通之不終謂方不去通不餓死不知通制命於天耶抑方所制命耶悲夫記養知齊記余嘗讀程氏書至所謂致知在乎所養養知莫過於寡欲者心竊愛之夫人心之靈莫不有知蓋萬有之所涵衆理之所㑹而庶事之所由以應者皆於此乎在焉此固吾心本然之天而非外假為也古之聖人知無不至其思之所通感之所應沛然而達渙然而釋怡然而順而初無表裡精粗之異焉此其心非獨與夫人異也其知猶夫我也然而聖人盡之而衆人昧焉者何哉今夫水之濕也火之熱也美色之可愛也惡臭之可惡也夫人而能知之也使夫人之知皆若於水火色臭然則其知亦至矣明於彼而獨暗於此焉何哉聖人之於天下之事之物猶其於水火色臭也知之至也知之至者夫亦由其能養而已且孩提之童猶有不慮而知者今且舉天下貿貿焉冥行於膠擾紛龎之中而終身若坐牆屋豈其心獨不如孩童哉孩童之知純於天而衆人之知蔽於人也故曰大人者不失其赤子之心聖人之知自孩童而養之者也衆人之知自孩童而賊之者也養則充賊則壞其所由來漸矣記曰物之感人無窮而人之好惡無節是物至而人化物也人化物也者滅天理而窮人欲也聖愚之分有不在於此乎然而聖人無欲者也賢人寡欲者也衆人則徇欲者也無欲故能無不知寡欲故能自其所知而達之於其所不知徇欲則蔽焉而已然而夫人未必皆聖人則亦未必皆無欲也由寡焉而寡之又寡以至於無則其於知亦幾矣且人之一心至虛也至明也而亦至不可測也虛故能入明故能照故心大則百物皆通而心小則百物皆病夫心豈有大小哉欲之所攻則虛者壅明者昏而心斯小矣是其所以不可測也辟若水鑑然其於萬物之形無不受也無不見也然揚泥於水而聚垢於鑑則茫然無覩者失其所本然也故濁澄而後水之用著蔽去而後鑑之體昭欲盡而後心之知徹是故聖人有閉邪之道有克己之功有制事制心之法有勝怠勝欲之戒其所以養之者至備也夫是以理無不窮性無不盡命無不至而天下之真知於是乎在矣此豈以聞見推測為之也哉易曰寂然不動感而遂通天下之故然則聖人所以能通天下之故者正以其無所思為而有以養其寂然不動之體云耳愚既有得於程子之說值某以是名齊遂為書其語以記之洗心亭記亭以洗心名何取於水也失古之聖人因靜以觀動因寂以御感因內以制外夫是以神而明之則能通天地之故達古今之變舉而措之則其德日新其業富有而其道在於萬世斯何也聖人之心猶水也水一萬物之形聖人一萬物之情夫皆以其至明焉耳矣聖人之心至明純乎天也而吾人之心則有不能不雜之於人者故情僞之所染物欲之所涅得失利害之所垢䝉則其虛靈之本然且將汩沒於混濁塵滓之中而不能自拔而何以成其身應天下之務哉此猶挹潢汙酌行潦而鑑之形焉鮮克見矣是非水之本也其蔽然也故君子欲有以成其身應天下之務者則必善事於心善事於心者無他亦曰以靜觀動以寂御感以內制外如聖人之所以退藏者而已於乎此洗心之亭之所以作也夫攻取煩則湛一之天淆思慮消則一致之理得今當萬感交集衆欲紛拏之時試退而休於此亭則淵然而滙者志之定也泠然而聲者氣之清也瑩然而徹者神之存也於是乎染者畢滌涅者畢潔垢䝉者畢脫而去之而吾心之天澄然湛然而天地萬物之情於是乎可見矣若是者何也其本復也故江漢之所濯無弗皓皓者矣日日之所新無弗昭昭者矣由是而觀動則動亦靜也由是而御感則感亦寂也由是而制其外則又合內外之道也洗心之義其大矣哉然而世之人於其一物之穢則必顧而惡之蹴焉而不寧而况其身乎而於心之穢則固安之矣斯孟子之所謂不知量者也夫一物之穢人必棄之今且穢其心焉而有不為天地之所棄乎然則心也者或由之為聖人或由之為天地之棄人是可畏也此亦猶夫河海溝渠異流而同源者盍亦反其本矣故愚因論洗心之義而併書其說以為記云擬三畏齊記齊以畏名示敬也三畏云何取諸吾夫子所謂君子有三畏而名之也夫人之心畏則戒戒則善由之玩則怠怠則偷偷則不善之心應之於是有邪辟放恣之為淫佚乖妄之志皆生於無所畏而已語曰險徑鮮敗輿夷道多蹶轍何則畏與不畏之間其所應殊也故畏也者聖人存之以保命賢人服之以補過中人守之以禔身詩曰畏天之威于時保之言保命也易曰君子終日乾乾夕惕若厲無咎言補過也詩曰戰戰兢兢如臨深淵如履薄氷所以禔身也蓋弗畏入畏雖聖人猶不容於自怠而况其下焉者乎是誠善惡之機而君子小人之所由岐也然而必曰有三畏者何哉三者其大也三畏至而天下之理得矣夫以天命之大也大人之達尊也聖人之言之洋洋而孔彰也天下之可畏者莫先焉然未有不畏天命而知大人聖言之可畏知大人聖言之可畏而猶肆然以敖天之命者此天下所以無理外之學也雖然約而言之不越乎一敬而已所以無心外之理而君子蓋能敬則無所不畏無所不畏則動無非天動無非天則盡性至命而為大人為聖人皆於我乎在矣又何畏與不畏之可言哉故曰齊以畏名示敬也擬修濬漕河記今夫京師天子之都百官之所治也六軍萬民之所萃也戎夷蠻狄之所四面而㑹者也禮樂之所宗也聲明軌物之所出也而其財賦之大莫不仰給於東南太宗以來蓋已百幾十年於兹矣然海道久廢而財賦之所自來止於㑹通一河故說者謂如人身之咽喉然一日食不下則死亡之禍可數日而知誠善喻也然而近年以來乃時有壅塞或塗泥不濡脛浮塵若陸河官閘吏倚視而莫知所為叢檣連艦縻岸數十里不能尺寸先者此其故何也蓋漕之成本資於黃河河一徙而之他則其流遂涸一也又或衝蕩激汩之餘淤泥沙積與涘平水乃失道二也然二者其患有久卒而其功有難易乃若今日則固有出於卒而難者此愚之所以皇皇而抱之慮也既而客有道東南來者曰塞河且復矣喜而愕焉疑不能若是亟也既而輸者至兑者亦至商之懋遷者亦至粟儲若山積貨若淵凡公私之需無不至則信乎河之亟復也然而程其功僅如干日程其力又僅如干役得非以易治其難而古之所謂善成事者哉問誰有事焉者則曰今少司空劉公董之水部某公某公等毗之是為記孝思堂記昔者聖王之制禮也必始於親親而尤重於死生之變始於親親所以不忘本也重於死生之變所以順人情而為之節也夫子之於親其深愛本乎天而况於事死之際則其情宜無所不盡其情無所不盡則將有危生滅性之為而不能以自割者矣禮所以順其情而為之節也是故為之袒括髮衰麻杖屨經以節其容為之劈踊哭泣以節其慟為之兆域棺槨衣衾牆翣紼旐以節其物為之含奠禫虞以節其饋祀為之三日三月小祥大祥以節其時夫以無窮之情而一約之以禮於是乎過之者有所裁而不及者有以勉而至故素冠廢則風人以為譏援琴而哀仲尼所以善子騫氏之守禮也雖然喪事即逺又曰之死而致死之不仁而不可為夫不仁而求逺其親此倍叛之心而孝子之所弗忍也禮事死如事生故有居喪不升降於阼階出入不當門隧蓋猶有子道焉則或於其親之既殯也為堂以奉之而朝夕獻而拜之夫亦不忍死其親之意乎此義之微而禮之所與也今夫揖遜盤辟俯仰之容必接於爼豆登明堂入清廟則祗栗肅敬之心惕然生焉何則事有其物故動不失儀物至則感是故未施敬而民敬噫孝子之執親之喪其所以飾物而導哀宜必有道矣夫飾物而導哀則思思則存存則久而不忘久而不忘者孝之本也歙上舍吳君某字有母之喪而未能即葬於是為堂以奉之而朝夕獻而拜之而或扁之曰孝思而因介侍御舒君于喬以請記于余余嘉吳君之孝能不忍死其親而憂其未能節之以禮也為推聖王所以制禮之意以記之遊宜興二洞日月記嘉靖辛丑九月十四豫侍家君遊宜興二洞先朔約唐應德偕往十五日至常州應德以事不果十六日至宜興十七日買二小舟西行至善權寺寺前松柏皆合抱殿前頗與他處不類古碑不下十數殿前有柏偃池中半空如火焚僧曰此雷火也大十圍許長數丈其枝旁生遂成四小株甚竒古俗傳殿柱有雷篆時偶失記不及觀山有洞三其一小水洞在寺后左方水由洞中流出經石澗達於河灌田凡數頃繞山行里許乃至一大水洞水從諸山來流入洞中前有方池舊傳可以浮舟今亂石錯布寬廣亦僅數步而已洞右壁有石田數十區水滿其中其上乃為乾洞洞中貫一柱若分為二入數武地漸髙左右石皆竒麗是夜還宿寺中雨竟夕十八日雨漸止遂肩輿至張公洞約行三四十里洞口在山上其外塊然積土無可觀者入洞少憩石臺上遂束藳前導攀陟什數百步且休且行由后洞出其中石有名石牀者有名石灶者有名米堆者鹽堆者有名張公驢迹者天然如驢足所印有如人拱者有如纓絡幡蓋者仰觀有石溜出崖間蜿蜒如龍蛇雖刻畫不能肖也既下山宿道觀中觀甚荒落四周皆荆榛䝉翳牆間有玉泉字遂以名觀余從觀後散步乃見類石柱立草中去石柱有廢殿基其庋柱石猶存方數尺蓋常毁於火今所謂觀特其廡屋而已山下亦有石洞壁立水匯其下為方池建亭其上十九日復肩輿至玉女潭其山去張洞七八里許史氏得之盤屈而上徑左右皆大石林立如虎如象如蟠桃不可悉狀未至潭上有洞二俯見潭中名金液玉液下山循長澗行澗中多竒石石梁其上水聲潺潺從梁下㵼出少憩遂行又五十里始入城未至十里而雨衣皆沾濕同遊者劉君寵蔡仲魯也二十二日始抵家往返凡九日云游西湖日月記嘉靖辛丑十月四日熊叔易唐應德至自常州將往紹興弔其亡友余久有西湖之約遂附其舟行初五日早至蘇州是夜至吳江初六至嘉興初七至崇德初八至錢塘初九至昭慶寺方丈少憩即戒壇左僧室也時已約楊汝成祐先至遂同觀大佛寺寺有金身半出地蓋鑿山為之俗云即秦王纜船石也拜嶽武穆墓祠又於其十六世孫處索觀武穆畫像目長細挾書觀殊不類武將及賜敕一通髙宗手書又嶽珂誥一通已殘闕唯官資僅存至集慶寺觀宋理宗畫像又一軸微小似今人所圗行樂理宗居前其次度宗最後帝昺尚幼妃二人其一為閻妃其一不知為誰二內豎夾侍凡為像七畫殊不工然紙甚古遂至下天竺觀三生石坐飛來峯入飛來洞洞前即靈隱寺冷泉亭在焉洞內外皆鏨石為諸菩薩天王像返乃宿保叔塔左僧房張子文瀚以余同年茅私獻瓚以余同官皆㑹飲小閣上與楊凡六人閣名天然圗畫俯瞰湖中每夜慿欄有漁火滿湖㸃㸃照映是夜大風微雨無所見惟聞塔四周鈴聲鏦錚竟夕初十日由北山下泛湖至孤山登林和靖放鶴亭亭後即其墓也傍為四賢祠祀李鄴侯白居易蘇子瞻及和靖凡四像復登舟謁于肅愍墓墓有祠屋若干楹制甚壯麗晚乃抵藕花居亦一小寺也寺前皆荷池故名是夜宿净慈寺寺有大樓五間在佛殿左殿亦甚壯麗與靈隱埒殿左復有屋四十八間塑應真像凡五百軀軀皆長大種種異相十一日早餐罷熊君唐君别去渡錢塘楊茅亦各返豫獨與張子僦葉舟至昭慶始别是日豫獨處方丈戒門者無泄豫返頃之陳太守仕賢來寺僧懼不敢隱豫不得已與相見十二日豫復乘小竹兜入城拉張子登吳山山有十廟僅入伍公城隍二祠而已城隍祠前望大江後望西湖環帶掩映亦一佳處也左有屋一區為蒞任官齊宿之地遂至紫陽菴登蓬萊閣入野鶴亭觀仙人丁野鶴真身有洞名瑞石古洞凡此山石無一不可人意又有真武閣架深崖豫與張子同飯於洞中復登輿至雲居寺然紫陽山間有路可徑抵雲居步行甚近未至寺有門匾曰翠濤入門多大松怪石磊落可愛寺依城城上粉堞參差可數因山為之入寺雨甚不可留遂至張子維嶽所弔留宿西井寺寺有鄴侯井故名井員徑七八尺甃以石水深二丈許居民往來行汲或育金魚其中上為石欄可慿而數也十三日豫遂還舟舟艤德勝壩恐為好事者所踪跡稍徙去里許以待二君復七日始至至二十四日始抵家云說敬義說夫道一而已矣而有敬義之别者何也曰敬義所以合外內之道也易曰敬以直內義以方外敬義立而德不孤然則敬義廢德斯孤矣而何以為道是故敬不獨成義不虛行體用之謂也昔者堯舜禹湯文武相授一道所謂以義制事以禮制心即湯之所得於三聖者也而敬義之云實昉於此然則易之所謂直內者制心法也所謂方外者制事法也夫人自五性感動而善惡分焉萬事出焉則吉凶悔吝始擾擾焉有百慮而殊塗者矣故內非敬則無以遏其萌外非義則無以貞其動而心之與事皆無所於制焉於是而有情欲利害之私乖妄淫辟之行則德由以邪而道由以病矣此易書之所為作也然敬言內義言外非二之也敬其體義其用合而言之道也故內之不直則虛靈蔽而外無所主外之不方則物交蔽而內無所守此正內外之所以合一而敬義之所以交相為用者也不然則敬何以能成始成終而義外之說孟子於告子亦可以無深闢矣古之聖人瞬存息養何敬非義出入起居何義非敬發於其心而措之於事蓋體即敬而用即義耳又何內外之可言哉且詩書所稱於堯舜湯文曰欽明曰溫恭曰聖敬日躋曰緝熙敬止斯豈以義為可略哉蓋一敬立而義行乎其中心既制而天下之事盡矣故嘗竊為之說曰體用合一存乎心內外合一存乎敬敬義合一存乎聖夜氣說今夫人之一身莫非天地之氣天地之氣一也故夜旦為日夜旦蓋天地之氣所以能生生不已而變化既成萬物者也天地之氣有夜旦人之氣亦有夜旦斯皆動靜之所為也方其動也紛紜雜揉往來交錯羣而為萬有離而為百慮舉天下皆若閧市焉此其氣安得而不耗及其靜也則寂然而已故動極而靜耗極而復晝夜之相交則氣之聚散出入斯其在矣天地且然而況於人乎誠以湛一者氣之本攻取者氣之欲人之心其始莫非仁義也其所得於天者本然也自其耳目之所接情僞之所感利欲之所攻知誘而物化焉其與存者幾何然其所得於天者要未嘗亡其蔽則然耳至於氣定之時則聞見有所不及思慮有所未營客感既除則向之蔽者未始不豁然開也故善養心者乘其暫開之機而復其所本然而其不善養者則一於蔽而日甚矣其所以或為聖賢而或為禽獸者皆由夫人而已而或以為天之降才爾殊者賊夫人之論也誠以氣之生也甚微而其積也有漸其戕之甚易而培之甚難此衆人之所以自滅其天而君子之所以善反其本也欲養心者求孟子之說而三復焉則雖有不存焉者寡矣節用愛人說有國者不可以不知仁義為人君而不知仁義之道者必有侈肆驕汰之為為人臣而不知仁義之道者必有逢君長惡之罪蓋仁則必義義以成仁二者之相為用久矣何謂仁愛人其大也何謂義節用其本也古之人君親其民也猶赤子也蓋之如天容之如地苟有以拂民之情而便其欲其忍之乎夫是以施必取其厚斂必從其薄事必度其中用必依於禮而民莫不得紓其力養其財以自遂於仰事俯育之間此義之盡也仁之至也故土階茅茨而後堯得以成其如天之仁禹非惡衣卑室則其胼胝而焦勞於外者恐亦無以實惠乎下也故仁君無侈心淫辟多虐政其所由然也而世之諂夫諛臣類以為人主富有天下威福玉食此天之所以奉乎君故窮出萃萬方之有以為一人奉而不可謂之糜在吾之政有以利天下而吾心不忘百姓云耳噫是賊其君者也用非財不行財非民不可以徒而致也天地之生財不在官則在民故民之不足者由財之在官也民不足則政無所於善而惠無所於施而猶曰我能愛人愛人其誰與之况夫人君之有侈費者必有侈心侈心一萌則以人從欲而敗度敗禮罔不由之尚安有百姓之念哉昔者漢文欲作露臺而止曰百金中人十家之産也使文帝之念不在民計不慮費則臺成而十家之産傾矣傾其産而猶曰我能愛之有是哉有是哉至於千金萬金則又可知矣故文帝之所以為仁君者其用財有義而得其本也且愚聞之易曰何以守位曰人何以聚人曰財故用不節則財不足財不足則人不可得而聚人不可得而聚則位不可得而守矣由是則知節用固所以愛人而愛人實所以愛其國也噫人君之知愛其國者其勿以節用為餘事哉弭盜說乙未嵗盜賊竊發湖湘間守土者懼其滋蔓亟搆捕之有某城尉獨不行其大吏檄而詰之曰若將與盜從事耶奚直為此泄泄也尉唯唯而退且言曰此吾職也吾且徵功焉然心有不可者若炊湯而加薪使豫一人揚之其滄幾何夫盜者非異人殊壤若徼外夷也其驅固然傳曰上之所為民之歸也若上所不為而民或為之是以加刑罰焉而無敢不威今上之所為而民為之乃其所也其又何誅焉夫盜賊之罪死夫人而能知之謂其皆愚無知者謬也然則將故為之與語曰竊鈎者誅竊國者為諸侯一何不傭之甚也夫為其不傭而輕犯法斯故也亦有說焉矣國家乂安內外無金革之警武吏坐食則例以要害付之司遊徼焉而其子弟無賴往往與坊市惡少相從翕馳馬於長楸廣陌之間無人之地試一呼而得懷資焉則終身顛冥食且衣之矣父兄知之類不忍舉或利之也其所部更與為耳目豫一見喪資者每叩諸老校輒能得其主名曰是某也某也輒黯然而已此惟河以北山之東尤甚而畿邑之間攖金於白晝大都之中率又此輩也若是是揭盜之幟而設之藪也於乎此其與徼巡之卒刀筆小吏觸憲而與盜盜者甚不侔矣徼巡之卒刀筆小吏與盜盜者得即置于理而獨如此輩何哉郡守縣吏天子所使以理一方也古今所謂民之父母也而貪人墨吏乃直逐逐然巧取而隂奪之日出坐而决事退而密商計其贏虛焉日朘月削剝膚及體栁宗元所謂豈惟怠之又從而盜之者也或幸而敗則其罪止於黜官彼且甘心以為是足相博也其不幸不敗而又因厚資捐其什一以市顯位者何比比然也是顯盜也何以止吾盜此之不恤而又奚求哉故曰上之所為而民亦為之也雖然盜賊者誅之非難已之難耳已之始非難其終難耳是區區者可咄咤解也抑獨有後虞焉人之言曰治世無盜豐世亦無盜是二者亦相大同道之行世謀閉不興而盜竊亂賊不作故外户不閉抑非無水早凶荒也其備之有具故其民常豐今者蓄泄之利弛而弗修郡邑上書言水旱者牘且盈公車煩於受焉嵗兹大祲而司空程作費常以巨萬計斯皆何所取之哉貧民倒罌搜篋無顆粟一錢之儲而官吏督之弗置因是而轉徙流離者相望也而有司以課最䝉賞其征需又方百出焉夫時詘舉贏古人所戒今且廣用而欲約取之無是也博取之而欲民之無窮亦無是也民窮而欲其無為盜賊又萬無是也豫是以終虞之古之盜賊未嘗不自小羣而為大羣其始以為鼠竊狗偷忽而據州郡亂天下者不少矣即張敞虞詡之䇿不足施而龔遂之化奚及用哉此又不可以責之臣也王子聞而善之作弭盜說師說代奚世卿作夫政有休慝教有汙隆君子於是乎辨得失徵理亂焉民德無恆繄上所使古者治出於一故立為彛訓布為紀法導為軌物聲為命令風為俗習曹趨之而無有淫心與其邪行焉其教之所尼政斯釐之政之所逸刑斯坊之上不分民而化民不易已而聽後世長民者不純於德而政不可勝理也則又置輔而專屬之以教於是乎郡邑有博士官而治始二然黨庠術序意古亦王官耳而以貴以賢以道以治其為長吏師儒雖異其於得民同也漢唐以來官不典著或因地所宜便臣下所建請至我國家崇化導民慮周而制詳於是建學立師達之天下其所郡邑雖海陬嶺徼無十雉之城無百户之聚者悉置之無虛員籍其分職之數與郡邑官等而責亦均已然而資品擢敘比之郡邑稍輕而得之者又不皆雋碩博雅有宏志逺識欲建事起名蓋窮老而需祿者半焉責雖專顧職益以不舉用是教無所於興而政日滋替其手遺經倚講席左右列弟子員以修故事者猶歷數城得一人焉况能真以身為師敦質行而樹風聲者豈不益僅見也某字楊君之蒞教於吾鄉也其行彬彬不越其素其志亹亹不易其官諸弟子既樂於有所考業受道而尤能不忘其先人之訓以日陟降而依懷之其或動於心則肅焉如有在愴焉如不能以終日抑不可謂懋於孝而克永其思以無忘其親者乎夫文教者孝也孝德之本也非是本不修教斯忘矣孝而不於其身猶空言爾小宛之慮善喻螟蛉焉取其似也又曰夙興夜寐無忝所生取其思也今楊君有夙興之思而以導諸生焉雖弗求似其有不似者寡矣抑不可謂能知教之本而不為空言者乎吾蓋知其於政為有助也古者求忠臣於孝子之門則楊君當必以是大有庸矣豫既嘉其能無負於朝廷立師之意也為書其說以徵之梟羮說五月五日羮梟以賜百官事載前史說者以為惡鳥故欲食之使無遺育然必以五月之五日則食且有時其種之殄者幾何矣意者以食所宜如仲夏之月其味苦食菽與雞與雛嘗黍之類歟則梟又非食物之正不登於爼者也且以為義存去惡則百官靜事無刑固是月令也而罰諸鳥焉亦末矣竊謂先王謹於隂陽之際凡可以助陽而抑隂者無弗力焉是月也雖五陽方盛而一隂已生於下其勢將日長而梟隂類也羮而食之抑以致抑隂之意耳其必賜之臣下示交戒也易曰童牛之牾又曰豶豕之牙其抑隂之道率若是矣然則羮梟固童牛豶豕之義與雜說人之五官曰耳目口鼻心聖人聰明睿知是五官各舉其職者也故能首出庶物以立德而𢎞業然雖至愚亦有不盡廢者耳有所不聞目有所不見心有所不能思蠢然與木石禽獸無異而口未嘗不食何也則其生之所係也天之所以齊聖愚而兼容並育者也故聾瞽狂罔之疾皆不能死人而不食者必死天之道也孟子曰飲食之人則人賤之矣何賤乎夫亦以其與木石禽獸者類而世之貪於飲食如王何輩其心似非愚而顧與愚人不相逺何居具茨文集卷三
