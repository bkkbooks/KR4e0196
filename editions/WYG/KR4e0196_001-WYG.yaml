body:
  text: 具茨詩集巻一明王立道撰擬古詩擬青青陵上栢飛飛草上塵皚皚壑中氷天地若大冶誰能乆寓形親交在閒暇斗酒相招尋樂飲未終竟駕言逰帝城帝城何巍巍車馬如流星連雲開甲第繡戸連朱甍歌鐘日暮起四屋明華鐙且盡生前樂何知身後名擬今日良燕㑹来日不可知今夕聊自娱投壺雜六博鳴鼓吹笙竽酒酣援筑起一撃一泫如四座發慷慨欲語還拊髀夭夭桃李花榮華能幾時何不奮長翮致身青雲梯無為若鷦鷯一枝獨卑棲擬迢迢牽牛星隱隱西山陽翩翩孤鳳凰欲棲無梧桐欲食無玕琅浮雲翳朝日荆杞生髙岡瀛海萬里濶九天何茫茫丹書未能吐千仞安得翔擬生年不滿百人生不百年幼老居其半况復晝夜分憂疾多縈絆但恐日不足誰言樂未央無為效貪夫擾擾聲利塲自昔惟軒轅乗雲逰帝鄉擬東城髙且長河水廣且深浩浩不可涉濃霜摧蒹葭蘭芷奪幽色春華復幾時忽已秋節易蟋蟀憂太康山樞意逾戚對酒不作樂鬱鬱何所適邯鄲多才人綽約傾城國皓齒雙蛾眉盈盈歌白雪曲終竟誰和觀者徒千百徘徊振衣袂凄然涙霑臆願為雙飛鴻青㝠舉長翮擬冉冉孤生竹離離寄生草施彼南山松而我求婚媾萑苕托飛蓬飛蓬易轉蕩夫婦安得終結髮不再朞棄我如飄風重閨咫尺間君心邈千重彼美荆山璞瑩然白玉中良工不見剖瓦礫相詬蒙君寧長棄捐妾心守孤忠擬明月何皎皎庭中芙蓉花冉冉朝露晞渥膏不能沐歛髮出重闈故鄉諒不惡何為在天涯仰天長歎息入户復躊躇盻盻芳樹枝悲風入我帷擬庭中有竒樹南山有松栢女蘿相纏綿攀枝采女蘿感歎終無言草木自因依何况骨肉間緘蘿寄同父路遥安得便擬迴車駕言邁驅車臨廣陌駕言歸故鄉天空木葉下百草凄以黄萬物有衰歇人命安得長駸駸西日頽桑榆留夕陽停軌失咫尺疾騁無迷方黽勉崇令徳千載垂清光擬去者日以踈来者未有極往者良已矣道傍壟成行日夕多風雨黄蒿塞墓門颯颯青楓樹重關扃幽泉螻蟻相料理悲彼逺逰人不如疾歸止擬驅車上東門驅車出北邙髙墳何纍纍狐狸晝躑躅豐碑隱蒿莱人云漢将相奕奕多賢才一朝隨物化千秋委寒灰流光歘飛電東月忽西頽黄泉如尾閭去者不一囘我欲志竹帛虚名安在哉不如且行樂㫖酒盈我杯擬凛凛嵗云暮肅肅秋節至草腐夕螢飛衆芳盡零落霜露沾人衣衣沾不足惜惜此綺羅襦錦衾憐獨旦彷彿夢見之執手相晤言燕婉追昔時願得同予美兩情終不渝誓言未終竟恍然出中閨不如鴛與鴦兩兩相迫飛日出倚庭樹彷徨戀落暉耿耿抱素志淚下不自知擬客從逺方来客従江東来遺我五色絹一心不相忘萬里詎云逺手裁合歡襦加以錦繡緣餘為連理帶雜佩相糾纏霜凄北風寒與子常相見擬行行重行行一日復一日與君久離别妾身在漢陽君居泰山側川阪東西長欲往無輿楫吳牛不北轅燕鳥無南翼日月有晝夜妾心靡朝夕㝠冥塵滿天欲歸路安適冉冉嵗云莫坐凋紅芳色相思勿復陳黽勉期令徳擬青青河畔草夭夭陌上花紛紛桃與李迢迢綺樓端楚楚倡家子翩翩翠袖垂盈盈歌皓齒新人良足娱故歡棄如屣涼風驚素秋芳華難久恃擬明月皎夜光流火下西極蟪蛄鳴東廂涼颷奪炎熱白露凝清光百草非故色木葉萎以黄昔與二三子學道欣同方翻然棄舊好振羽髙雲翔河漢不可涉織女空七襄人心異於面相知安得長送全翁掌教常熟聖逺斯道熄譊譊世争鳴詞華蕩文士章句老經生豈無董韓徒千載猶晨星青紫開捷徑身名以為榮淪胥迨有宋羣哲時乃興長夜發熒燭迷途始知津聖代振昌運鄉國儲才英詩書被遐壤登堂藹儒紳嗟彼禄利途猶為後進縈憶昔安國子蘇學卓有聲先生富道徳弟子多循循孰云教已頽而不由人行佇看春風滿桃李羅前庭院中中秋對月秋期忽已半凄凄天氣涼豈不悲揺落惜此滿月光流輝掩南極素影迴東方城霞散如綺庭露森成霜列星失其耀玉繩何微茫徘徊循廣除吸景行急觴願因三五夕復見重輪祥繼明溥離照千秋永無疆送盧子才翩翩孤鳳凰鏘鏘鳴朝日長風暗天徼零落梧桐葉琅玕飽雞鶩佇立不能食側翅下髙岡饑飛向江浙獨鵠中道逢語臆長歎息相期早来儀林棲多枳棘雲峯巻為沈夷齋題南山鬱嵯峨下有髙士廬列峯瞰虛牖流水循東隅荒徑罕人跡空梁見懸車主人日杖屨徙倚臨前除朝看山上雲日夕忘所如豈無章紱貴愛此田園居乞身自强健何如漢二疎愧我戀斗粟不能共焚魚達人未忘物卜居當雲峯雲以擬時故峯以况髙蹤千仞自壁立萬變從飄風豈以絶世標寄兹聚散中峰雲本兩忘兀坐觀太空騏驥知畏塗駑馬無停足蕭榝連林青霜摧蕙如束雷同不違時髙明自疑俗之子起百里整轡騖長轂何當中路旋悠悠向空谷巖居謝世紛停雲想賢躅結組非趨榮投簮乃辭辱滔滔復何為逺道多傾覆輓陳茶丘悠悠丹旐發漠漠素車迴落日猶殘草空牆自古槐夙期書竹帛奄見泣瓊瑰東魯悲顔夭西京惜誼才玉樓須作記金谷漫浮埃千里駒中蹶三秋蕙早摧徳星無復聚薤露不禁哀願學燃犀術流光照夜臺送沈夷齋素秋金氣應涼飈蕩炎蒸仰觀衆星列俯聴幽蟲唫申旦不能寐攬衣步前庭我友逝言邁告我東南征誰云東南近萬里越重城浮雲浩無極我思何能任飲以金屈卮歌我吳趨行聊且娱酣宴無為獨霑纓飛来雲中鴈什伍自成行如何同心友各往天一方憶與君相見桃李熙春陽共感時華盛交勵茂名揚胡然忽離迹飛藿巻寒霜天時有代謝人事安可常不見參與辰出沒遥相望雖有盈樽酒何能解中腸宛宛庭中蘭三年植芳墀馨香忽盈袖采掇驚華滋詎意涼飈起吹向天南涯草木有臭味開發異根蕤空令中畹蕙揜抑凄光儀願得因迴風返我故畝畦夏夜泛梁溪幽尋極寥廓理棹清溪長落日照孤嶼㣲風生夜涼須㬰逺雰淨百里開湖光漁子相傍宿月明歌滄浪採芳不能浴悄然悲沅湘賦得雲谷送徐西巖司甌寧訓逺樹圍越岑猶疑見殘暑緩䇿恣幽探翛然若遐舉山空世氛歇閒雲獨来去夕陽照谷口當時讀書處回首紫陽人因之理芳緒題宜山顯晦有本性之子亦何宜坐石頫幽遐看雲陟嶔﨑嵐光逗蓬戸谷聲清蕙帷由来丘壑質豈伊軒組期時逢山中叟杳然歌紫芝乗月尋藕華居湖上飛鳥還迴沿倦日夕曳衣遵前林轉見溪路窄疎影落髙樹荒堦悄行跡如聞異香滿微風起空碧何年雨寳花散落神仙宅因之結琳宇度波渚有厄了知清浄心祇以世氛隔還期濯塵纓此中長面壁紫陽菴觀丁野鶴真身客本山中人還向山中息伐毛滄海上煮石清溪側鶴胎養𤣥牝蟬蛻遺金骨此身亦非我去来偶相值丹砂誤時人空復錬形質山房夜不扃孤猿嘯寒月雲居寺山徑白雲滿泠然見鳴鐘夤緣出木杪古殿蒼苔封忽若萬頃濤天風下長松迢遞轉幽壑煙蘿迷石叢頗疑去人境乃與城南通粉堞明㕘差俯視百里中地分意自隔山迥趣乃窮怡恱良自足幽期誰與同湖上山閣夜眺湖中景初晏四山澹寒烟丹楓不辨色翳翳隨清漣獨往無扁舟把酒臨層巔髙閣聊騁望星河亘長天漁火深夜出前溪聞扣舷攬衣不能寐起詠滄浪篇蘭石為華氏作崇蘭出深谷孤石相因依突兀隠靈異葳蕤媚階墀綠葉交紫莖随風揚芬菲零露泫朝采莓苔生碧衣願言紉雜佩芳華傷獨知同心曠修阻匪石良可希李節推乃祖衡嶽齋手巻衡山殿南荒上托朱鳥精嵬峨隠天半雲霞浩縦横列仙紛遺搆千古含神靈玉洞饒寳籙紫文閟丹經至道一得窺夀與天地并揮手揖洪厓長嘯招期生埏垓不足㳺飄揺凌太清楓潭詩達人寡所營築室負嶇嶔下有千尺潭上有楓樹林豈不邈遐阻雅尚在髙深㣲風起中谷山水多清音出處難豫謀下邑聊鳴琴匪伊三徑資劇理余所任因兹寄幽跡泊然増道心途中懐所知逺道多滯淫孤舟遡煩暑山川異風壤鄉路餘幾許永念同心人日夕成離阻芳辰闕良讌感物増憂緒鴻雁起東南依依嘯羣侣而我獨緘情持觴對遥嶼午日途中憶諸弟令節迎始陽我行滯東魯弱艾稍含青菖花晩應吐憶昨侍親闈燕賞亦已屢兹辰樂復劇盈尊湛清醑拜跪獻中庭怡然共起舞鬭草惜餘歡勝負非有取離居忽自今遺俗猶往古骨肉各相望有酒寧獨撫慊慊終永日安得凌風羽憶弟曠嵗懽一遇悵别還自知池草萋已緑逺逰意多違燕私阻晨夕臨觴不能持身非隨陽鳥春来獨分飛矯首望天末風塵正滿衣橋隠郭翁墓於寵泉之瀨源逖懐往哲詩以吊之平林澹寒烟重臺閟𤣥宅睠言懐髙人千秋晦貞魄翁昔希陸沈雅尚儷泉石義訓良自嚴嘉祥著清白芝蘭盈我階青紫看成列瞻彼少㣲星一朝光景蝕河清木已拱山空桂華寂老成乆徂謝耿耿悲遺則下邳子房祠圯橋故處驅車入古城蒼茫逺山夕桑田湮碧流遺碑表阡術圮橋幾千載裒土不盈尺寒鳥下荒蕪猶疑墮履跡昔此開一編秦鹿紛争逸老人亦天授寓言糓城北迹與四皓俱名隨兩生匿祇令後世人空復祠黄石溪行偶得顧氏别業日入理輕棹所欲避人喧迴沿清溪側迢迢見孤村始疑松菊逕復似桃花源林際見明月浦口聞驚猿嘯傲倚修竹歩屣随芳蓀本求於陵隠兼得辟疆園闕將同漁父言詠史烏獲勝千鈞誰能聁蟬翼矯矯松與栢曽是猿狙杙用小妨名材任輕羞絶力傅吕昔未遇寧為漁築匿乗雲履風霆歘然周八極事功葢商周名與天地匹惜無善圖史英䧺久淪沒送駱兩溪謝病還武康余從五湖来君向五湖去雖増暌擕戚頗羨山水遇蕭條中林扉當時讀書處祿因多病郤賦以閒居著田里遂初服江湖抱先慮幸䝉藥石餘一解余沈痼平岡七夕見招風雨不克赴佇看牛女㑹箕畢爾何如旅舍悲秋早華堂卜夜虛秖憐衝裋褐寧恨濕仙裾載酒還相許重尋水竹居弦月行應滿招尋共直廬喜雨春来常少兩入夏更焦枯逺近多荒壤流移已載塗九重宵旰切百辟隠憂俱已見崇周祀還聞賜漢租隂雲迎曉結甘澍應時須颯颯来千嶂森森散八區野烟浮菽麥夕照失桑榆水濶魚龍走城髙鳥雀呼鬱蒸愁並減霑灑暍先蘇此日休徴應謳歌滿帝都送人上陵列聖𤣥宫閟千年佳氣浮雲深九疑顗風動五陵秋流水期同體因山本儉謀蕭條玉几在彷彿翠華逰龍去誰云逺遺弓泣未休王侍御席上觀畫水三江何處落一座忽皆傾颯颯風翻檻㝠㝠雨暗城魚龍春已化罔象夜偏驚轉燭波縈日傳杯浪逐萍圖窮疑見岸流急不聞聲試問繡衣使仙槎幾度行送嚴都事使浙幕府三秋客清江八月槎論兵初報主學禮早承家仙仗催行色鄉情寄物華髙堂時倚望歸斾莫令賒擬古手搴芳桂枝瑶華復盈把欲遺同心人道逺無車馬秋来涇渭深橋梁不可假時久傷萎摧愴然棄中野雜詩太牢饗雜縣不能飡一臠至味芳且腴無乃非鳥養嗜淺才廼疎厚殖意彌廣為農卒吾嵗喜得従偃仰肉食乗華軒真性多所枉髙樹畏多風蔓草日見薙竒質罕自全下士甘淪棄材與不材間莊生以為處詹尹時不逢斯言竟何是詠史昔聞陸大夫聲譽傾西都詩書牖明主將相欽良圖解槖庭下散擊鮮里中娛本期樂當年寧復憂妻孥名位不可常多財還自愚惜哉絳灌徒功成何區區館陶主人翁洛陽賣珠子散金買聲名寵愛傾戚里翩翩東方生滑稽何其鄙一朝辟㦸言萬乗逡巡起雄略代所希舉俗憎逆耳坐令狐䑕驕白日遊都市題石厓巻蚤嵗慕探厯浪迹游江湘朝遡洞庭波夜發漢水陽漢水日東逝鴻雁多南翔感此惜餘景駕言返故鄉徙倚桂枝晩夷猶春草芳開林發幽峭陟巘披遐荒寒蕪被廣隰陽葩耀崇岡市隠豈云易巖棲聊徜徉赤松與王喬末路期相將連峰何㠝岏深谷自逶迤境阻塵慮絶眺迥物趣竒有時發清嘯四山生寒姿天際征鳥疾木杪驚猿窺迴颷激長林浮雲亂層谿宇宙意自豁簮組復何為為王允寧贈婦四首僕惟晉二陸為彦先贈婦詞並清麗可玩誦而後之擬作者絶焉無聞豈不以嬿婉之恩逺於大雅然哉昨偶披晉輯聊復為王子作之雖才謝機雲庶幾古人發乎情止乎禮義云爾不識覽者以為然否肅肅整晨駕行行出秦中百里日復舍暮天多寒風豈不憚雨雪王事縻我躬念此如宿夕胡然隔春冬矯首望西南雙雙見飛鴻飛鴻有羽翼天路将安從北征日以逺逺道衣裳單春風薄天涯閨中常自寒辛勤理機杼日夕掩重闗上堂親飯姑下堂不能飡離離芳樹枝脈脈終無言東城十二樓迢迢青雲端盈盈誰家子灼灼桃李顔朱脣揚妙曲寳瑟流哀彈三歎有餘音一顧傾城觀信美匪吾思秦聲故所歡寸心常不隔所恨曠周旋願言保菅蒯令徳良獨難黄鵠千里逰燕雀巢屋梁小人事齷齪丈夫志四方念子疇昔言沈思激中腸赫赫盛明時羣賢並翺翔朝趨銅馬門夜直金華堂韓鄭互推轂貢生彈其冠所期崇令名室家自輝光無為兒女仁慊慊懐故鄉雪屏為趙考功賦佳人愛南麓卜築擬東山地勝非因選巖幽自可攀海成人耳抱石綴雪膚斑髙下鳥留道逶迤龍作闗昔稱萬夫險今共一川閒蠻市喧林際夷歌出谷間峯疑巫峡裏水似武夷灣乆憶滄洲侣聊従青瑣班江花㡬開落溪月自潺湲魚鳥丘中賞風塵天畔顔山隂空寄興安石未應還宿益上人房流覽及兹辰盤紆陟崇巘㝠色下巖扉鳥啼前林晚涼風起松杪谿雲自舒巻幽期一以惬相對各忘返倚石聴樵語持經共僧飯試問山中人何如逢恵逺晩還别墅築室負東阡開門望禾黍水流滿新塍連疇何瀰瀰日色時隠見濕虹巻殘雨蓑笠壠上兒牽牛飲清渚折蘆行且吹兩兩前村去初發鄉邑别親知揆已慚蹇拙蚤為塵網嬰彌年謝朝列稍得任吾真㳺息偶耕釣琴書澹餘清林園變時序端居念王程整駕倐晨邁耿耿辭宻親匪嗟倦行役曽是憂緇磷永懐千里道中情難具陳問故園倦㳺無素業溪上聊避喧因兹役風塵轉復思丘樊蘭徑日以合桂枝秋正繁斜景度書幌鳥鳴窺前軒谷口迹已蕪北山意彌敦華組不足覊允懐明主恩南村一首我逢南村人為問南村路杳悄入蘿薜依㣲辨烟樹日出散雞豚春至營農圃鄰里數相過壺觴自成趣城市獨何為車塵滿朝暮懐朱數疇吾兄東南秀矯矯青雲姿弱齡㺯芳翰𤣥文吐竒思一經夏侯學廿年董生帷雅志古人㑹獨行俗士疑獻賦未云遇踠足清明時驥齒嗟已至曠波千里期何當逢伯樂為君解紵衣蘐節圖為俞汝承題有草目以萱英英倚孤岑皎皎嵗寒節風霜詎能侵北堂寧以清耿耿懐素心一朝結芳實蓺之瓊樹林邵氏貞孝巻結髪事良人婉孌方及時何意忽棄捐百年曠前期鏡破難復合鸞孤不成飛一死寧自惜念此乳下兒辛苦理織紝伶仃母心悲撫兒兒有成宗祀幸不隳清氷出寒潭白璧揚光輝風聲動里閭髙門鬱崔嵬斯名吾何心節苦良獨知黄鵠有遺歌千載令人思履端詩館試天行有終始貞元若連環𤣥冥頓窮轡勾芒行其官萬物回春姿八荒同熙然王正啟休厯時龍躡乾端羣材仰明哲藹藹共躋攀結綬金馬門論道雲臺間努力圖不朽失時空自嘆咏懐解薜㳺京洛登朝襲華組拙疾寡所諧一心事明主寓言或玩世為行多泥古巧宦寜寂寂學步終踽踽徒慚短綆汲强作長袖舞子雲安執㦸相如榮負弩徇祿祗自疲謀道良有取卒嵗何悠㳺永願營農圃丁未嵗病起入都有懐里中諸友作藥名詩貽之微尚甘草莱桂枝自淹留爰附子年情謬寄生人憂半夏渉長道天門足䕃休迢迢望南星逺志成倦遊藤蘿蔓荆扉杞菊荒深秋防已挂塵網遄當歸舊丘鳥名皇居肅鳳城迢遞干雲霓孔葢凌風翔翠幬紛綺纈伊余慕休名雀躍趍前哲射隼幸逢時鴻飛下覊紲差池背雁行委蛇濫鴛列彈冠侈鵕䴊含香重雞舌自憐鷦鷯枝徒慚鷽鳩拙關雎詠清化鳬鷖際盛烈眷言守忠貞寜復辭緇涅草名早為芸閣吏叢蘭春復秋吾道隨巻葹誅茅溪水頭送客蘼蕪徑採芳杜若洲雜詩二首獨樹生窮谷枝榦何離竒本無廊廟用誤為匠石知斤墨既錯陳青黄亦互施雖云托華屋寜復山林姿龍擾失其神坐令燕雀疑玉成世所寳大璞還自虧造物固其然豈得尤工師翻羨不材者終年養華滋征途與日長逶遲及春暮山川異土風心賞邈難遇言念中田廬幽期久淪誤臨流懐在澗攀林憶芳樹極浦矚去帆平原羨歸羽迴沿窮昬旭逼側謝墳素遥負北山文空擬歸田賦書館述懐涼秋肅金氣玉露凋青林㣲風拂虚牖蕭然吹我襟感此時序易嵗月何侵尋鄴侯架萬巻諸葛一長吟儒生事稽古志士多苦音我昔仰尼父斯文以為任哲人乆云萎傳之回與參參乎唯一貫回仁三月心觀海登泰山由来髙且深夜央不能寐耿耿寜自今論交青青大田麻蓬生滿其中弱絲附直幹纏綿得所從古人重友生資彼麗澤功傾葢一相知白首此心同誰言淡如水君子貴有終乾餱起愆怒習習多谷風平生握手歡笑語藏機鋒利合誼還厚勢盡情自窮歌彼伐木詩愴然感予衷盆榴嘉木来安石移根向玉堂亭亭傾翠葢隠隠孕紅粧葉潤初晞露花遲解待陽層隂清晝氣竒艷奪天香尺土能滋幹三春獨揜芳匡廬多紫蕚南國重朱房旖旎時憑檻紛敷共映觴時無槖駞子養樹說誰長春郊即事柔風吹緑野靈雨下桑田泥泥花間露霏霏草上烟鳴鞭薊門道弭節燕臺邊芳樹連絲障垂楊拂錦韉未能㳺曲水時復問温泉地迥山川静天髙宫闕連相将瑶瑟鼓共醉羽觴傳白日恒隨轉青春自可憐咏歸禁城暮聊續名都篇擣衣篇樂府玉關蕭索盡音塵不可期黄姑織女星逺耀隔天階露氣侵蘭桂秋風吹鼓鼙佳人理端素堅砧杵聲哀一聲一惆悵一聲一垂洟妖蟾驚幽姿寒蛩相依啼風飄膏蘭歇月照纎雲皚紈成閴潜闥張燧候剪裁初縫合歡扇中装驃姚衣驃姚重功名勒石燕然臺妾悲難重陳嗚咽泉流知具茨詩集巻一
