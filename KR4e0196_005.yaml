body:
  text: 具茨詩集巻五明王立道撰五言絶句春雨二首館試霏㣲初洒潤霡霂自知時上林千萬樹樹樹有新枝渰渰來天際津津溜苑墻還騰百川水一雨遍遐荒郊原春望二首館試行行窮逺陌冉冉度香車未就王孫飲聊看田父鋤鶯啼燕樹合水漫渚蒲新春歸不須恨化域自常春詹司訓守貞義訓巻早慕共姜節還誇孟母賢爾來授經處應廢蓼莪篇咏園中雜花葵臥病違朝謁依然向日心不見清溪上葵花一院深罌粟野人懸磬室那得粟千罌且共搴芳實無須惜落英雞冠迎風如欲鬭徹曙不知啼舊得尸卿術栽花總似雞蝴蝶本來百蟲身墮入諸花趣有情與無情常愛中園住金錢山人賣卜歸滿砌正芳菲不堪懸竹杖留取市荷衣蔷薇密蕋與繁枝參差間竹扉紅芳雖自媚緑刺罥人衣翦春羅昔聞綵作花花却春羅似欲覔翦刀㾗盡付東風裏石竹丰茸鬭春色枝葉何娟娟弱質難棲鳯從教香麝眠玉簪擢頴疑瑤華攀條亂素手酣歌不自聊助予一搔首秋園金氣應含素向欄干莫作朝簪比唯宜戴籜冠長春長伴百花開不共百花老悞却送春詩只疑春正好碧樹攀欲盡黄鳥啼正歇一花復一花常如二三月白芙蓉抱質宜素秋開花如白槿對爾好𤣥談何郎新傅粉詠園中雜草蘭清芬惬幽抱手自植中林不須滋九畹聊此對同心萱芳叢雜芝蕙稱此北堂幽為園自可樂那必爾忘憂書帶地慚揚子宅草似鄭公鄉書巻年來廢空翻白日長繡墩百花春色裡一徑鳥聲中偏稱逰人坐壺觴誰與同千年運朝菌無晦朔此草自千年萬物枯榮理凭欄一慨然菖蒲托根長水石正與幽人宜更㸔成九節服食比華芝鳯尾竹紫文何葳蕤采采露華滋不向髙岡上常依白石墀寂寞含清露葳蕤䕃紫苔尾長無羽翼不得上仙臺詠菊梅花菊彭澤髙人里孤山處士家清明逈相映草樹亦交花萬巻書生涯萬巻書何似營農圃散帙向晴簷中有諸花譜御袍黄霜黄上林草天子欲更衣六宫齊望幸紅紫漫成圍金盞銀臺常年老瓦盆珍重花神意白衣人不來對爾聊成醉蜂房秋香初破蕋逰蜂日來往還愁蝴蝶競結窠花枝上鵞毛菊弱羽綴芳枝離褷傍水涯欲識此花品唯應逸少知樓子紅天工潛結構朶朶疊紅英為是登髙助偏宜樓子名粉西施那得東籬下忽逢浣紗女清露濕鉛華捧心寂無語僧衣褐逺師不染性持此遺陶公三徑雖云好了知色是空雙飛燕花得同心媚差池雙燕飛應多戀主意社後自忘歸蛙聲上林故多蛙爾聲何喧闐忽感自得意寫之觀物篇題四老圗四老不知姓相逢各問年山深無甲子黄髮故依然題何蘭幽谷巻代未能㳺汗漫聊自托空虚嘆息紫芝老寥寥千載餘澹菴詩浮雲看世事如水見交情此道令人棄悠然想太羮題方塘儵忽何年來鑿此混沌竅誰知方寸間雲水常相照走筆柬數疇几上五千文幽棲似鹿門春光看欲盡董相試窺園南湖畊雨武陵六景為陣節推題逺近春鳩鳴一村競田事老人抱甕來搰搰亦何意河洑漁梁窮鱗赴激湍漁子争夜漁何時更拊手濠上觀儵魚西山烟寺山空萬籟寂鐘響時出林欲尋定僧語烟蘿交翠岑桃溪晴月迴沿月明中溪花夾長鏡相逢溪上翁掉頭不言姓竹灣雪艇風雪渡頭𦂳孤城欲暮天去來總自得知是子猷船金霞夕照千峯如散綺夕陽在山半山中人欲歸適意忘景晏贈青烏家客持一巻書乾坤吐𤣥秘由來識者稀獨立寒山翠偶成故園千里外獨有夣魂過何時更攜手散髪共行歌采蓮曲八首采蓮折却藕藕折絲不絶迴船向中流綰作同心結斜睇向芙容迴身鼓蘭楫莫待暮潮生宛轉紅粧濕采蓮莫采花花盡乃成子八月白露寒悵望秋江水采蓮復采蓮蓮葉青田田舟輕風蕩漾抛失露珠圓停橈采蓮花花開半花落渌水日夜波紅芳詎如昨去覺横塘近來驚初路遥因聴竹枝曲倒把木蘭橈荷葉不任裁藕絲不任縫相呼早出浦逰子怕窺儂鳬鷖滿中流試數雙與匹賭失碧玉篸歸家不敢説七言絶句畫百花春光盡向筆端迴萬紫千紅次第開河陽滿縣真如錦却恨潘郎歸去來一自燕支屬漢家上林花草倍繁華却愁顔色隨春盡剪取枝頭一片霞又治徴巻代作海北湖南萬里程去思時復頌番君弦歌豈為營三徑却望虞山多白雲九月二日侍經筵有述露華仙掌入三秋翠幄重開拜冕旒稱制諸儒真陋漢乞言尚父未論周和唐應徳紅梅詩五首嬌唇㸃就誰相顧獨立東風漫自愁安得昭陽借君寵同時鉛粉盡含羞京國春生富貴家美人裁錦貼新花若教置向金壺裡一𣲖寒江㡬㸃霞主人舊是謫仙家常捲簾帷入綺霞為問韓郎染根手何如能染樹頭花鄉園入夢思糢糊京國相逢識得無玉貌訝從今日改清標只似向來臞羅浮一别已如夢新向燕支山下來聞道主人重華色笑顔不惜為君開送蔣醫歸江隂逺向金門欲獻方暫因采藥去江鄉開徑我須從蔣詡避名君莫似韓康送吕别駕還毘陵二首緑樹清江曉漲平春帆遥指六龍城吳中父老相迎問為説新寛百萬征東南民力近如何日見雲帆轉北河課上不須論殿最由來良吏拙催科釣臺吟送人之桐廬洛陽争覩漢官儀獨着羊裘理釣絲莫道狂奴猶故態富春山水是相知髙臺􅏭嵲俯江湍古木蒼厓清晝寒千載山川猶物色當時諸將枉登壇赤符久已定長安只合歸來把釣竿後人不讀樊英傳肯信人間行路難南巡歌八首次韻丙夜天門金鎖開珠旂葆羽拂仙臺櫜鞬躍馬新都䕶夾轂前驅萬乗來千騎如雲駐楚坡楚人從此解燕歌諸君莫作思歸調指日鑾輿復渡河楚江西自岷山來春日荆門烟樹開千載襄陽多古跡君王欲一望强臺錦字親裁龍鳯斿羽林對對拱宸旒楚人浪擬相如賦天子元非雲夢逰雲車清夜度千門雷鼓轟轟河漢翻帝座暫臨南楚分前星正照太㣲垣蒼梧雲深悲帝心龍旟春向湘江潯太史由來知聖孝虞人何事獻官箴南陽舊是帝王家西入長安望已賖春風乍到龍飛殿羽扇紛紛引翠華天臨北極鬱崔嵬玉帛年年萬國來君王二月南巡狩春水朝宗江漢迴彰義關候駕十首遥望西山紫氣生月華天際更分明旌旂歴歴穿雲樹天子歸來白玉京候蹕宵驅彰義關古橋無復水潺湲人家兩岸春楊裡舊是桑乾第㡬灣年來章奏滿公車總道遐方困未舒君王一出憐民隠扶杖山東聴詔書玉戚金戈壮國容每當三五候飛龍月中真得持盈意常見光華䕶九重南北河山共一家瓊丘仙圃自繁華上陽更有餘春在紅藥叢叢初放花燕山明月照盧溝笳吹喧喧水急流行人盡唱千秋曲一夜歡聲逹帝州朱衣對仗曉追班帝在清都虎豹關鐘鼓正傳宫漏徹侍臣端笏拜天顔燈火城西㡬萬家仗來馳道滿烟霞須㬰拜舞千官合寳炬光中駐翠華鳯詔初傳自九天賜租重見漢文年燕南楚北經行地雨露君王本不偏九天晴日六龍迴綉陌春風錦障開乍聴轆轆香車逺又見紛紛後騎催王子裕百花圗路迷誰識武陵源往事空悲金谷園愛爾丹青偏入格須知桃李本無言翦綵隋宫事已非猶餘粉黛貌芳菲莫教展向金屏裡睡蝶游蜂盡欲飛傳道昭君昨入胡後宫留得美人圗紅粧翠袖分相向只恐君王悞一呼八月秋髙白露寒浣花溪裡倍堪歎莫道紅顔多薄命寫真猶入畫圗看老將行贈孫伯泉都督射䇿當年第一人秋風感歎二毛新羽書昨夜甘泉道知爾封侯骨相真君武舉第一人早從卻縠問詩書廿載勲名寄直廬敢謂漢庭方貴少試看腰下紫金魚投筆還将注豹韜報恩寜復戀旌旄五陵舊職來相訊指㸃秋空太白髙百萬兵中擊柝聲綺裘繡帢入承明霸亭醉尉休相問帝遣将軍特夜行君所領即漢所謂北軍衛宫掖者燈下酣歌擊唾壺匣中龍劒夜噫嗚太平不用黄公畧閒與兒孫説陣圗直下金門帶劍行蕃酋夷使盡遥驚将軍莫是今方叔私向傍人問姓名定逺思歸限玉關何如出入紫霄間緩帶輕裘修羽獵時時射虎向南山穿楊才藝本天成猨臂曽傳飛将名自託年來偏矍鑠彎弧躍馬萬人傾将軍忠孝舊儒家憂國論兵兩鬢華大樹無言鈴閣静笑看燕子逐飛花君忠烈公之伯子休沐閒庭滿緑蕪丹青聊自静中娛少陵詩句余真媿戯博将軍畫馬圗君雅善丹青余盖欲有請也送陳沂赴南京衛幕水落寒江送客舟雁聲雲影共悠悠晋陵風物今何似須信相如故倦逰京國逢君未㡬霜愁看歸袂拂離觴秦淮此去三千里流入荆溪即故鄉金陵幕府静魚符列㦸常閑百萬夫莫謂太平渾忘武國家根本壮先圗清秋欲盡送将歸路遶銅門失翠㣲楊栁不堪搖落後伴人殘菊尚依依三載曽趨青瑣班春風時憶舞衣斑雁飛江浦寒烟斷彷彿舟移見舊山惠山泉品逼中泠陽羨仍留楚頌亭種橘煮茶應不俗懶看蹤跡逐浮萍送鄭翁還廣燕山雨雪一冬足越嶠烟花三月多綵鷁忽隨春岸逺東風斜日水増波鳯誥新霑天北闕驪駒遥駕海南邦濃花細草催行色一夜春帆過曲江玉窖溪連海色新羅浮山下别開春南還更盡登臨興莫遣清江空白蘋城頭雲向南飛逺城下車從北發遲日暮紅塵千里隔曉星寒雨不勝思夀嵇川南母春暖瑶池花草香金魚珠履儼成行一盃沆瀣千年祝此夕為歡殊未央翠檻紅樓拂曙開瓊芝瑶蕋映金杯方平遥向麻姑語碧海揚塵今㡬迴北堂清晝藹春暉歌繞雕梁燕却飛自有神仙攜鳯吹不須令子舞萊衣二月蟠桃亦放花花枝爛熳赤城霞逡巡已結千年實更覔安期棗似𤓰誰贈君家縣圃圗紫烟白鶴列仙都江妃鼓瑟湘娥舞識得中間王母無庭前裊裊長春蘿堂上歌鐘伴綺羅聞説東鄰有好事金鞍銀燭夜深過有榖堂甲第新成髙入雲風流廿載憶徴君亭亭獨鶴閒芳草惟有詩書日夕聞陶令歸來看五栁魏公老去有三槐朱輪翠盖交生䕃須信當年不妄栽夏夜崇雩壇陪祀中天星斗淨瑶壇夾陛旌旗四月寒百辟自隨千仗下六龍猶在五雲端城南擊柝夜如何清蹕初傳萬乘過輦道逶迤多暝色故開宫扇望星河野樹蒼蒼散夕暉天門西望翠華飛㣲臣未解風雩樂獨咏皇恩泛馬歸雙闕遥瞻龍虎旗金根羽盖自葳蕤君王不遣先除道霑洒分明待雨師日轂雷行過紫都蚩尤太一總先驅聖世百神能受職雨師何事尚天誅君王此日禱桑林萬井沉沉羽衛森玉檢泥封多秘祝祠官偏識愛民心龍見修雩古有名君王親出為蒼生爐烟已結氤氲氣雨足森森散鳯城王母歌漢宫初起集靈臺絳節飄颻羽扇迴雲錦書傳青鳥信遥看阿母自西來芳春花草滿瑶池忽憶麻姑海上期欲問蓬萊水深淺因風遥寄萬年枝瑶島分明近日邊周王元未解求仙八駿﨑嶇雲外路空疑道里隔山川雲母屏前吹玉笙侍兒猶識董雙成笑余學隠金門客太似當年方朔生昨夜重逰汗漫歸依然戴勝髪如絲三千年一校仙籍迴指彭聃是小兒玉洞桃花引去津鶴聲猶似隔紅塵自嫌王烈無仙分乞得素書翻與人三月晦日出郊㳺衍偶誦唐人詩三月正當三十日因用為起三月正當三十日又騎欵叚出城南欲賦送春詩未得栁溪花徑遍相探三月正當三十日夕陽欲盡亂啼鳩榆錢鋪地應無數買得春光㡬許留三月正當三十日把酒題詩興不慳汀洲芳草不歸去留得春光總是閒三月正當三十日鶯聲如倦復如愁緑楊拂地花成雪斷送春風也白頭三月正當三十日餘春零落入風塵閒過嵗月不知老失却鶯花轉覺貧三月正當三十日一春又向客中過薜蘿已負滄洲約騕褭空憐白玉珂三月正當三十日落花寂寂對閒門莫言春盡渾無事分菊移葵事更繁南村漫題緑野風烟入望頻栁溪松塢别蔵春莫言未識南材路逢着桃花試問津題梅獨樹離竒帶雪看小窻應絶勝江干竹床紙帳成幽伴冷蕋踈枝㡬嵗寒聞人氏五十夀詩生年半百混樵漁教子還看上石渠欲舞絳衣應未得却慿丹鳯早銜書青山盡日獨支頥白首猶堪一巻師八十年來閒擊壤兒童齊和紫芝詞咏閣中芍藥宣皇時移植繚繞朱欄倚日邊葳蕤紅藥露華鮮蓬瀛本自多竒卉况爾栽培更有年瓊幹舊分天上種瑤葩偏向夏初開侍臣草罷明光詔獨傍清隂過碧苔題惜花美人圗滿苑芳菲映曉粧折将春色媚髙堂一聲啼鳥且歸去秪恐清露沾衣裳三窮圖為周弓岡中丞題妾心何事九秋霜肯為輕塵弱草傷死可復生生不媿悠悠千載兩共姜青年守節忍死元非愛一身百年兩世此遺娠手縫襁褓和殘淚抱向髙堂囘首頻遺腹傳芳鶵鳯新成試羽翰芳枝何意發枯蘭相看未語先成泣人間真有立孤難孤兒發科昔時無子今有孫含飴兼復助晨昏庭萱含露春風滿三十年來貞孝門四世承懽夜行武林山中贈老僧一盞清燈一榻塵山深狐鬼共為隣年來伎倆看都盡遮莫山精巧試人昨夜山前説法歸毒龍馴虎總忘機客來相訊還相笑鼠嚙床頭故褐衣題劉氏雪竹圖蚤聞楊氏傳清白千載君家更紹芳庭竹蕭蕭帶殘雪粤南應為比甘棠夀琴泉宗長六十七尺焦桐一脉泉髙情妙契已多年此泉直遣作春酒百嵗陪君調素弦寄髙大用故人忽漫入長安匹馬青裘霜雪寒尊酒未空還别去河橋相望斗䦨干十年遙憶洛陽春春色空隨千里塵應為未逢楊得意相如不是異時人徐雷溪掌羅山教初隨計吏入秦關暫假君恩曵組還泮水平橋春雨後蔵書猶憶敬亭山千里長淮古豫州離離逺樹接芳洲偉長一去憐王粲明月何人共倚樓送鄒均敷清秋欲盡促歸心海日蒼蒼曉隔林回首長安應未逺蓬萊宫闕五雲深夀詩攝衣欲上萬言書忽憶髙堂獨倚閭十月江南春已應倦逰應不似相如送周嘉遇之景陵燕山楚澤共㣲茫細雨春帆度漢陽好向鱣堂理吟巻竟陵東渚即滄浪送陸奎之嶧縣洙泗迴縈入古城宫墻猶是魯諸生聖朝禮樂超千載莫似當時不肯行題石溪磊磊白石清溪深栁花漫天晴復隂扁舟罷釣自來去無人更識滄洲心春閨少婦看花淚滿裳盈盈終日不成粧裁得春衣無用處書來猶説在遼陽送倪徳符知郴州楚南山水更多竒五馬春深度嶺遲問俗已窮千里目興來應不廢吟詩郴民今日總魁竒可信昌黎愛廖師更有濓溪能化俗郡中為訪種蓮池春日雜興綺閣瑤臺逈碧空春光盡在上林中瓊華島上蔷薇雨太液池頭楊栁風春色城南更可憐賣花種栁各紛然半酣落日慵騎馬獨整危襟坐水邊滿院花開錦作叢短墻一角漏春風院門深鎻閒亭晩惟有鶯啼緑樹中草蔓荒堦白日隂亭亭塔影臥空林山僧不慣迎逰客自對諸天誦梵音樓臺白日静芳林一逕蒼苔春樹隂獨坐無心看舞鶴石床移處落花深吳雲越樹夢中看曉起西窻月色寒此恨春風難解釋飛花無數墮䦨干野亭流水有餘清新雨浮萍一夜生竟日獨吟還獨酌故園花鳥不勝情海棠開遍已春深載酒重過㡬樹林地逺紅塵飛不到蕭然相對即禪心憶昨曽陪驄馬來髙歌急管逓相催斜陽芳草迷歸路更把餘尊聽落梅送劉志忠司定海訓乍脱風塵逰海嶠况從弟子拜儒官鰲山鯨浪來天外多羨平生有大觀送人作教龍陽薊門千里下荆門别意鄉情共一尊好向春風種桃李花開正近武陵源贈周乾詩為愛城南草樹幽漫攜童馬作春逰紅塵杳杳斜陽路却憶揚州十二樓送許琥作教六合昨因獻䇿滯秦關又向金陵匹馬還桃李隂隂書閣閉春風常伴一官閒夜觀海棠用故燒髙燭照紅粧韻七首乳燕低飛緑窻暮開尊共惜朱顔故文君窈窕夜當壚百花失色如相妬爛熳芳英夜似燒暝烟初傍蠟㾗消光搖翠幕㣲風起何處佳人舞絳綃春色新裁蜀錦袍看來宛轉避蘭膏當庭欲語空凝佇紅露滿枝明月髙仙姿冉冉嬌紅燭妃子春酣睡未足謫仙已去玉顔空凭欄猶憶清平曲萬蕋粧成華屋春一枝㣲亞金尊照世人恨欠杜陵詩此花真得無言妙胭脂一樹暈明紅艷色凝香清夜同不解人間能有此移根元自上陽宫繁條婀娜疊紅芳疑是佳人向晩粧寄語東風共相惜為留香艷伴花王代作許夀詩清溪一𣲖五湖通雲影波光十里同老人洗髓初成道為訪當年河上公題掃雪煎茶圖素質漸淪浮蟹眼緑塵初瀹映娥眉一杯漱入枯腸裡尚憶思成禪詔時由來風味此中優翻為羊羔錦帳羞不如僵臥蓬廬者自是名臣第一流帝京歌一自文皇破虜還薊門天險壓秦關候騎不窺雲中郡屯田直至紇干山帝座分明照冀州妖星從此霣旄頭皇圖永似西山固聖澤黄河萬古流天戈漠北静胡沙帝里長安通狹斜中貴多騎大宛馬都人愛種洛陽花滹沱易水接盧溝千古漁陽説上流聖王一統開華夏佳氣常朝五鳯樓礪峯上元燕㑹巻和韻寧親歸去隔仙家燈火長安望轉賒社裡新詩應寂寞天涯明月共光華火樹凝輝玉漏遲勝逰偏記上元時不嫌身在蓬瀛外綵服清觴亦自宜余以省覲南還嵗餘不復陪諸兄文字之飲比再入館礪峯出此巻索和盖元夕燕㑹詩也僭附二絶用志聚散之感云長至日寄弟口號故鄉風土未全非老大兒童樂事稀尚憶雞鳴相唤起膝前拜舞試新衣滿路清霜逗客衣五更初㸃放朝歸才微襪線知無補心著寒灰不共飛節至親朋常滿堂邀歡盡日對壺觴不因獨坐長安邸肯信陽囘景漸長輓錢母貍首歌殘海樹秋熊丸空轉夜深愁板輿寥落安仁賦瑶水虚無阿母逰詞夀談守教母六十薰風初入幕禁城隈繚繞朱欄畫閣楊栁枝枝弱緑隂中遥映滿堦紅藥萱花吐萼愛北堂春光如昨清晝永人在瑤池深處安排春酌恰有蓬瀛仙客羽服翩蹮雲車煜爚玉壺絲索玳筵前觥籌錯芳塵動正見妙舞清歌盡日承顔為樂想萊綵潘輿兹事古今寥廓壽陳子宣父七十初日上珠簾乳燕雙飛垂楊風軟逰絲捲盡有鶯聲嬌囀緑遍東城紅稀南陌偏稱人逰衍花外樓臺栁邊歌管乍開芳宴况老景欣逢太平時滿目韶華萊衣繾綣麻姑相訊道蓬萊水淺人生七十古來真鮮願滄海桑田從今再變夀域無期華筵常展夀姚申甫父淵明未老賦歸來贏得清風兩袖田園三逕渾如舊桂子滿中度已擢雙枝秀長君鸞誥喜重榮繡服光輝清晝黄花秋晩浮新酎駟馬入髙門願上千春夀吳尚質夀母芙蓉露滴秋江冷黄花欲滿東籬雁行歴歴海雲低想重閨明月正屈指歸期春風初喜蘭芽茁齊眉燕婉芳菲錦屏銀燭映仙巵年年歡此㑹應不羡瑶池題來雁詞絳闕冬初瑶階月滿仙宫恰喜新成螭碑鴻筆帝命屬春卿石上丹書珍重許微臣並勒御名縞衣人来從何處恍惚夢魂驚聽齋宫漏徹家童躑躅特地傳聲有翩翩鳴雁夜集前楹可道事都非偶皇恩重物兆先迎自而今禁垣清切日見被光榮又一首沙塞風凄瀟湘雲暖横空多少成行随陽南去待春更廽翔何事偏離故侣含聲戢翼下君堂堪愛是月明三五燭影對寒光况翩翩縞服依依清夢歘達君傍道羣分類聚二語分明那時剛承恩數穹碑書托姓名香漸陸重看今日兆染翰待君王顧隆吉索夀周君六十楊栁風柔燕子斜江南春色正繁華畫樓絃管是誰家冉冉歌聲迎落日盈盈舞影亂流霞千年重見碧桃花夀茹母七十詞二月春添富貴千秋人對芳菲朱顔緑髪金尊裏笑道古來稀柳外歌傳金縷花前舞襯斑衣瑶池宴是承歡處此日報春暉代夀陳鄉人花滿江城月滿樓玉巵金縷共相酬主人華髪未盈頭心逺不妨逰市井身閒端可傲王侯人間何處是丹丘馮尹父母雙夀詞喜金魚乍綰玉節更頒功名都就歸老田園松菊渾如舊徃日中元恰逢初度又小春時侯天降長庚星垂寳婺齊膺眉夀堪羡君家滿庭玉樹數枝丹桂誰論謝竇牛刀試割百里賢聲驟片片白雲東去鄉園迢逓頻囘首綵衣遥拜兩袖清風一杯春酎具茨詩集巻五
