body:
  text: 具茨集總目别集類五明詩集巻一擬古詩巻二五言律巻三歌行巻四七言律巻五五言絶句七言絶句詞文集巻一賦頌表巻二論議巻三傳記説巻四序巻五書疏碑箴銘巻六雜著巻七文銘表狀巻八論表遺藁論表䇿臣等謹案具茨詩集五巻文集八巻遺稿一巻明王立道撰立道字懋中無錫人嘉靖乙未進士官翰林院編修其詩冲融淡宕不為竒險之語取法在中唐錢劉之間但微嫌婉弱文則縱横自喜頗於眉山為近其論文書有云兵無常形以正勝者什九文無常體以竒善者什一盤誥之文則六經之什一耳效而似者猶未可為常而况其萬不類也哉其言深中當時北地諸人摹倣周秦之弊即其所為文亦可識矣原目載詩集五巻文集七巻附録一巻今詩集之末復載補遺附録二十餘首文集七巻之後亦増論表等十餘篇為一巻載於附録之前而附録後又别載遺稿一巻盖其後人掇拾而成零星續入故與原目不相應耳今為更定其次至附録一巻所載敕命誌傳等作辭多溢美無闗考據並從刪削云乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d4e5a3318392473d17f4bbe7a6bb390182f97d2ccc516ba376071a28663c0365
