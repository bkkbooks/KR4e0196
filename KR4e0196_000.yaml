body:
  text: 具茨集總目别集類五明詩集卷一擬古詩卷二五言律卷三歌行卷四七言律卷五五言絶句七言絶句詞文集卷一賦頌表卷二論議卷三傳記説卷四序卷五書疏碑針銘卷六雜著卷七文銘表狀卷八論表遺藁論表䇿臣等謹案具茨詩集五卷文集八卷遺稿一卷明王立道撰立道字懋中無錫人嘉靖乙未進士官翰林院編修其詩沖融淡宕不為竒險之語取法在中唐錢劉之間但微嫌婉弱文則縱橫自喜頗於眉山為近其論文書有云兵無常形以正勝者什九文無常體以竒善者什一盤誥之文則六經之什一耳效而似者猶未可為常而况其萬不類也哉其言深中當時北地諸人摹倣周秦之弊即其所為文亦可識矣原目載詩集五卷文集七卷附録一卷今詩集之末復載補遺附録二十餘首文集七卷之後亦增論表等十餘篇為一卷載於附録之前而附録後又别載遺稿一卷蓋其後人掇拾而成零星續入故與原目不相應耳今為更定其次至附録一卷所載敕命志傳等作辭多溢美無關考據並從刪削云乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7f36b076f259d3193b9b02dd48d5e6759427df81cec8e25d63e9abe4aba17cea
