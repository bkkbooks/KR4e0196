body:
  text: 具茨詩集卷四明王立道撰七言律題張學士仰宸樓卷仙閣岹嶢逼紫垣蘭臺新賜出君恩江光夜共青藜照山翠晴當錦帙翻盛事未論三萬軸多書欲問五千言碧山莫動焚魚興紫誥黃麻寵正繁贈北溪隱者古藤修竹一溪隂尋得柴關徑轉深賣畚半將供鶴食垂綸不著羡魚心花憐清品間常灌詩喜新題病亦吟老去故情終偃蹇肯隨閭里學浮沈詠淮南八公霓車遙去白雲端雞犬紛紛隨羽翰叢桂未須淹隱士長裾元自笑王官坐令楚國輕千乘肯向秦關試一丸何事茂陵空好士金莖寂寞露光寒送人上陵天上龍髯不可攀獨看仙寢寄人間山川萬里開形勝魂魄千秋自往還上食嵗朝華省吏迎神曉唱赤墀班春深雨露多悲感一問松楸慰帝顔嘲王允寧失僕戀主心微中路疑掉頭忽去各天涯秖言舊馬能諳道可信蒼鷹不受羈汲水尋源拋故侣應門逢客結新知君才莫是慚蕭頴回首空吟阿假詩送人下第歸荆溪北上空嗟獻玉非夢魂先繞故園飛長安晴日蒼龍闕荆渚秋風白板扉紅樹漸隨岐路盡黃花如伴逺逰歸多才莫訝無知已且向江頭一振衣聞何喬仲侍御移疾野寺詩以訊之戀主重來拂豸冠尋僧還向竹林眠百年半是滄洲客多病能安白骨禪間指逺山孤枕外細聽落葉一燈前何時更愜煙霞賞同禮維摩結靜緣送吳王二太史陪祀諸陵流水因山積翠分衣冠人泣鼎湖濆暫攜劍珮辭青瑣同向松楸拜白雲雪霽千峯明象衛星垂五夜見龍文子長禹穴重探後好藉雄才紀聖勳探一作尋芳洲為袁御醫題和唐荆川韻二首白鶴山頭緑樹村祇餘猿鳥應柴門安期賣藥人常見舍長傳書世所尊早向帝前辭赤紱欲從方外學玄言平生自是無機械野水春添助灌園紅塵滿陌非故村清禁夢回猶鹿門蚤慕名山厭昏嫁時逢好客命琴尊逃名賣藥不二價寄興含毫多五言長此陸沈堪自老藏身何必於陵園介翁見示誕孫志喜之作次韻三首抱孫六十應非晚裁得新詩續舊歡寵埒金張開世胄詞髙屈宋比衙官賓筵勝擬金錢會宫禁榮分襁褓完臺閣已傳韋氏業芝蘭頻向謝庭看再世懸弧添麗藻九重賜果助新歡昴精遙應中台位德聚俄占太史官手和酒醴情偏渥天與麒麟福最完英物不須啼自識髙門只在帝京看自是相門多相種况逢清夜動清歡更誰好事宜風雅憶爾前身定宰官雙蒂含珍瓜􅂒逺九苞呈彩鳯毛完瑤環瑜珥真堪慰他日雲礽滿眼看哭鄭碧河一首和歐強齋韻七哀吟罷不堪聞零落深悲鵷鷺羣宦迹浮沈長隔世交情生死獨憐君修文猶借螭頭管懸劍空餘谷口墳魂去魂來何處是天涯日暮起愁雲寄贈唐荆川二首簪筆曽為漢署郎相如詞賦早升堂自憐野性耽林臥恐著朝衣亂鳥行溪上晴看黃鵠逺山中晚食緑蓴香多慚舊日滄江伴獨向金門立曉霜知君骯髒與時踈不為功成學漢疏垂釣溪連嚴子瀨躬耕人擬葛公廬因窺導氣常隨鶴欲似全年更種樗莫倚一丘能自老巨源昨有薦賢書春盡懷故園青春初動憶鄉園春盡那堪思更繁新竹從看侵薜荔落花不分掩蘭蓀林間一作臥鹿豕常求伴溪晚漁樵數過門莫怪曼容猶徇祿十年簪紱戀君恩長陵和王允寧韻北極雄蟠第一峯崔嵬陵闕俯髙松空林風雨歸千騎向晚煙霞閟六龍翠嶺屯雲蒸帝澤蒼苔點石記仙蹤艱難百戰興王地無復秦關報夕烽上已宴集逰絲飛絮媚晴空繡轂銀鞍逐曉風緑野隂晴雙燕外黃圗樓榭百花中開筵共選流杯勝懷古因誇説劍雄帝里韶光須倍惜尊前且莫嘆飄蓬贈舅氏舊存松菊半荒蕪外大父衡陽令聲利蕭然白髮初抱病著便居士服好吟題遍野僧廬里中送酒禳田罷几上留書相宅餘樗散笑余真似舅得官猶自愛間居送蘇幼清都諫歸養廣中補衮應須濟世才恩輝翻與照離杯貪趨定省辭榮祿敢為田園賦去來諫草更編烏鳥疏舞衣欲就芰荷裁江雲嶺樹頻回首隴使何時一寄梅觀蘭亭修禊圗用上已韻坐遵曲渚覽晴空樽俎冠裳江左風勝賞自超山水外遺蹤猶指畫圗中春看宇宙情俱逺醉向文詞思更雄陳迹祓除還此水山隂亭榭幾蒿蓬再贈唐荆川二首厭看城市每移家背郭園廬十里賖為覔漁竿仍種竹恐妨瓜地罷栽花病煩送客攜孤艇手校藏書過五車草就玄經誰與授知君弟子有侯芭草深門徑往來稀澤國風霜滿薜衣苦節喜為貧士詠遺榮久食故山薇春邀田父看分社夜對鄰僧話息機却怪鵕鸃冠尚在嵗時聊著戲庭闈送陸白菴同年使周藩錦帆江色靜芙蓉綵服翩翩紫誥重久為客居憐節換况堪君别與秋逢才名天下知廷碩人物吳中數士龍君到周南莫留滯彤扉瑣闥待從容送徐槐溪迢迢南陌望歸軒白馬青袍聖主恩共喜偉長來北海何知司馬病文園佩聲遙憶趨青瑣春色愁看付緑尊芳草長安門外滿王孫何日到長垣送周進士使淮便省長安三月共鳴珂又見輶軒向潞河草色千村梅雨暗蟬聲兩岸麥風和倚門正愜清秋望負弩重看故里過聞道江淮多赤地慿君一問嵗如何曉日都門送客行燕山秦樹總關情三春故國懸歸夢六月長淮下使旌燕子飛飛山雨急稻花細細五風清白雲南望堪回首非羡相如入蜀榮桂翁九日邵園和韻風景秋來滿習園登臨此日共金尊黃花爛熳搖晴苑錦樹參差照暮村野鳥知迎仙閣斾都人喜識相公軒清時密勿多無事合有新詩紀聖恩名芳久説邵陵園勝日還留北海尊慷慨風情千古地鬱蔥花霧萬家村太行落照遙橫席碣石流雲近拂軒豈向平泉誇樂事看垂彞鼎答宸恩洛陽自昔盛名園仙履同臨九日尊花下樓臺開石谷城中煙樹隔韋村鈎簾亂竹低圍閣解帶盤羅密映軒銀燭金緋歸路晚絲綸得暇聖君恩託翁雨宿浣花草堂和韻二首暗暗江雲拂地生百花潭水月微明乍看宿鳥驚枝墮忽聽流泉倒檻鳴人事天時無定迹江湖廊廟獨關情少陵寂寞遺篇在翠篠紅蕖足雨聲自羡茒堂得此生璽書謾復下承明擬將出處同龍臥况有文章應鳯鳴保傅正看今日事詠懷終見古人情禁河徙倚歸朝晚想像溪橋流水聲送孫毅齋學士赴南京舊知中允藉聲名那復仙槎向石城珥笏風雲天外靜禁林日月海邊清寵光不異登三島辭賦終堪並兩京前席名賢須有待藜輝行動石渠明未翁九日即事和韻師道於今誰獨重兩厪元老淑吾曹乍緣藥餌違青瑣喜見茱茰佩紫袍秋色已深歸院靜春風常在仰墻髙聖主正懷霖雨寄肯容黃髮老蓬蒿迎恩寺二首和韻野寺尋春意最間漫騎欵假逐苔斑鳥聲似解添詩思花氣偏能醒醉顔景入春來都有主地當勝處可無山夕陽滿樹煙光亂歸路分明忘却還燕臺吟望客情間露葉煙花滿目斑日月東南時極目風塵西北暫開顔芳園春盡惟流水逺岫雲來似故山長路翩翩多去騎倦逰詞客幾時還和玉溪學士齋夕有感韻二首星壇窈窕開清禁霧篆氤氲徹上玄此日百神俱奉職方春萬乘自祈年蓬瀛更羡天居近宣室還看帝席前淺薄慚為香案吏齋心相對夜無眠齋廬清夜儼相過宿鳥啾啾逗暝柯玄殿正嚴春日祀青陽應陋漢時歌星回帝座瞻金節香滿仙階禮玉科自愛相如能獻賦賦成無那鬢先皤和齋夕詩又二首仙署衣冠自儼然幽齋燈火坐思玄星河永夜窺三殿禮樂明時際百年散帙雪披春檻外焚香鶴引晚風前宵長耿耿尤瞻戀天子親祠曉未眠齋袚相攜玉署過槐庭雨露沐新柯憂農並仰春和詔饗帝仍傳樂府歌制作百年誇聖代簪纓十載忝賢科明君側席求頗牧為念馮郎髮未皤和玉溪齋居對雪一首千里浮雲漲碧空瑤花寂寂舞回風詞臣欲賦羞梁苑聖主方齋坐漢宫曉訝神光浮殿外夜聞仙語出帷中即看帝澤和天澤玉粒逢年四海同和齋夕有感春半間庭興杳然况逢齋夕思偏玄風煙漸度芳菲節日月頻驚犬馬年夜氣露清仙掌畔天花雪落御爐前瓊樓髙處多寒在聖主宵衣恍未眠雲龍山寺獨眺次壁間韻縈紆石磴望中開故迹蒼茫半草萊興廢秪今雙樹在登臨自昔幾人來僧攜野果修晨供鳥啄山花上石臺車馬紛紛千里道河流長帶夕陽回清明日獨坐感懷清明南北異風煙栁色鶯聲又隔年客裡登臨情易倦親前笑語夢常牽官間且覔題詩伴祿薄翻資負郭田強半春過成底事悠然獨酌望遙天壬寅上已黃少村宅中宴會余未入都癸卯補作一首風流誰似晉諸賢爛熳城南列禊筵何處更須尋曲水君家元自傍清川春還芳草虛迷望客散飛花強鬭妍却愧右軍無述作為君重記永和年挽吳白樓尚書已將舟楫濟明時更愛湖山早拂衣百里風流思緑野兩朝功業付黃扉間慿獨鶴看碁局喜有羣鷗伴釣磯何事忽騎箕尾去千林落葉帶寒暉補作孫志髙宅端午宴集詩內殿初分角黍盤更開芳宴婪餘歡已知仙侣招尋慣况復將軍禮數寬荆楚嵗時千古恨長安風土幾人看自憐此日猶乖阻獨向塵途歌考槃春盡書懷官間日日賦間居芳草年年伴草廬蓂葉不隨飛絮盡鶯聲欲斷夕陽初虛簪畫省郎官筆未就名山太史書踈懶自知來往少蓬蒿滿徑不教鋤送春詩間將手板獨支頤目送東風何處歸苑樹漸看春後密庭花早覺雨前稀酒邊覽鏡憐華髮馬上看山負翠微寂寂故園春易晚蒼苔應遍舊漁磯贈隱者髙車大蓋意已踈鶡冠短褐墻東居丹經鋪案晚食後黃犢繫門春種餘負薪野店與沽酒學圃鄰翁時乞蔬愚公亦近北山住為問險路今何如張太醫六十夀詩曵組聊隨青瑣班未須􅒖嶁訪名山市朝自昔容真隱服食于今得大還手煮神丹供帝所家傳仙杏乞人間莫嫌叔夜無仙分試覔刀圭學駐顔送沈二槐改任惠州相逢何事忽離羣千里銅符喜再分鶴髮重看歸錦服鳯毛初見接青雲雙槐舊望吳中起五馬新謠海外聞更和淵明詩揔好知君家世自休文鄭都官嘗作代秋扇詞豫竊見其多怨尤不平之意非知道者之言遂賦此以廣之非欲競工拙於聲律間也明月悠悠掩素塵不將流落怨時人千山雪滿龍蛇蟄一夜春歸草木新雨後桔橰堪自廢祭餘芻狗向誰陳應知物理同消息空為班姬賦損神聞朱從龍下第詩以慰之為爾臨風一愴神與誰同賞洛陽春千金曽學屠龍技五上猶為點額鱗結綬逺憐青瑣客書空長念白頭親會稽邑子應相薦莫厭窮途久負薪得秋試消息後寄弟靜閲賢書意轉疑歎君年少不逢時天涯空自看魚雁春草常令寄夢思三秋聚散風前葉一著推移局裡棋丹桂分明天上種他年來折最髙枝題碧山草堂遙傍翠微開松竹隂森澗壑回偶誤一官辭白社懸知三徑滿青苔幽情未許簪纓纍浪迹從教猿鶴猜他日功成不相負移文且莫為君來代作賀介溪生孫一首湯餅重開今日燕詩篇猶記昔年歡慶餘每見鍾賢胤喜極全勝得好官秋水精神應自别青雲頭角已先完不因啼後知英物黃閣家聲奕世看寄夀沈毅菴七十晚叨一命即懸車華髮盈簪六十餘懶性不妨隨畎畝間身喜復伴樵漁獨尋洞壑探丹訣頻向兒孫問賜書我亦舊知陽羡好買田應得近君居王次川八十夀詩解組間身八十年鶡冠鳩杖意仙仙時憑野鶴看碁局獨引江鷗過釣船建業栽成彭澤栁童烏解説子雲玄空聞王子稱仙令何似斑衣滿膝前奉和數疇兄病起之作雨過幽齋草樹鮮書籖藥裹共年年身名幸遣朝簪纍昏嫁還憂世網牽散髮行吟春水曲振衣獨立晚風前自嫌客至常賖酒特與空囊留百錢十里清溪一釣竿浮雲元未著情看小營茒宇方蝸國暫解朝衣稱鶡冠賦芧養狙還自笑呼牛應馬仕相千虛船不解逢人怒搔首春風午夢殘奉和數疇兄對酒自嘆之作為通花徑數誅茅長日炎氛靜裡消秋動逺林催絡緯月和清露上芭蕉濯纓慣坐溪邊石覔句時行湖上橋莫向天池羞斥鷃蓬蒿九萬各逍遙憶騎竹馬逐諸兒忽道行年四十踰謀食一身長畎畝起家三世總文儒青山對酒從吾好華轂傾人笑自驅世路只今多險塞與君試學北山愚時序驚心又素秋此心應得幾宜休微官出入莊生蝶散帙縱橫王子籌物纍秪餘琴鶴在道心唯共水雲謀年來苦熱緣多病又向山中半月留數疇兄以病阻看花之約作詩見遺次韻答之經時臥病覺春才猶喜名花遲爾開好客暫虛文舉座新詩先覩馬卿才漸驚落絮侵碁局故引遊絲罥酒杯我亦文園同病侣更留述作待君來爛熳芳園此日才春風小徑為君開一枝早占傾城色四韻空慚倚馬才野外不妨頻縱棹病餘應喜數飛杯劉郎舊是多情者可待名花落盡來春深饒睡夢回才接得詩筒枕上開莫訝相如非病客須知太白是仙才洛陽更長名園價金谷空餘罰酒杯點綴春光應不惜一花乞與一詩來秋日再過顧氏清溪别業因和洞陽韻秋水蒹葭思不禁扁舟重繫此溪隂犢眠疏草猶迷徑鶴哺新松欲滿林采藥常嫌驚鹿迹山中初服野人心舊來漁父多相笑一别江湖霜鬢侵泛湖逰漆塘諸山再次前韻湖上秋風病未禁興來真欲到山隂漁蓑亂結汀洲草樵徑香分橘柚林逺谷采薇隨鹿迹間巖投果見猿心放歌未盡空回棹落日增波憂思侵追送陳澄江用章水東韻兩月相逢已隔年翩翩征袂忽離筵青春劍珮明秦嶺細雨桑麻繞涑川莫恨一麾猶出守須知五馬亦峩然傅巖今日經行處更訪當年版築賢爐省追陪憶往年留連何必對芳筵封陳亦自須蒲阪借寇還宜念潁川故國春光難忘却清燈心事共犂然使君異政屏風在况有當時能薦賢題龍江江橋一别思如何楚水燕山嵗月多雲霧只疑龍化去夢魂常逐雁來過江妃夜出收遺珮海估春經惜逝波好似當時題柱客浮雲空負采菱歌萬梅菴詩菴在震澤之濵羣岫中結廬不托桃李場羅浮村畔孤山陽疏忩影落一枝瘦虛室風吹千斛香煙壑霏霏來暝色湖波渺渺動晴光江南應得春意早折寄無妨驛路長元夕憶諸弟和沈原約韻燈火樓臺皓魄圎客心何事憶當年鶺鴒飛處情多緒鴻雁來時書幾傳春夜月如秋夜冷燕山雲與越山連誰家更奏思歸曲無奈愁腸萬丈牽秋日郊行冀北初秋暑盡消無端風雨木蕭蕭野農罷餉還傾筥賈客愁寒半挾貂雁礙浮雲時緩度草迎微露更先凋何人四望躊躇立多病應無辱聖朝九日同序翁邵園賞菊赴李蒲汀之約用舊韻幾年聞説邵家園今日黃花對緑尊水閣山亭斜肖郭栁蹊松塢曲成村登髙直倚林梢檻向夕仍開竹外軒莫謂絲綸有餘暇太平簫鼓藉君恩和與新見贈韻一首髙閣層軒野水西白雲長此護幽棲買田祗為開三徑蒔藥還須滿百畦春去林中花自發客來竹下鳥先啼夜逰何事頻攜燭明月紛紛隨杖藜夏夜同唐應德王道思尋顧與新清溪别業主人追至設燕扶踈嘉樹蔭清流卜築曽聞顧虎頭乘興不須題鳯字逃空聊復上漁舟忽逢名勝尊前集好伴沈冥物外逰湖上秋風芳杜晚月明相憶仲宣樓謁于肅愍墓祠整頓乾坤事已休冥心東市更何求亦知聖主能憐舊無那書生欲拜侯一木空悲支大厦兩旗猶見度中流嶽祠相望湖南北長共忠魂地下遊送鄒學士赴南京搖山仙館接瀛洲稷下名儒早見收玉笋暫隨鵷鷺入金陵重憶鳯凰逰傳經鶴禁恩猶渥問道鵝湖意始酬莫愛江山久留滯佇看明主待謀猷送鴻山殿讀歸省珥彤幾嵗共仙廬羡子承恩下玉除春晝正宜新賜服山房更檢舊藏書夢回北闕陳情後歌倚南山獻夀初我亦髙堂凝望久不堪千里獨離居長至日憶諸弟冬至陽生春欲回天涯節序思難裁自憐北地常逢雁為望南雲獨上臺玄草已甘吾寂寞綵衣須共爾徘徊去年此日還相憶攜手前溪問野梅憶昔吟贈華鴻泉之金陵憶昔秦淮橋上逰緑槐垂穗正宜秋燕飛不記烏衣巷水滿微分白鷺洲北闕晴雲常冉冉東山斜日自悠悠風流誰是今安石惆悵蒼生獨倚樓孟冬陳戚畹第會同年有述甲第晨開簇錦鞍同時休沐帝恩寬形容不改登科舊樽俎還追錫宴歡漫擬新詩賡伐木相逢明世喜彈冠招尋豈為酬良月應共芳情保嵗寒詠紫薇花紫薇開處覔蓬瀛深院層軒拂曉晴絢爛只疑春色在葳㽔偏傍日華明絲綸閣下人誰伴虛白堂中韻未成祗恐秋風不相假緩吟深酌對寒更元日試筆閶闔東風送舊符氤氲佳氣繞皇都金吾千仗如雲擁玉佩同聲向曉趍春令已從今日布物華應與去年殊侍臣下直明光殿紫禁傳宣又賜酺花朝感興踈雨輕風濕曉煙曲江春色倍堪憐新蒲細栁行宫裏語燕啼鶯御道邊擬向尊前銷客思更於花下惜芳年明時事業非無賴揚子何為獨草玄院中紅杏天公何意屬青陽留却繁紅殿衆芳仙圃豈應須鼓發淄林時復見琴張朱欄露重欹晴錦翠箔風微浥晚香羡爾倚雲真得地野花空自落東墻鄭泰陵詩千林松檜鬱相回永夜風生浣海哀萬國昔曽瞻氣象五雲空復護崔嵬古來鳯鳥長難至天上龍髯定不回苦憶焚香賜第日報恩真愧濟時才至日長陵陪祀長陵西接黃花鎮白雪蒼岩夜色遙隂殿衮龍猶在目往時松柏已干霄總聞一怒風塵起想見千官遷次朝悵極兩京興廢事小山何意起漁樵題文巖畫端逺山近山淡空翠天風迢迢吹薜荔溪邊野橋石亂倚林扉晝扄花滿地主人獨歸如有遲黃精飽飯松醪醉山深不解名與利練袍芒鞋了生事西苑春晴二月韶光滿帝城上林啼鳥報新晴依空裊裊遊絲靜極望萋萋芳草平風暖昭陽翻翡翠波融太液浴鵁鶄回看夾路花齊發應待鑾輿向此行宫栁占盡芳菲春暮天昭陽栁色倍堪憐千條曉濕金莖露幾樹晴低青瑣煙暗葉藏鶯嬌自語飛花蹴燕舞還顛宸逰到處成歡賞又見朝來三起眠擬聖駕祀陵畢奉聖母泛舟西湖應制鳯輦逶迤環紫極春明雨露動宸思遍修祖祀橋山冢更侍慈顔太液池原陵回望衣冠道汾水空慚簫鼓辭神聖於今兼順孝相如欲賦苦才遲聞雁漏轉更深月滿樓雁飛逺送一聲秋聨翩曉起芙容苑三五寒迷蘆荻洲古塞離雲常漠漠空山落木共悠悠瀟湘自是饒梁稻應為隨陽向帝州午日駕幸西苑侍遊有述薰風淡蕩上陽樓西望昆明積雨收艾葉菖花迎鳯輦蘭橈桂槳過龍舟當年虛羡明良會此日恭陪伴奐遊帝德如天時正午微臣何以頌鴻休戲陸節之早聞通藉金閨裏謝病還攜舊金紫行年七十苦好吟滿卷新詩放翁似洞房鼓瑟奴婢歌秋月春鐙歡更多自羡名園常負郭不須塵陌逐鳴珂扁舟暝逐使君行已是歸帆一月程恩詔多慚優淺薄風期獨喜托才英江回故國春迎棹星聚清尊夜倚瓊我亦天涯同病客翻憐司馬滯江城咏懷路難詞客幾時還坐對荆扉手自關深樹鳥鳴春寂寂空墻花落曉班班兩都獻賦慚新寵五老藏書憶舊山闕子雲莫自惜才慳具茨詩集卷四
