body:
  text: 具茨文集巻六明王立道撰雜著原政夫升降者道也善惡者政也隆汙者治也治由政出政由道立道降而政之善政善而治之汙者古今未之或聞也古之帝王求於道而不求於政故道得而政隨之後世求於政而不求於道是故政非其政治非其治而今之天下若異於古之天下云耳昔者大禹以六府三事告其君而曰徳惟善政其在洪範曰農用八政而必曰建用皇極者何也皆道也故徳行而府事叙皇極建而八政舉矣夫子之所謂人存政舉修身以道者皆是之謂也然而政之在天下也以道為體以時為用故離道非政也違時亦非政也易曰通其變使民不倦神而化之使民宜之昔者三代之興也夏以尚忠為政商以尚質為政而周以尚文為政若是乎政之不同也政不同而同歸于治者何哉道而已是故殷因於夏禮而周因於殷禮禮云禮云即道之謂也天不變道亦不變以不變之道而損益夫不得不變之法故纘禹服者非蹈常而反商之政不可遂以為好異也不然則違時之治其與夫徒法之弊恐亦無大相過矣故曰道者所以立本也不可不一法者所以適治也不必盡同是知道存之謂政建其有極之謂政通變之謂政宜於民之謂政此聖之徳而王之業三代之所以能長乆者此也漢唐而下其政可得而言矣封建削而郡縣以分民井田裂而租庸以率賦肉刑廢而箠笞以禁暴其於三代之政之大皆蕩然矣然而論治者猶或後焉以為棄其道而弗由則法之存無益也是故由其道則循漢唐之法而可以適於治不由其道則雖純乎三代之政猶不免為徒法而已善乎歐陽子之言曰三代而上治出於一而禮樂達於天下三代而下治出於二而禮樂為虛文夫所謂出於一者道即政政即道也後世離政於道而虚文以為治焉則雖謂之無政可耳愚故曰升降者道也善惡者政也隆汙者治也推而本之作原政巧拙辨客有問於予曰僕聞聖人賤巧而貴拙信乎予曰不然夫觀變而化裁者聖之能也因時而守則者士之修也奚而巧奚而拙吾聞古有羲之畫卦舜之使民禹之治水經緯天地而不窮範圍民物而各得其斯以為天下之大巧與亦有大拙若龍逢比干之死箕子之囚奴夷齊之餓屈原之沉湘而世固未有不以為忠且義也故曰聖有所通時有所窮無巧無拙惟變所適且子獨不觀夫化工之着於物也物物曲成類無雕刻然者斯亦天地之大巧也然而人猶有憾獨非拙與仲尼聖而多能有天縱之巧而齟齬坎坷終身不一遇雖謂之拙可也吾聞羿之射僚之丸造父王良之御扁之斵輪庖丁之解牛和緩之醫梓慶之鐻匠石之運斤皆以一藝之巧絶於時而名後世而况夫天下之大巧哉若之何其賤巧也客曰然則巧拙皆無不可與予曰不然夫巧或用之而善或用之而不善用之而善則為通變為神化為徳慧為仁術其不善者賊而已矣此漢隂老人之所以廢轆轤而孟子恥機變也惟拙亦然參之魯回之愚吾知其非宋人拾劵而田父藏石之類也客曰然則吾其從巧與予曰人生而靜天之性也感於物而動性之欲也拙其由於性乎巧其由於欲乎故拙之用其過少而巧之用其過多天人之殊也夫拙古今一而已矣而世之所謂巧者吾無得而窮也巧於言者喔咿滑稽巧於色者嫵媚嬉怡巧於容者便獧輕捷巧於文者淫浮夸耀巧於謀者隂詭狡險千態百變若出若沒子將從之吾且懼子之未能也且世亦有因拙以為巧者亦有因巧以為拙者吾聞老𣆀守黑而得長生商丘開窮老而子華以為上客寗武子愚而衛國賴之絳侯木訥而卒定劉氏後斯非所謂因拙以為巧者與吾又聞鄷舒以三雋才殺身智瑤以五賢亡族鼂錯以智囊死東市里克以中立禍晉國儀秦駢戮李斯具五刑斯非所謂因巧以為拙者與子獨不見夫鼯鼠乎挾其五技而不免為鴟鳶食者所長非所用也子又獨不見夫楚國之狙乎伐其巧以搏王之矢而不知養由基之鳴弦其後也故曰木訥近仁盛徳若不足顔子如愚而非愚揚雄草𤣥而尚白歸真反樸以道為質人之所拙我之所徳道學俗學曲學偽學辨古之為學者一今之為學者四四者何也曰道學曰俗學曰曲學曰偽學夫民生倥侗顓䝉非學則愚然而道者學之事也故記曰人不學不知道古之聖賢自其少之所習而至於終身由之自其名物度數而達於義理性命之㣲自其身之所以自治而推之以治天下國家自其一事一物而範圍天地之廣皆學也皆學則皆道也是故語其道則精一以執中多聞以建事前言往行以畜徳格物致知以誠意正心而修其身而未嘗不得之於學語其學則有好問好察之誠有昌言之拜有終始之典有制事制心之功有敬怠義欲之戒而其為法也甚備亦未嘗不本於道然則何道非學亦何學非道兹其道學之所由名也自夫功利之說有以耀斯民之耳目而淪溺天下之心於是乎世之所以為學者始有不出於道而徒以章句記誦為功文詞組繪為玩聞見口耳為習期以發䇿决科榮身肥家無餘事矣夫是之謂俗學抑亦有志不足以定守術不足以濟務而徒苟容取寵上以媚人主而下以悦當世因之以載髙位竊厚祿而方且自以為得兹孟子所謂以道徇乎人賈山所謂修之於家而壊之於天子之庭者也夫是之謂曲學末世滋偽抑亦有儒其衣冠言必稱聖賢而夷考其素有庶人之所不屑者所謂窮理盡性皆非其心得之説而人心天命不過為誣世之辭徳不足以修身正俗而術足以鼓動後生才不足以經世濟物而辨足以傾惑是非清不足以立懦亷頑而詐足以盜名竊位凡其所為皆名與實反心與迹違而終不足以欺天下後世夫是之謂偽學於乎古人之學一而已矣聖之所以為聖者此也賢之所以為賢者此也帝之所以為帝而王之所以為王者亦此也夫曷嘗有道外之學哉今之所以岐而四之者吾不知其説也盖自夫夏侯氏以明經取青紫而桓榮以車馬印綬侈稽古之功則俗學於是乎起矣叔孫面䛕以得貴幸公孫𢎞本學春秋而枉已阿世徒步取宰相封侯則曲學於是乎起矣至於偽學之興莫知所自吾聞之王制行偽而堅言偽而辨學非而博順非而澤以疑衆殺而吾夫子所以有少正夘之戮亦以此則偽學自先王之時已有之直不若後世之成俗耳夫是四者之學其邪正是非盖章章明甚而猶有待於辨者何也程氏有言昔之感人也乗其迷暗今之入人也因其髙明盖明道特以論異端之害而不知偽學之害深有類焉故夫俗學曲學人皆知其非而髙明之士乃或溺於偽而不知者惑於似而已其於道學盖不啻莠之於苖而朱之於紫此夫子所以惡是而非而學者之所以不可不致其力也於乎學以道名固已為夫學者之不皆道而為吾聖賢之學之病矣然而聖賢之學猶自若也今乃援以文姦假以濟私皇皇焉馳騖天下於詭言譎行之中籠之以虚名結之以實利使人入於其徒而不自覺而猶汲汲相髙曰我之學為道也我賢也我聖也噫聖賢之學其不幸一至此哉昔唐韓子論佛老之害欲人其人火其書廬其居明先王之道以道之愚以為欲息偽學者亦必如是而後可堯湯水旱解災祥之説所從来舊矣五行家者流推拆㣲隱於國有大災者必著厥咎焉天人之交若符契影響昭昭乎不可誣也然以堯湯何咎而水旱因之故古今以為大惑焉解之者曰理有常然數有適㑹語天而遺人者賊徇人以求天者固夫殃慶之騐見於易休咎之徵發於書祥生於和異兆於乖此皆理之常然而不可忽者故有國家者日兢兢焉畏天而保之猶懼其或戾也而或以為未盡然者是賊其君而已矣然而有適然之數係於天而人弗與焉者堯之水湯之旱是也夫九年之水七年之旱雖大無道之君其應當不若是烈也而以堯湯致之其説誠有所不通矣愚嘗觀春秋所書自某月不雨至于某月皆以為大災而記之率不過數月耳旱水而計年非古今所未有之災耶以堯湯古今未有之聖而罹古今未有之災是故可以天數言而不可以人事論也夫洪荒之世剖於一氣之混淪者震盪衝軋雖天地有不能以自定其形者堯之時去洪荒未乆也湯之時去堯亦未乆也則夫雨暘之不時水旱之不得其常固皆未定之天而二聖人者適遭其㑹而己曰然則舜禹舉而汎濫除桑林禱而雨方數千里者何也斯非人事盡而災弭者與為其弭之有自知其所以致之者非無繇也噫是又可以觀天矣聖人不以適會之數而廢其常然之理而天之既定則又未有不復其常者也然則堯之水湯之旱其始雖由於數而其終卒歸諸理知夫數無常而理有常則人君之所以事天者其有不容忽焉者矣書孔明出師表後於乎孔明惓惓以討賊興復為己任故表此以堅後主亦自量其才力優然耳孔明既死而姜維卒以數出敗哀哉夫中路而輿傾輹脱則騏驥雖不能千里非其罪也以駑馬御朽索服敝輿而希千里多見其不知量已且親賢臣逺小人先漢所以興隆親小人逺賢臣後漢所以傾頽孔明二篇中要㫖正在於此以後主之庸懦而黄皓實左右之此東京之後車也是雖孔明猶難之而况於維乎善乎曹參之對其佐史曰陛下孰與髙帝參孰與蕭何賢此可謂能自知抑能知君者當時惟蔣琬能得此意惜其不乆于位耳夫以全蜀之資而孔明為之佐善守之可以後己詩所謂自詒伊慼者維之謂矣予讀二表歎孔明之忠誠而惜後人之不善用之也用書之以鑒云跋葉母還金傳予每讀史記貨殖傳至巴寡婦清未嘗不歎子長之多愛而譏其謬也夫傳貨殖已非所以為訓清以一婦人而且得托名不朽貪夫窶人將日皇皇焉畜聚積實恥一婦人之不如使天下見利而不聞義則子長之罪也於乎若葉母者其事可以傳矣貪夫窶人又安得不聞其風而重自媿恥一婦人之不如而不敢覬幸於非有之取也予史氏也一言以為知一言以為不知盖於是乎有深感焉泉釋有東吴主人航揚徐之津涉齊魯之郊倚軨息駟來游于燕不知幾何年矣燕大夫疑其為而造焉迺問焉曰夫顯隱違方林市戾趣故士不貳業而聖不兼濟今子棲志於冲泊之鄉凝心於虚寂之塲被纓組不汩其貞遊公卿不和其光若隱若顯與時翺翔瞿瞿抑抑退然自將而名聲熻乎四張子獨何以有是也吾儕耽優游則罕簪紱之榮嗜進取則寡山野之適將姁媮喔咿則内不自得或偃蹇傲睨則外􅘅於物意子必有竒道善術可無秘焉主人聞之矍然興曰有是哉有是哉吾聞夸世者徇名而葆已者遺迹砥行者譽立而内腴者不章今子不鄙譾陋幸臨貺之顧無博論碩談以砭我頑冥療我憒憒而盛相推揄吾且茫然失吾對己又安所取道術雖然吾日嘗有樂乎泉若終身焉其於物澹如也願因子之言繹之大夫曰夫髙世之士林卧而巖居蕭然無營以泉自娱盖嘗觀於泉之出也經巑岏越嶔﨑厯㟏岈縣崔嵬薄深崖注層谿俄而千巖噴溜萬壑傾欹矚飛流之百仞似天際而下垂耿雄􅛆之連延逴銀漢之逶遲揮砉迅奮翕􅝉紛披觱沸瀄汩電逝颷馳潗然雨集滃然霧瀰飛鳥振翼而不敢下騰猱掉足而不敢窺吕梁因兹喪險匡廬以之失奇靜而聴之馮馮殷殷鏘鏘錚錚隆隆淫淫淙淙泠泠若沸若唫有金石絲筦之聲倡和中律清濁比音若聆洞庭之廣樂而聞蘇門之仙嘯也子豈有意於斯乎主人曰子言則善矣吾方嬰情市朝饕祿干位又安敢假隱金門貽譏北山子幸知我願言其他大夫曰夫泉之出也汎潰林麓横溢溪澗風文淪漣春流汗漫於是有河栁縁堤海棕䕃岸珍卉靃靡芳林葱蒨菱華始發夫容照爛紫荇白蘋旖旎紛亂錦鶒文鴛鵁鶄鳬鴈唼啑蓱薻隨波隱見爾乃有吴娃燕姬曳纖縞出洞房衷白紵被羅裳襲齊紈之輕袿懸隋珠之鳴璫御以蘭楫桂棹縱横舒皓腕蛾眉颺攘素袖流芬芳發采蓮之妙倡遡迴波以徜徉歌曰采芙蓉兮渌水湄青春莫兮愁芳菲望空明兮露沾衣所思不来兮將安歸此真佳冶靡麗之觀也子豈有意於斯乎主人曰冶容誨淫五色眩目是易老之攸戒宜吾人之三復請更命之大夫曰夫泉流既清激為陂池繚以曲檻朱欄參差土山石林礧砢離奇乃有層樓列館飛甍蔽虧虹梁偃蹇架其上華榱煒煜照其涯夜月浮光朝雲鏡輝魚從容以出遊鳥顧影而翻飛時惟陽春日在上已乃速嘉賔延名士步障横舒行厨錯置翠旍朱輪方軌狎至擬華林之髙㑹尋洛濱之遺事頫流水而列筵洗霞尊以修褉引筆長吟憑檻四睇唱籌則金谷推豪摛翰則蘭亭讓麗濯纓言歸聊以娱志吾子誠厭鄭衛之妖冶屏嬿婉之繁麗則此似未足累子也主人曰臺池之樂亦貴游侈泆之習耳吾儕區區安可語此大夫曰夫嘉賓良燕非酒弗交於是酌清流之芳瀾汲深澗之春濤醖以秫蘖醇酎清縹儀狄奏盎杜康挫糟則有宜城竹葉中山松醪河東桑落西域蒲桃味擬神瀵香踰玉膏迺矢瑶席操鸞刀割鮮導腴或寒或炰窮天産傾土毛水陸多方甘辛既調芬芳馥郁煔臛煎熬麯車接軫炙騎連鑣舉斚若星搖酹鍾如電交於是與鄭朝齊髠劉伶之徒浮白箕肆裸噭為豪或奮袖低卬或絶纓遁逃一飲晝夜其樂陶陶乃歌曰今日何日兮有酒盈尊歡樂易終兮悵獨惜此芳辰𠂻情永懐兮誰與陳此真遊讌之至樂也子亦有意於是乎主人曰酒以成禮不及於亂荒酣沉湎君子非之大夫曰夫烏程御荈䝉頂真茶摘以春旗焙以冬牙篚以文竹沃以金沙龍團雀舌隱如蒸霞爾乃㪺石罅之清液收山谷之精英湯鼎旋瀹瓷甌細傾香浮白花光淪緑塵可以釋滯可以通靈則有江湖逸士縉紳先生相與掇莊老之浮談駕孔墨之遺評左揮塵右操罌揚眉扼掔鼓吻風生九流雜遝百家縱横紆譎㣲𦕈誇詡紛紜齊諧夷堅之志岐陽鄒嶧之文探奇獵古語傀搜神談天炙轂軼衍陵髠方朔聞之而巻舌夷甫嘅然以失聲此真談説之樂也子豈有取於是乎主人曰清談成習晉以陵夷尤而效之吾不為也願言其餘大夫曰惟彼大江之南厥田上上迺陌迺阡衡從萬區土膏填淤陸海廣腴當其時雨既至溪流𣺌瀰乃命僮奴巾柴車戒鎛耜觀新畬疏湮導瀦決塍分畦逺而望之則濎兮瀯兮瀏兮洌兮紛曼延兮浩兮濊兮決兮沇兮流沄沄兮茫兮若朝夕之池汎兮若鄭白之渠糾笠煙屯襏襫風驅亞旅疆以旁午而趨繽紛跆籍緁獵柴池於是百榖既播載耕載耘黍麥穜稑其稼如雲紛披葳蕤緑葉翠莖則有和風交於逺疇白日麗乎原隰野雉羣雊天雞拊翼浩浩穰穰畮刈􅎌穫在塲盈塲在室滿室此真豐庶之樂也子豈有意於斯乎主人曰務本力穡信異乎侈肆淫泆之為矣然仲尼有言不如老農請姑舎是大夫曰夫上池之水其源莫測清明淳和挹而不竭爾乃叅以岐黄之秘綜以倉扁之術察隂陽診虚實審四時瓜見五色輕重剛柔齊和不忒可以濯胸中之淫衺滌腠理之癥結溉五内之沉痾浣膏肓之錮疾功在一勺渾渾冥冥浸淫大宅起廢持傾巧奪俞跗效擬巫彭大旱爍金而不為加少百川灌河而不為加盈其山則雄黄空青丹砂礬礜石英五金百材之所生也其鳥獸則鹿麋熊彘犀豹之所遊也孔雀燕鴈鴝鵒啄木伏翼之所棲宿也其木則有松桂椿栢槐蘖枳橘棗㮚女貞布實垂榮其草則有昌陽參苓藁本辛夷芩艾葵藿芎藭芍藥茺蔚菴䕡蘭芷杜若而又有良玉夜光靈草冬秀灑潤則千林同春飲滋則百物俱夀辟若家菊潭者必擅耆頤之年飡石髓者必登仙聖之域也今子守此自足恬然無求而王公貴人莫不欲探其涯涘挹其津流餘波剰沫委地不收窮閭逺境霑濡未休則子之樂者其在是矣於是主人逌爾有間曰夫大隱不出市良醫不易相民各有心亦惟其尚子迺蠱我以耳目之娱侈我以荒唐之觀是甘玩物之宿盭而闇折肱之成業也溺美炙之鴆毒而忘苦口之利躬也幸聞後論請終身誦之訟雨師文皇天造物兮雨以潤之霖潦為厲兮繄誰是司雷填填兮洊震電熒熒兮若連熾天冥冥兮同雲羲和失官兮豐隆得志霏㣲霡霂兮忽而為此滂沱波流汩汩兮陸殫為河百川上溢兮淼不見其渚涯魚龍紛綸兮使河伯望以嬉夜淋淋其不休兮又繼之以日有釜懸炊兮有蛙在室我黍離離兮蕩無遺穂我禾油油兮魚得食只予欲斬彼雨脚兮苔繡劒而無鋩射彼豐隆兮弓筋解而不可張御六虬兮上天叫帝閽兮開闗出望舒兮畢宿洗大明兮虞泉飛亷疾驅兮取彼屏翳馳蓐收於髙唐兮械陽臺之妖女山縮氣兮川安流蛟龍蔵兮無逺游諒昭昭兮既定令我心兮解憂跋栁宗元乞巧文士之不得意於時者其辭多憤激過情有怨尤之心焉予觀栁州所為文往往自謂其愚且拙至於山水而亦欲以愚䝉之其作乞巧文固也然予知栁州非愚者叔文之用事也入其門者類非斤斤遲鈍椎魯之士而斤斤遲鈍椎魯者亦必非叔文輩所能容予是故知栁州非愚者其作乞巧抑以解嘲云耳夫栁子所乞其一事為文章讀乞巧文即文之至巧者又何加焉且愚者多不自見柴之愚武子之愚惟夫子知之二子未知云故惟不自知其愚而後為真愚知其愚者必非愚也亦觀人之法然耳予因讀而疑之遂竊識焉使知栁州之巧有不待乞者昭穆遞遷考按昭穆之制其説不經見惟商書伊尹曰七世之廟可以觀徳見商之禮在孔子時已不足徵然即是求之亦可以見有國則有廟有廟則有昭穆有昭穆則有祧祔其不遷者獨太祖之廟記曰天子七廟三昭三穆與太祖之廟而七夫徳厚者流光故太祖之廟百世不遷所謂盛徳必百世祀禮也亦義也自昭穆而言則左為昭右為穆昭之一廟二世之主居之昭之二廟四世之主居之昭之三廟六世之主居之於穆亦然穆之一廟三世之主居之穆之二廟五世之主居之穆之三廟七世之主居之取諸向明故謂之昭取諸深逺故謂之穆南北之異也至於八世而下則有祧如二世祧則四世遷昭之一廟六世遷昭之二廟而八世祔昭之三廟矣三世祧則五世遷穆之一廟七世遷穆之二廟而九世祔穆之三廟矣凡此皆劉歆之說而朱子有取焉者也抑嘗疑子雖齊聖不先父食今昭者祔則穆者不遷穆者袝則昭者不動若是則如昭以八世升祔者得列於七世之穆之上矣曰非也宗廟之次惟以左右為昭穆而不以昭穆為尊卑故朱子謂五廟同在都宫則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而内有以各伸其尊盖每廟皆有門堂寢室而牆宇四周焉亦何先食之嫌之有哉不然則紛然於左右而迄無寧主如七世之穆當遷者則一遷而為昭再遷而為穆又再遷而為昭一世祔而六主皆不得安其神果禮也夫獨世室之説猶有可疑劉歆謂七者其正法數而宗不在此數中宗變也有功徳則宗之不可豫為設數故周有文世室武世室而商則有三宗焉無定數也若如諸儒之説則文武之廟即在七廟中而天子亦止五廟與諸侯何以異乎况如商有三宗則又當脩八廟矣竊意禮莫備於周亦莫善於周然當籍去書焚之後漢之時諸儒之説已與劉歆異而終未若歆説為得是以朱子取焉然朱子不遂以天子之廟言之而猶假諸侯之五廟似亦闕疑之意云耳夫禮從宜易曰觀其㑹通以行其典禮盖禮者理也孟子論班爵禄及喪禮經界皆不屑於往迹而後世不之非者惟其理而已知禮者其尚識其大云擬端午日西海泛龍舟並晏兩宫致語伏以天中佳節浮畫鷁於滄溟蓬島勝游擁金輿於瑤席錦標漾日競功一鼓之奇綺幄圍春致味八珍之享禮超千古喜溢九垓恭惟明聖康恵慈夀皇太后陛下柔道承天徽音嗣世理隂教以治内為天下而得人章聖慈仁皇太后陛下窈窕性成恵溫夙著惟君子之好逑為天下之大母迺者膺天休而齊夀受聖養以同尊張西海之瓌觀厪東朝之法從紫鸞並駕旖旎乎金支翠旌青鳥雙翔縹緲乎龍輈鳳盖望龍津而止輦攝翟袂以登筵兹盖伏遇皇帝陛下乾徤重華離明繼照治既隆於法祖孝尤篤於養親屬此昌辰昭兹盛舉維揚百煉而鑄鏡後宫五采以縈絲閶闔九重桃印已纒金縷昆明千頃樓船共載華旗桂棹蘭橈㶑灧汾川之曲菖花艾葉葳蕤渌水之湄歡聲動而海若蔵神技呈而馮夷舞霞觴稱萬夀賡周穆之遺歌仙樂奏九韶掩葛天之浩唱用怡慈極匪快宸游臣等素濫吹于伶官幸執藝於天樂僭陳俚語奉凟宸顔辭曰澹蕩神池銀漢通寳輿齊降紫雲中天迴祥鳳凌黄道波動飛龍起翠空玳瑁筵開宜永日水晶簾捲自薰風更於何處尋𤣥圃阿母年年此地逢帳詞伏以郎官出宰承宣之寄斯隆循吏樹聲激揚之義攸在國家令典憲府㣲權即墨之無毁言匪求助於左右中牟之多善政第取信於兒童恭審邑侯楓潭萬先生閤下學泝淵源行成軌範步趨而窺道極斧藻以為徳華生應地靈登陳榻而嗣武出為國寳訝雷劒之重光擢禮闈以蜚英涖夏官而試政方綴金閨之籍旋膺墨綬之榮一命焜煌喜美錦之初製百里盤錯知遊刃之有餘武城以學道愛人太丘以平心率物剛介之操凜風裁於獨持精明之才擬水鑑而不爽探丸戢虣咸稱邑有神明帶劍還農此謂民之父母惡如已病清恐人知隣境借威遂弭鳴桴之警掾曹束濕用消刻木之姦卓犖聲名増髙九華雍容文物作表百城迺述短詞奉揚美化詞曰桃李三春風景絃歌百里人家鳴琴欲了日初斜一官清似水無事早休衙天際舟横野渡雨餘人種桑麻使君美政總堪誇恰如春有脚行處滿城花右調臨江仙具茨文集巻六
