body:
  text: 具茨文集卷一明王立道撰賦大祀圜丘賦伊我皇之繼統立極也德流寰區風漸海隅車書同於文軌疆域掩於唐虞橫目之民咸熙熙皞皞嬉嬉于于木不貫刃道無荷殳重九譯於越裳勒豐碑於居胥北通窮髮南及雕題莫不稽顙內向奉珍來輸上格昊穹下綏皇祇洪河晝湛靈液夜濡幽明咸鬯和氣充衢我皇於是坐明堂考禮樂稽諸古典秩然有作惟國之南是經是度就陽位以肇啓挾舊規而前拓壓鴻龎而創基包坤維而亘絡法天體之惟員發珉石而礱錯陶人效其巧思蒼蒼協於正色表重階之崔嵬施廣陛於九級佳氣浮而蒨葱祥烟起而靄鬱迥瑶宇之廓虛聳碧岑之千尺回延乎赤道森羅乎紫極卿雲彌於璇穹日月曜其精魄於是天子乃歷長樂出建章修大報之儀迎長日之至駕文玉之雕輿控騏驥之馴駟飛廉奔而啓途羲和騁而執御金戈交於玉戚鸞輿雜於龍旌飛霞鑠電騰波錯星虎賁貫文犀之甲力士垂曼胡之纓紛旖旎乎後先班陸離其充盈羅幬繡幔綺轂錯衡行如風發止若林屯齊宫啓而晨肅周廬列而無驚氊案既張采席甫設天子乃戴珠旒奉蒼璧太羮粢食之儉𤣥酒明水之潔有黍稷之馨香有特牲之繭栗玉梢舞而招搖金支動而從律獻終三觶歡洽百神命司駕而旋馭適扶桑之朝暾開閶闔而御黃道撞洪鐘而御紫宸千官列陛萬國輸琛道泰亨而離照福川至而日升斯可以見仁人之饗帝而孝子之饗親者也遂作頌曰惟皇九葉明德馨兮圜壇穆穆秩明禋兮上下四方神揚靈兮嘏錫無疆宜子孫兮於千萬年永清寧兮亂曰黃鍾應律迎初陽禮成享帝還明堂閶闔遙瞻黼幄張氤氲曉日飛晴光玉輦徘徊龍馭翔雕戈金戚森寒霜扇開孔雀朝未央千官濟濟趍鵷行圭駢組緝鳴玉鏘鈞天廣樂喧八方瓊筵既登折爼將雕盤絡繹皆芬芳琉璃琥珀凝瓊漿飲酒樂豈恩汪洋九夷五狄來要荒鳳儀獸舞何蹌蹌羣臣起稱萬夀觴泰交上下賡明良願君之福熾且昌天髙地厚同無疆觀泉賦維嵗在於丙申兮值春季之佳辰帝淵居而凝道兮感雨露之芳零撫肇造之孔艱兮仰在天之神靈惟祠享之時修兮曰未既於厥誠想衣冠遺於鼎湖兮思躬致其精禋乃夙戒於百工兮筮榖旦而于征時龍中天而順動兮翊慈闈以偕行金輿玉輦先後而赫奕兮葳蕤乎鳳蓋之與龍旌望天夀以遙駐兮周長康之七陵孝思穆其上通兮若洋洋乎陟降於斯廷已乃奉慈幃以周覽兮歷輦道之逶迤指玉泉之佳境兮峯巒嶔崟而蔽虧山含澤以涌精兮玉液溜而旁滋宛銀漢之麗空兮飛虹飲壑而下垂颯㳫乎晴雨之灑翠壁兮電翕霍而過之清泠泠以揭毫兮白淙淙如凝脂蛟龍騰流以雨下方兮虎豹懾而不敢窺彼吕梁之懸水兮羌無以蹈其津涯矧匡廬之瀑布兮又何可與爭竒千官忭而承流兮六宫共挹於清漪湛神而洗心兮滌煩而去膩瞻天顔之穆粹兮承慈極而同怡抑聖智之樂水兮觀逝者其如斯亂曰神京峩峩環名山兮藏靈吐精激洪泉兮飛湍流沫匯清漣兮葳蕤翠華來自天兮爰奉夀母移雲軿兮逰豫永日承慈歡兮風旌日馭六龍旋兮多福永年至若川兮登城賦繄朱明之屆節兮炎暑倏其如焚塊獨處此幽庭兮氣鬱湮而弗伸御纎絺之輕裾兮想大壑之層氷步余馬於城南兮弭余轡乎曲闉歷陂陀之峻陛兮攀雉堞之嶙峋髙閣屹其造天兮迥四絶於遊氛臨廣路之如砥兮師左右而縱橫騎纍纍而變騖兮車轂擊而殷殷千薨疊以鱗比兮萬户鬱其連雲紛侯家與戚里兮歌鐘喧而晝聞瞻𤣥丘之重壇兮欽降格於萬靈眺黃金之廢址兮懷昔賢之遺芬尋易水之故宫兮氣慷慨而填膺忽遊目以肆覽兮迥天宇之清明仰太微之紫都兮披閶闔之重門層宮嵯峨莫可以殫名兮吐佳氣之氤氲土山鬱其葱蒨兮麗萬夀之鴻名玉繩耿耿其下垂兮亘析木之長津太行西回而逝兮窮幽陵之北垠倚長城以為關兮勢獨得於建瓴偉河山之襟帶兮陋百二之咸秦臨風浩以增欷兮想非熊之舊勳羌守道而不渝兮豈不至今其猶存慨賢否之迭代兮若寒暑之相仍何宋德之弗競兮委禹蹟於荆榛憫淪胥於四百祀兮啓帝祚於我明祖業廓其如天兮又惡可以縷􅞽雖億載其不遷兮闕引巵酒以自觴兮若餐飛霞而吸玉英薰風徐來以習習兮若凌虛而軼太清忽浮雲之涌起兮日暗曖其晝隂雨足散於西垂兮豐隆滅而東行漠崦嵫之闕兮杳四荒其冥冥俄雲收而雨歇兮返照在於東林樹離離其掩映兮草萋萋而增榮白鵠逝而雙翔兮鳥搶飛以投林嗟豫去彼故鄉兮依日月之光明偉余友之六七兮萃縉紳之豪英承休沐之餘閒兮蹇消遙於芳辰佩聖恩之優渥兮曾莫助其髙深願矢心於頌禱兮日兢業於盈成彼殷周之卜世兮良昭代之所羞稱亂曰登髙望逺敻層城兮平原膴膴夏氣浩兮覽觀聖圖遐思運兮願依明時耿垂名兮嗟嗟我友庶同心兮景雲賦皇帝十有七年將以季秋之月饗帝於明堂奉獻皇帝配二十一日辛卯曰惟其吉先時己丑太史奏景雲見皇上乃既齊心明禋受兹𤣥貺臣等竊稽往牒參綜舊聞天子孝則景雲出遊又曰景雲者大平之應也臣惟皇上嚴父配天懋昭曠典至德懿行通於神明蓋詩書所不能紀漢唐以下靡得而倫焉信所謂天子之孝古今而一人者矣洪恩博洽覆露羣物薄海內外莫不相煦以生相熙以寧昆蟲闓懌草木鬯遂諸福之物固已悉至則所謂太平之應其在兹乎其在兹乎臣備員史局覩兹盛美忘其愚譾謹拜手稽首而作賦曰粵吾皇之撫御兮體至道之𤣥沖握元化以儲精兮侔三五之淳風澤周施而德洽兮若天旋而地容木委刃而偃革兮車書馭其㑹同掩殊絶之裔醜兮重九譯而來通仰王迹之昭夏兮軼黃虞以並隆爰發睿謨以稽德兮裒古昔之遺踪覽天人之統㑹兮覃和樂而化中秩神明以謁欵兮凛夙夜其寅恭展備物以純恪兮百靈翳其畢從郊社假而洋洋兮有廟時罔怨以恫咸流祥而隤祉兮啓聖孝之純𠂻惟周道其𢎞備兮粲明堂之彛式曰嚴父以配帝兮庶尊親之並得慨大禮之久湮兮咨疇人之失職下綸音以博問兮羣工翕其承德乃詔宗伯使考儀兮進太史而諏吉時季秋之既屆兮百司翼翼其咸飭吾皇儼盡志以待事兮神穆穆而凝一祗黍稷之未薦兮帝居歆於明德越先時之己丑兮穹窿顯其降格廓璇宇之朗清兮有雲爛其承日闕曄幡纚兮紛輪囷以蕭索謂似烟而非煙兮絢異采之五色景煜霅以宣耀兮氣氤氲而充塞焯文章之璘㻞兮渥光華之的皪都人歡以騰觀兮倏闐郛而溢陌保章奉䇿而奔走兮表希世之珍物曰昔黃帝之神異兮爰始紀於師名暨有虞之呈慶兮歌旦旦而載賡斯隆古之上瑞兮匪懋德其曷膺欽吾皇之法天兮精純粹而文明倏光被以化成兮猶日照而雲行允可就而可望兮恬無為以至清天既眷命而孔固兮又洊貺之以嘉生肇三錫以寶露兮河湛湛而再澄厥亦有動植之珍符兮含協氣之精英上幽通於𤣥皓兮俯允兹於坤靈休祥紛其砰隱兮偉卓犖於前聞肆闕羡之未已兮迎盥薦而昭徴仁蕃釐之熾昌兮日杲杲其方升垂離照於四方兮霈需澤於八垠配髙明以無疆兮綿千億之雲仍喜躬逢此嘉㑹兮愧含毫之未能勉陳詞以揚休兮流昭代之頌聲喜雪賦司馬相如侍帝於甘泉之宫枚臯卷談方朔弛嘲角抵罷戲長樂輟朝澄神淡志獨立逍遙時同雲四布輕霰遙集溫先寒凝乃大雨雪帝顧相如曰夫陽臺之雲淫誣不經大王之風與士庶爭雄况楚為列國玉乃陪臣辭浮而志微吾不與也兹天不遺寡人惠此時雪燦然呈瑞年其以豐物其以遂子可無為寡人賦之相如乃再拜秉觚而進曰惟萬物之揫斂承冬氣之閉塞天地不交稚陽下結隱雷收聲甘霖屯澤枯槁失潤物乃不植於是豐隆效能滕六表職羃𤣥隂於四荒彰竒功於六出始紛紛而漸零既皓皓而駢積萬籟潛空千里同色琳珉繽紛琅玕合㳫上林則琪樹連枝御溝則瑶草映隰鶴翩翩而迷羣鷺下窺而不食炯如若木之華朗通不夜之國掩姑射之仙膚奪素娥之幽色但見方階瑶疏圓亭縞潔朱薨排銀皓壁增飾圭連通天之臺瓊飛建章之闕攀井幹而欲上目眩轉而神懾恍乎天上之玉樓與清都而相接是將使帝居盡為雪宫黃山變為長白吳門失其匹練而荆璞遺其藏璧者也於是帝乃拊楹徘徊意暢心繹乃歌曰黃竹娟娟兮青鳥飛望佳人兮隔瑶池騏驎驤兮安終極覽祈招兮我心思又歌曰雲冥冥兮雪氛氛睍流光兮滋澤下行土膏渥兮元和凝百榖用成兮康我民於是相如復拜手稽首起而賡曰帝德雲行紛四周兮磅礴滲漉物咸休兮帝膺嘉生與神謀兮帝歌白雪和者疇兮於是帝乃顧景徘徊步輦而入果書祥於有年繼宣尼之特筆憐寒蠅賦惟秋容之淒淡忽冬氣之復冽霜凛凛而晨凝風飄飄而夜發雁折蘆而南度蟬抱樹而無聲螢依依而光滅蛩唧唧而微吟爰有營營青蠅離披顛蹶垂首零丁吞聲泯息翅欲振而還斂足將緣而無力觸微風而遽隕依日影而羣集或低墮兒案撲之狼籍或强沿杯盂驅之沒溺多無故而自殭與糞壤而駢積嗟爾蟲之甚微何消息之靡一昔孟夏之恢台常爾曹之志得率羣聚而狂攘恣貪婪而罔戢既紛擾於闕亦沾汚於服食咸汝怨而汝憎與蚊虻而同疾麾之復來萃儒衡之瓜窮之靡得觸王思之筆曾時月之幾何遽黯然而喪魄幸隨驥而千里今苟存於一息豈所遇之非時將多罪而致孽吾嘗叩蟪蛄之年憂蜉蝣之翼抑定數之使然人何暇於欣戚惟萬物之於時咸有得而有失雖蛟龍之孔神或失勢而潛匿矧爾物之小醜又何足為善忒惟大塊之生爾誠有害而罔益能黑白之易常類讒人之亂國聊示警於幾微庶少懲其罔極頌擬皇史宬成儒臣獻頌古者國必有史左以紀事右以紀言故雖朝廷之大宮禁之嚴四海之廣千百萬年之逺而一時君臣謨謀政治風俗皆賴以有考焉所以稽得失備法戒質古今而觀盛衰也繇唐虞三代以來粲然具矣古者史成必緘之金匱藏以石室以是為一代重典尊而慎之不敢忽也我國家法古為治自太祖以及毅皇百五十年有實録以備紀有寶訓以垂範皆職在史官修而藏之以詒來世然代異簡册人殊筆録不足以昭大典示久逺我皇上遂簡命諸臣重加録而校讐焉復倣古石室為寶藏之所扁曰皇史宬臣愚適際厥成有以知皇上稽古右文之心尊祖敬宗之盛美謹拜手稽首而作頌曰惟古有史君舉必書左言右動載筆罔遺赫赫彤管螭坳列立南董馬班各専其職惟我有明肇自太祖太宗仁宣英憲孝武煌煌帝業洋洋聖謨超墳襲典溢於翰觚廣記修言網羅散失郡國所上太史所修藝籖縹帙金匱咸收簡冊既繁先後靡一於惟我皇覽於前籍因而出之爰正爰輯繕録靡忒校讐孔精諸臣咸勤用觀厥成乃審厥藏倣古石室司空載營石室有翼匪棟匪楹不節不棁斫之礱之有賁其飾瑰階玉磩廓其靚深疏以瓊户啓以朱扄昔藏名山京師留副制崇蘭臺嚴先四庫其在於今乃知其陋百千萬年繄與國永夀擬七廟成頌皇帝嗣位十有三年洪恩汪洋方內乂安靡有金革之警施及民物罔有不若其欲者於時衆神允答百祥咸臻州邑以瑞貢者途相踵焉斯可謂太平極治矣思惟國家賴祖功宗德肇光啓之以克有今日而廟制弗稱無以昭厥孝思且稽之典禮亦戾古甚於是因太廟舊基廓而增之備七廟之制越某年某月告成臣某樂覩盛禮謹拜手稽首而作頌曰翳我皇明肇自太祖太宗仁宣英獻孝武百世千年我皇承之先後一道受命咸宜德昭馨香惠同民人和氣四鬯禮樂可興乃惟典彛郊社耕蠶率繇古式是講是遵於惟廟祀悖經瀆禮時謂弗欽神罔歆止肆厪宸衷爰究爰度舊基式因新宫始作乃召司空庀材鳩工經之營之于國之東乃召宗伯草圗筮吉弗儉弗踰惟古之則厥基既崇繚為都宫中廟翼翼太祖是宗惟南有昭惟穆北列左右以班數協於七壖垣廡門堂寢戺廷煌煌朱户燁燁丹楹隆棟雲興層簷霞矯山藻含輝金熒碧耀周廟穆清魯宫閟洫落而歌之其詩孔碩况兹七廟禮隳制湮歷千百年乃興自今既親既尊以享以祀於昭陟降神具依止無逺而忘無昵而豐萃以假廟乃罔怨恫霜降露濡駿奔伊恪賚以思成綏以戩穀何以穀之子孫千億於萬斯年永建皇極擬祈穀禮成頌古者祈穀於春所以修農事崇彛典精意以享而冀上帝之明賜以豐稼穡以康民人者也詩曰祈年孔夙月令孟春之月天子乃以元日祈穀於上帝古之制也歷代或弛而弗修或行而匪時太史弗告瓜見土瞽弗告風啓蟄龍見官失而禮湮其來非一日矣惟我有明議禮制度有其舉之皇上御極稽古而勤民凡天地百神之祀禮文咸秩故兹祈穀之祭嵗必一舉乃嘉靖丙申春月臣愚幸得觀於禮之成因拜手稽首而為之頌曰惟后繼天百神是尸昭兹明德帝其懷之休徴孔繁庶民滋殖有年之書望於簡冊帝懷彌固后心彌䖍三禮是祗馨香罔愆於仲之春乃祓乃禋祈兹嘉穀用康小民匪臭伊時帝夙監止乃降百福以稷以黍既播既植時雨而風穮蓘靡勞嵗其屢豐穫之穰穰倉庾畢盈民有饔飱君有粢盛粢盛既潔士女伊穀嘉生咸臻天子是若老人星頌夀陳處士皇皇𤣥象三辰錯陳載出載入為緯為經惟南有星其光孔明太史占之是名老人隂陽合質五行儲精日助之華月滋其英兩兩附景乃子乃孫是星所加為國庥禎欃槍屏伏枉矢沉淪民無疵厲既夀且寧自今耿耿有吳載臨揚州之域五湖之濱於惟處士允叶厥徴肥遁明時孝友蒸蒸令德令儀宜爾遐齡保艾無疆福履永貞瑞麥頌惟皇御極十有八年仁惇而義作之天下靡然同德用光我列聖之鴻化至於興禮樂制度罔不惟古之稽以飾政釐俗百辟卿士敬共無斁乃以嵗戊戌開明堂以饗上帝己亥二月命皇太子正儲位爰始省方於楚先後相襲恭視顯陵五月特命重臣奉皇太后以祔禮也覃恩勤施動惟厥時仁聖之事該而慈孝之理備矣蓋宗祀配帝尊親之儀也元良豫建保傅之規也寬租賑貸春和之澤也慎終考禮亮暗之訓也於時馨香之治上下允格景雲再見鬱為休符逮六月某日某縣以瑞麥進或一莖七八穗斯實曠世之珍物盛時之上瑞天道地寶交見㳫至宜列樂府被之絃歌以薦諸郊廟協和天人臣某恭覩厥祥敬拜手稽首而作頌曰明明我皇紹聖遵業惟精惟一天德既𢎞人紀再協乃惟古訓是式是彛以尊以親郊廟咸宜肆惟明堂饗配翼翼儲闈繼啓國本攸植時邁於楚江漢來宗龍旗陽陽賁於𤣥室𤣥室鬱鬱先帝攸宅我其仍之妥我慈魄我皇再來萬物咸覩爰命有司家至户撫撫之惟何爰賜之租厥角載道達於帝都和氣大洽上帝載豫乃錫嘉祥不逺畿輔㷀㷀之麥同莖異穗或以七八闕呈瑞玉粒含光如彼貫珠金芒潤澤翠葉紛敷惟此來牟帝命率育地不愛寶乃兆嘉穀於昭靈貺匪物之異小民其康針于有位表擬宗廟成羣臣賀表伏以制備穆清法先王之立廟誠通萃假昭孝子之享親制度達乎古今明聖兼乎述作神人胥慶上下均歡恭惟皇帝陛下巍巍若堯之則天翼翼如文之事帝立愛則明倫有典傳心則敬一有針適百年興禮樂之朝以一人建中和之極祀分丘澤決數代之疑文禮舉耕蠶復歷朝之曠典兹以左祖之制雖克備於肇祀之時而同堂之規猶或安於前代之舊孝思罔竭古禮或踰乃因故址而經營遂命司空而爰作卜筮獻吉虞衡入材梓人效審曲之能大匠董繩直之役百工咸趨而從事庶民勿亟而子來世室都宫定制逺追於周廟左昭右穆成規獨異於魯宫堂寢維新門廡有翼信乎外有以不失其序而內有以各伸其尊聖孝克盡於奉先宸𠂻獨契於稽古者也伏願祖功宗德培國家有道之長聖子神孫保社稷無疆之福寢成延於百世流光被於萬年擬宋王堯臣謝賜禮記中庸篇表天聖五年伏以賜第大廷天寵獨先於多士頒經中祕聖學妙契於斯文義重表章道存方冊入懷袖而生輝示縉紳而動色臣某頓首上言六經皆載道之書莫辨乎禮三聖有傳心之法允執厥中訓嚴理欲之兩塗志通先後而一揆自仲尼沒而微言幾絶暨子思出而正學復明究極天人發揮德業開關啓鑰慮逺憂深附禮記而為經揭中庸以立號幸撥秦灰之餘燼尚存漢疏之殘篇在聖賢語焉而己詳顧世儒習之而不察誠明要㫖與王制月令而兼收性命真傳雜內則少儀而靡考蓋必學乎古乃有獲信乎待其人而後行者也恭惟皇帝陛下自誠而明修道為教善繼懋周王之孝好問廣虞帝之公惟議禮兼得乎考文故博學肆厪於明辨恭儉莊敬而不煩文理密察而有别乃於載籍之中獨究精微之藴適臚傳於清禁遂寵錫於鴻篇蓋觀一書之㑹通其德至矣而析衆言之淆亂惟聖能之臣某發迹草萊玩心章句知修身之以道慙事君而未能魚躍而鳶飛久荷明時之樂育天覆而地載仰私帝德之栽培既膺甲榜之榮旋獲瑶編之賜喜逾宣子已如入魯而觀書德忝仲尼不必適周而學禮臣敢不誠身獲上得善服膺素富貴而行成已不遺於成物恐須臾之離庸行必顧其庸言益懷戒懼之圖少助經綸之業伏願建三重以王天下修九經而先國家致中致和俾天地位而萬物育小德大德如日月明而四時行福兼祿位名夀之全治極博厚髙明之久擬進重書八廟寶訓實録表伏以史嚴載筆聖謨聿備於貽孫事重考文王心允篤於法祖萬年之典有成一人之孝斯在歡騰中外志協幽明臣等誠歡誠忭稽首頓首上言竊惟左史右史之記古有専官大事小事之書國存恆式堯言布而如見周禮在而足徴典則垂一代之規謨訓儼百世之戒自賢聖之君不作而簡冊之積徒繁實録上於貞觀猥多微隱之語寶訓起於明道不無潤色之詞惟我列聖之成書允惟千載之信史第編摩各専於一聖而簡帙世殊繕録未萃於一時而字書卷别時如有待述乃謂明恭惟皇帝陛下睿知中興文明上治學而有獲大舉郊廟耕蠶之儀禮以齊民曲盡衣冠章服之等事必先於稽古孝尤嚴於奉親兹當嘉靖之餘益隆繼述之念宸衷獨契祖德是彛乃出金匱之縹緗復給上方之筆札繕書簡於多士經理専於大臣俾集館閣之英各肆校讐之力寶訓燦然而若一實録昭如而更新錦帙牙籖煥動日星之耀琅函金簡昭回龍鳳之文乃知易象春秋未足誇於東魯將使河圗大訓頓失寶於西周蓋百十六年之書於兹備矣而億千萬世之史莫能尚焉臣等學未知方尚懷疑於盤燭才非通古敢正謬於竹書聊竭愚資仰酬成命伏願以兹為鑑因是得師法虞舜之重華體武王之纘緒盛德大業篤成烈於前人髙山景行率舊章於乃祖鴻圖保有於一統燕翼永貽於萬年臣等云云擬皇史宬成儒臣賀表伏以瑶編赫奕八朝之成典載新石室閟嚴一代之藏書始備明聖允宜於述作制度兼得於考文逺邇均歡古今僅見臣等誠歡誠忭稽首頓首竊惟國必有史爰分左右之官史必有藏用昭悠逺之則緘諸金匱煥日月以同光副在京師與山川而並久周惟外府漢則殿中東京亦聚於蘭臺李唐類收於四庫雖往制可尋於歷代而宏規未備於聖朝恭惟皇帝陛下憲天聰明法祖典則郊廟之式稽古不違耕桑之儀於今獨舉仁孝流通而帝親饗禮樂明備而天地官顧惟實録編年誠一代之信史寶訓記要尤烈聖之神謨纂述既有先後之殊字文不無工拙之異更加繕録復肆校讐出東觀之舊藏集西崑之多士經理甫勤於元輔營建已命於司空乃發名山之材一倣石室之制礱斫殫公輸之技雕鏤呈匠石之能非土非木亘厚地以盤基以奐以輪掩列星而爭耀瑶階珉宇虹霓恍起於梁楣􅀈柱瓊榱龍鳳飛翔於户牖匪直光前之舉實惟裕後之圖臣等猥以草茅濫班侍從多書既忝於柱史敘事尤劣於馬遷忽此遭逢奚勝快覩伏願祖功宗德克培啓佑之休聖子神孫益展繼承之孝斯干兆熊羆之吉仰耀前星瞻洛頌邦家之長永安磐石臣無任瞻天仰聖欣躍屏營之至謹奉表稱賀以聞擬皇上於重華殿等各置經書備覽賜輔臣詩謝表伏以宸居清暇乾行妙帝學之純聖藻昭垂晉錫仰王言之大肆日隆於盛德實天縱夫多能拭目生輝銘心佩寵臣某誠歡誠忭稽首頓首竊惟羲元以不息資始虞歌以惟時永言見乎辭者聖人之情異於人者明君之學禹功九敘懋著修和說命三篇允懷終始降觀後世殊愧前聞觀逰侈而學術荒鮮知開卷之有益詞華繁而雅頌息遂令刪後以無詩石渠之六藝粗陳詠歌蓋闕柏梁之七言雖麗經典奚關斯惟志道遊藝之難兼抑亦明聖述作之有待恭惟皇帝陛下虛明燭物平蕩養心克己邁顔揚人法舜德已徴於晬盎志尤切於就將兹炎暑之方殷益藏修而靡怠萬幾多暇時禁殿以來遊一息弗存懼靈臺之失養顧外史所掌司存隔越於南宫而中祕有藏道里逶遲於西苑爰徴簡籍分置宫牆庶禆緝熙之功實資取閲之便縹囊金笥羣玉錯陳紫殿朱扄九流具在當翠華之順動即丹府之含光惟户牖之銘方兹褊矣雖造次之頃必於是焉既隨地以得師復因詩以言志掞龍章之藻麗裁鳳律之舂容句各五言篇幾草韻日星炳煥匪誇郁郁之文金玉溫純允見存存之性信乎薰風雅咏並虞帝而垂芳炎熱短章陋唐宗而靡述者也臣某遭逢有幸賡載無能目眩珠璣顧名言而莫罄珍逾琬琰斯傳世以為榮墳典索丘之書能讀素慚於倚相梧桐鳳凰之什矢音遐想於召康伏願學必求心事皆盡實觀古法祖駿聲獨出於帝皇德就業昌鴻烈上追於賢聖一統而建極受此丕丕之基萬年以保民永作明明之后臣無任瞻天仰聖欣躍感戴之至謹奉表稱謝以聞擬上天帝尊號表嘉靖十七年月日嗣天子臣御名誠惶誠恐稽首頓首上言太極分兩儀無名為始乾元資萬物大德曰生日月星辰仰光華於千古風霆雨露運神道於九重斯百王所同尊實一代之崇典頃因圜丘報本之祭益廣明堂宗祀之儀惟昭事之誠逺稽諸聖而尊稱之建宜酌於今兹敬改上曰皇天上帝薦之寶冊用協禮文欽鴻號之維新百神咸若儼𤣥居之如在萬世孔安得一以清永綏降格惟天為大莫罄名言有土有民成命夙膺於靈眷我將我享寅威徼錫於休徴臣無任瞻荷感戴之至謹奉表以聞又嘉靖十七年月日嗣天子臣御名稽首百拜上言伏以圜丘之祭大報本以事天明堂之儀嚴宗祀以饗帝綜百王之彛憲成一代之崇規對越無形駿奔有主誠通陟降諒黍稷之非馨道契幽明冀祝史之無愧臣承祧主鬯甫及於百七十年之時制度考文爰采於三五六經之籍仰惟名號未協禮文敬定尊稱恭陳瑞冊伏惟皇天上帝神道無為先三才而立極乾行至健鼓萬物以流形明明溥照臨之仁蕩蕩垂悠久之化由大德是以不德惟難名則非常名祗奉精禋聿修昭事萬邦咸若欽嘉號之維新億載孔安凛宸居之如在伏願尊親允格至和常溢於兩間孫子攸宜明命永綿於百世臣無任瞻荷感戴之至謹奉表以聞臣稽首百拜謹言擬駕幸無逸殿命輔臣進講御豳風亭賜從官以上宴謝表伏以義存鼎建宸逰踵接於明時道洽泰交天寵洊承於永日歡騰朝野光溢縉紳臣某等誠歡誠忭稽首頓首竊惟君父之視臣子辟如一身手足之與腹心原無二用昌言拜而資啓沃之益大烹養而通上下之情故臯陶賡歌於惟幾之時而召奭矢音於來遊之日鹿蘋致饗魚藻交歡自能保至治於無虞抑以昭太平之有象慨正雅之音既息而朝廷之分愈嚴宣室之問鬼神何禆聖學前殿之行綿蕞僅戢臣驕未央貽信䜟之誅曲江挾盡言之恨延和夏講尚爭坐立之儀內苑春逰祗事花魚之樂寥寥古昔卓卓今兹信惟明聖之朝乃見地天之㑹兹蓋伏遇皇帝陛下乾健統天震明御極覃孝思於明倫之典邃聖學於敬一之針禮舉耕蠶復千年之曠典祀分丘澤決數代之疑文制既定於衣冠情尤鍾於稼穡思昔周公之教成王莫若豳風之與無逸詩書備紀式存經世之規亭殿肇興懋著命名之義頃因穆清之暇爰通張弛之宜玉輅時來肅千官於羣從翠華順動釋一日之萬幾顧惟泮奐之遊彌見緝熙之學始命講於殿上俯及輔臣繼賜宴於亭中溥同列辟日新盛德與天地而同流湛露洪恩慶君臣之相悅逺陋徴招之作遐追鎬飲之歡臣等學本面牆官叨從輦乏嘉猷之入告抱素食之深慚職歉交修奚以補仲山之衮志同將順尚期調傅說之羮伏願存無逸乃逸之心厲雖休勿休之志不遑暇食恆知小人之依能受盡言聿思元聖之訓惟明明后保民以至於萬年受丕丕基建極㑹歸於一統臣等無任欣天荷聖感激屏營之至謹奉表稱謝以聞殿試策一道皇帝制曰朕思首自三代以來迄於宋終中間雖歷世有久近而其君之歷年亦有長短要之皆視其為君者何如耳但傳云惟周之歷世最多國祚恆久然周之所以享祚久本於文武之所積纍亦後之繼承者能保持之耳上至夏商垂及唐宋亦若是焉皆基之於先王德澤洽於民心亦繼之以嗣王能盡持盈慎滿之道者也洪惟朕髙祖髙皇帝代天行道重肇中華建振古無比之功德朕太宗繼述於草創之初列聖遵承於大定之後百有六十餘載傳之於今朕以宗支方在沖昧之年入承祖位幼弱不才多招災害於民兹來思祖宗創造萬艱惕然悚懼朕欲長保洪業於無窮有隆弗替永宗社萬祀之固保國家千世之傳民得以遂生物得以適所如古之良法要道朕心慕之思之不知何以得此故進爾多士於堂爾等藴持既久王業素嫻於懷可罄所知以告朕將親擇而勉之欽哉臣對臣聞帝王之治天下也固以善始為難而尤以保終為貴能保其終則其基之而為聖學藴之而為天德推之而為王道莫不盡善盡美可久可大而所以保業之固享祚之長者皆於此乎在不能保其終則其學荒而弗緝德隳而弗宏道弛而弗振而一時之治亦且於是乎衰矣而况於千萬年之久乎故曰慎厥終惟其始又曰慎厥初惟厥終帝王治天下之要臣竊以為無出於此者矣夫國之將興也自以為不足其亡也若有餘臣以草茅書生濫與計偕仰承明問雖不足以測天地之髙深然反𣸪聖制惟惓惓於三代以來歷世之久近年之長短而有及於祖宗之肇創列聖之遵承求所以永宗社萬祀之固保家國千世之傳民得以遂生物得以適所臣有以知陛下之心蓋兢兢焉若不足而太平之基萬世之治皆可以逆決於此矣其敢無辭以復乎恭惟陛下以明聖之資撫盈成之運踐祚以來盛德大業與日俱新志定而事成道洽而政治羣生和萬物遂斯世斯民皆熙然於和氣薰蒸之中德化洋溢之內此董子所謂正心以正朝廷正朝廷以正百官正百官以正萬民而逺近莫敢不一於正公孫𢎞所謂心和則氣和氣和則形和形和則聲和而天地之和應者也臣雖欲有言亦純乎無以議為矣所以反覆究思以為陛下萬分有一之助者無亦曰保終而已誠以自三代以迄於宋中間歷世之久近歷年之長短雖雜然不齊然未有不以能保其終而久而長以不能保其終而近而短者也自一代而言則厥后之克艱降而為暴德之罔後而湯以之興耿命之丕釐降而為元良之剝喪而武以之興自一君而言則嚴恭寅畏殷中宗所以享國之長也自時厥後立王生則逸生則逸而罔或克夀矣陛下所謂視其為君者何如臣則曰視其君之能保終與否而已其在於周則文武之所積纍後之所以保持皆未有不保其終者其所以卜世三十卜年七百而卒過其歷者豈偶然之故哉上至夏商垂及唐宋夫亦若是而已其在於我國家則髙皇之創業以能保終而創之也太宗之繼述以能保終而繼述之也列聖之遵承以能保終而遵承之也陛下誠念祖宗創造之艱而欲求夫良法要道以永宗社以保家國使民得遂生物得適所臣竊以為亦無出於保終而已雖然謹終於始陛下既善其始矣仲舒强勉之言可毋陳也魏徴十漸之屏可無列也而臣區區之情猶不能無言者亦憂治世而危明主之意而已夫今日之務有關於陛下之保終者臣雖不能備言之竊以為其大者有四四者何也一曰盡下臣聞人君盡下則聰明開故古之帝王雖德之至治之極而猶有進善之旌有誹謗之木有昌言之拜有多聞之求凡以道之使言而兢兢焉日求其所未及也夫是以下無匿情而上無遺聽臣無隱忠而君無蔽明蓋有賞之而使言者傳曰興王賞諫臣是也有罰其不言者書曰臣下不匡其刑墨是也陛下即位以來未聞賞一諫臣而以言受罪者屢矣陛下設諫爭之職置輔弼之臣皆將使為立仗馬與不然而何一鳴輒斥去也若是者其可以保終乎此臣所以望陛下之優直也公卿大臣皆陛下之所托重而恃力者固不止於四三人而已也而陛下之所及咨議者獨惟四三大臣而頃刻之召對倉卒之敷陳又未必盡其所當言與其所欲言也文學侍從之臣本以論說古今興衰之大要非以備數講論而已也而其所及陳於陛下之前者不過經筵之講章而講章之所及又多陳善之詞而不皆責難之語論於古者詳而及於今者略得無猶有所憚而未盡乎臣願陛下廣覽兼聽使凡公卿大臣以及於文學侍從皆得從容以獻其說或如司馬光之請每日輪一員直資善堂夜則宿於崇文院以修非時宣召可也逺方之賤吏閭里之小民雖甚微細不足以煩陛下之念然其情之休戚固國勢安危之所係而亦享國久近之所關也臣願陛下開其自進之途使皆得以陳其欲言之情可乎凡此皆臣所謂盡下之說也二曰省費臣聞聖王不盡民之力不盡民之財故古者人君之養財也修之以六府厚之以八政而經之以九式無浮費也其養力也用民不過三日起役無過一人而又使之任老者之事食壯者之食無竭作也夫是以財力紓而百姓給百姓給而儲積富儲積富而國家安卒有水旱凶荒盜賊之患而皆待之有餘矣今者陛下土木之功日以益盛闕廷之外斤鑿相聞畿甸之間輪蹄交錯臣亦知陛下凡所經營類由軌物而非以供耳目之娛然天下不可户曉大抵君子信之而小人惑焉誠以朝廷之一金田野之百金也內帑之百金民間之萬金也陛下費以百金而民以萬金供之至於萬金則又可知矣且其所自來皆鬻妻僦産之需梏拲鞭撲之餘也用之益多索之益急民安得而不窮則亦安得而不惑至於賦漕不給又不免出內府以繼之而三年九年之蓄益耗至是則雖君子亦不能無惑焉矣若是者其以為保終之道乎陛下欲民得以遂生物得以適所則此固其所當先慮者矣三曰正俗臣聞治天下以正風俗得賢才為本蓋上行下效謂之風衆心安定謂之俗此世道所由以盛衰而實治道所由以升降也陛下履中居正躬自勉以厚天下而風俗猶有未盡善者蓋有怙侈滅義驕淫矜夸如書稱殷士者矣有車馬衣裘宫室競飾和五味雜五色調五聲以觀欲於天下如嚴安之言於武帝者矣有財多而光榮史書而仕宦勇猛而臨官如貢禹之所論者矣有交親戚倚貴勢走髙門邀大車巧笑而僞言卑陬而姁愈偷一旦之容以售其技如栁宗元之所譏者矣凡此皆古之所謂敝俗而今皆有之陛下左右之臣計亦有以上聞者曾是不正則日以益敝而所以為陛下治道之纍者蓋不淺矣若是者其可以保終乎臣竊以為正俗之道莫大於紀綱莫重於教化莫急於得人司馬光曰願先定紀綱以還淳美之俗言風俗則係於紀綱也胡寅曰朝廷有教化則士人有亷恥士人有廉恥則天下有風俗言風俗之係於教化也董仲舒曰移風易俗使天下回心而向道類非俗吏之所能為則風俗之係於良吏又可見矣陛下有意於正俗其將於三者而留意乎四曰經武臣聞兵貴精而不貴多多而不精則徒耗廪給而無益於緩急之用今者兵非不多而常有微弱不振之患者何與謂之兵而不知戰也給漕挽者兵也服工役者兵也占於將校之役使者兵也羸老而坐食者兵也此孫洙所謂離為六七者也且緣邉之卒多强壯蜂悍而京師之兵反微弱不振則於古人所謂居重馭輕之意無乃失乎臣嘗竊求其故由於汰擇之無法簡教之無實而已所謂汰擇之法者何也兵之老弱者固多而强壯者計亦居其三四誠能擇其强壯者以時教之而老弱者則姑廩之而使給天雜役既不濫耗夫强壯之力而簡教亦不虛廢於老弱之徒兵其有不精乎所謂簡教之實者何也臣聞周官司馬之掌政也寓兵於農既使家各推其壯者以為兵然必中春教振旅中夏教茇舍中秋教治兵凡旗物號名鐘鼓鐲鐃之節莫不習之有素若關節脉絡相通為一而又中春振旅王執路鼓中秋治兵王載太常蓋一嵗四時之教而天子再臨焉非如今之所謂操者止以崇虛名應故事而已也如是而兵有不精乎此臣所以有經武之說也雖陛下所以保終之道不止於此四者然因是四者而求之庶幾有得於萬分之一而臣區區之私憂過計亦可以少自釋矣雖然臣所論者政也保國之末而享治之流也陛下無亦於其本源而求之乎何謂本曰禮是已何謂源曰仁是已禮以為本仁以為源此三代所以享國長久之道而我祖宗之所以立國列聖之所以守成皆未嘗有出於此况夫由是而盡下則仁足以容其直而禮足以感其誠也由是而省費則仁不忍於竭民禮不靡於非制也由是而正俗則一人仁而天下興仁也一人讓而天下興讓也由是而經武則仁不至於殃民禮不違於軍政也而天下之事皆可於是乎推矣而何有於保終乎而何宗社之弗永家國之弗保乎而何民有不遂其生物有不適其所者乎臣愚草野之人不知忌諱惟陛下恕其狂而終覽之幸甚臣謹對鄉㑹試䇿十道甲午乙未第一問甲午科有建天下之本有運天下之資何謂建天下之本功德之盛可以經緯天地而成大有為之志者是也何謂運天下之資形勢之張可以宅中圗大而樹大有為之基者是也本之以功德而復資之以形勢則動無不克事無不濟以之創業而可以垂億萬年無疆之統以之守成而可以保億萬年無疆之祚矣此愚於聖祖之基迹太宗之定鼎所以不區區於形勢而必有以求其本也請終言之今之建康即古之建康也古之國於此者若晉宋齊梁陳皆偏安一隅而不能由是以進取至我聖祖始自淮右渡江而基迹焉夫以鍾山龍盤石城虎踞在昔孔明嘗以為帝王之宅王導嘗以為經營四方此其根本而其言不驗於晉宋之朝者豈非由其無功德以承之乎今之燕山亦古之燕山也古之都於此者若金若元皆苟且為治而不能由是以宅中至我太宗始以江淮為根本而定鼎焉夫以內而太行西來重岡疊阜外而渾蔚諸州髙山峻嶺在昔蘇秦嘗以為天府百二之國杜牧嘗以為王不得不王伯不得不伯而其言不驗於金元者豈非由其無功德以基之乎蓋失其道則形勢雖强不足以立此山河之美吳起所以有在德不在險之言也彼六朝金元其功德果何如哉得其道則形勢雖微亦足以興豐沛之間古未有興王之迹也而髙祖起於泗上南陽之間古亦未有興王之迹也而光武起於舂陵此天時地利孟子所以有不如人和之說也若我祖宗之興非即髙祖光武之儔歟然自當時觀之則一出而江漢清再舉而吳㑹平三征而閩越歸命四伐而荆湖率從中原之師兵不血刃太平之績一怒而成我祖宗之取天下易於反掌矣而必遲之以十六年之久豈固出漢髙下以創業而貽守成之基殆有不容於欲速者耳既而羣雄盡剪矣四夷咸賔矣內而百官之正外而民志之一紀綱有常政務畢舉我太宗之守天下宜亦可以無為矣而北勦强胡六飛三駕不免如漢武之經略者豈顧不文景若哉以守成而兼創業之功殆有不容於自安耳不然則雖聖德神功足以建天下於億千萬年之久而區區殘狄恐不免乘一日之間矣非太宗驅除之又何以定萬世之基哉於乎天下財賦盛於東南而金陵為之㑹天下戎馬盛於西北而金臺為之樞用東南之財賦統西北之戎馬無敵於天下矣而我祖宗之立國則豈以之而自恃哉仁義得民蓋取諸周規模宏逺蓋取諸漢品式備具蓋取諸唐家法嚴肅蓋取諸宋而歷代之弊一切掃去此固聖子神孫萬世所當法也愚請頌之以為獻第二問人才之在天地間有可以氣運而拘者有不可以氣運而拘者何則氣運之行有盛有衰而人才之生亦有盛有衰必以為不出於氣運則古人以有為之才而不能成有為之功者亦多矣而可以為非天乎必以為盡出於氣運則古之聖賢固未嘗有不可為之時也而又可以為非人乎吾是以知不為氣運所拘者非常之才也而其拘於氣運者則亦常才而已而可以概論之乎執事發策而以人才之關於氣運下詢承學請得而究言之夫氣運之說何始也無乃后之儒者見天下有其人而無其時者以為天實為之乎非也愚嘗有所驗矣唐虞之時洪水泛濫蒸民未粒其所以為天下患者不可以一二數謂之氣運之盛不可也而皋䕫禹稷之徒生於其時卒有以成時雍風動之化者何歟商周之初承桀紂之虐其所以為生民害者不可以旦夕去謂之氣運之衰可也而伊虺周召之徒生於其時卒有以致從乂迓衡之治者又何歟知此則人才之盛衰其果不可以氣運拘也明矣然自春秋言之則以齊之鮑叔管仲晉之舅犯先軫郤克趙衰宋之華元楚之子文蒍賈秦之百里奚吳之季札鄭之子産其才非不傑然也而大之僅能輔其君以主夏盟次之僅足保全境內說者固曰氣運之衰耳自漢唐言之則若蕭曹若丙魏若房杜姚宋其才蓋非管鮑諸人比也而能佐其君以立一統之業以成一代之治說者固曰氣運之盛為之耳知此則人才之盛衰其又不能不以氣運拘也明矣要之為氣運拘者一方之才也不為氣運拘者天下之才也士君子之處世其將為一方之才乎其將為天下之才乎為一方之才則管鮑諸人之在春秋蕭曹諸人之在漢唐者其所為吾不屑也為天下之才則皋䕫禹稷之在唐虞伊虺周召之在商周者其所為有取也不然則定哀之時其氣運何如也而孔子且曰吾為東周齊宣之時其氣運又何如也而孟子且曰王猶反手信乎非常之才終有非氣運所能拘者耳而諸葛亮狄仁傑之事業又何暇為之屑屑哉第三問求帝王之治者不可不在於道求帝王之道者不可不本於心心也者其道之㑹歟道也者其治之基與治不本於道則疏略苟簡而不足以成可大之業道不本於心則强為襲取而不足以成可久之德此後世之治所以恆不古若而賢臣之於君每不能自己其責難之誠也請因明問而復之人之言曰古之治天下者純任道后之治天下者純任法又曰三代而上治出於一而禮樂達於天下三代而下治出於二而禮樂為虛文信乎三代之治不復可見於后世也已然吾之心即帝王之心吾之道即帝王之道舉而措之亦存乎其人耳然自聖學不明不惟上之人不知所以為治而下之人亦鮮有能以是而導其上者在於漢吾得一董仲舒焉吾得一王吉焉仲舒之言於武帝曰願陛下設誠於內而致行之則三王何異然觀其所謂正心以正朝廷百官與夫勉强行道勉强學問之言則其致行之實固在是矣吉之言於宣帝思建萬世之長策舉明主於三代之隆然觀其所謂朝廷不正難以言治左右不正難以化逺與夫獨行於深宫之言則其長策之建固在是矣其在於宋吾得一程伯子焉吾得一邵康節焉伯子勸神宗行王道期致治如三代之隆然觀其所謂稽古正學明善惡之歸辨忠邪之分則其致治之說不可知耶康節作皇極經世曰苟有命世之人則雖民如夷狄三變而帝道可舉然觀其以易書詩春秋皇帝王伯盡聖賢之事業則其所謂帝道者不又可知耶惜武帝有嘉唐虞樂商周之志而不免肆惰於窮黷宣帝謂漢家自有制度而不免溺意於刑名神宗可與有為而卒惑於安石以致新法紛紜此董生之言所以見廢於漢而程邵之說所以不行於宋也與然而致君當道卒未能如四子之純粹而簡切者焉方今皇明在上興道致治有能得其說而存之則因心以求道因道以求治將必有在而德可久業可大帝王之治可復見於今日矣若夫條鼂董之疏以法弱翁之忠校宣公之奏以繼子瞻之志者則執事責也愚何知焉第四問師道立而後可以明天下之正學君道立而後可以抑天下之異端蓋正道之行也有本異端之興也有源使師道不立則本之不務而其所以為學者不過口耳之末而已其何以明天下之正學乎使君道不立則源之弗塞而其所以致辨者亦不過詞說之煩而已又何以抑天下之異端乎夫自周禮以鄉三物教萬民而賔興之其待士之學正矣今則特以經義取士而支離於章句文詞之末經術其何由明乎自漢以來如董子之學春秋知正朝廷以正百官之理似矣而張禹以論語為帝師乃不能止外戚之强豈於事君以忠之義有未思耶京房之學易知帝王以功舉賢之法似矣而李固以巨儒位台輔乃不能正清河之位豈於春秋提綱之法有未講耶然究而言之則董子正而或失之迂京房知道而未見道其於所謂正學者蓋均有未明也王制執左道亂民者有禁其衛道之意嚴矣今之佛老正所謂左道而乃蔓延於天下以惑世誣民異端其何由息乎自漢以來如文帝以黃老致清淨之治似矣而宋徽宗身稱道君以釀成靖康之亂何其惑之深歟晉簡文以知禪宗明死生之說似矣而梁武帝捨身事佛以自取臺城之禍何其愚之甚歟然究而言之則清淨之說失之荒死生之說近於妄於吾所謂異端者未之能絶也欲明正學謂不由於師道之立乎欲抑異端謂不由於君道之立乎誠使其嚴學校之教而不為虛文重選試之法而務求實用如周子所謂志伊尹之所志學顔子之所學如吕與叔所謂立士規以養德厲行更學制以量才進藝則庶幾抱經義者兼德行而才皆體用之實矣誠使其察妄誕之奸而使不得售禁鬻度之令而使日益耗如韓子所謂人其人火其居明先王之道以道之如歐陽子所謂仁義之說勝則楊墨之學廢則庶幾執左道者皆知禁絶而無崇信之非矣否則本之不端末流之弊其何所止極哉第五問治久者不能無因循之弊為治者不可無變通之宜夫立法之初本無不善而行之滋久則其弊有不能免者使無以變而通之則法日益弊而天下之事日益壞矣而何以善其後哉請因執事所舉屯田鹽法二事而直論之夫屯田之法我祖宗所以足食足兵而為國家計者利甚大也而今則日益壞矣始也有衛必有田今或衛遷而田存始也有田必有屯今或田在而屯管亡將校管屯因行漁獵之計監司㸃屯徒飾簿厯之文執事所謂名存實亡者不其然乎鹽法之行亦我祖宗所以酌古凖今以為邊儲計者利甚溥也而今亦日以壞矣存積之鹽既不充于所支常股之鹽又不足於所出商賈之徼利者急於取盈而鹺徒之私販者橫於村落執事所謂利久弊滋者不其然乎伊欲變而通之則亦非有他道也蓋屯田之實雖亡而其名猶在其亦因名以責實而已無己則如元學士虞集之法欲以海濱之地盡以為田有能以百夫耕者則與以百夫之地能以萬夫耕者則與以萬夫之地而授之以世官焉是亦一說也鹽法之弊雖滋而其利未盡失在於去弊以存利而已無己則如我朝大學士丘濬之說使中納之商易粟以銀然必先行宋人轉般之法以通前日之商繼行漢人官給牢盆之法以待后日之商而次第之畢舉焉此亦一說也然而其要則莫先於得人焉誠使屯田得人則如棗祗屯許下而兵備足於魏韓重華田代北而轉輸省於唐者可致也鹽法得人則如管仲在齊以魚鹽而富國劉晏在唐以鹽利而佐用者可致也故曰有治人無治法奚獨二事為然哉執事進而教之幸甚第一問乙未科有敬天之心有事天之道敬天之心存則有以致感格之機而天無不孚事天之道盡則有以修時憲之實而天無不若故敬天非難而事天為難事天非難而得事之之道為難此古昔聖王所以日兢兢焉察於天人之交求諸君臣之際而罔敢有逸志焉者凡以盡吾事天之實而已而豈敢飾虛文崇常典以愚天下之耳目哉知乎此則我太祖髙皇帝與皇上之所以勑天敬畏者可得而言矣如聖政紀所載愚生雖不能仰窺其萬一然觀當時宋濓之序首以郊廟百神之祀禮文咸秩而祀事舉者為言要未可謂之不知本也繼是而大本之正也大分之昭也軍政之肅也民志之定也風俗之新也凡此皆所以為事天之實而其尤可徴者如盛夏不雨則席藳露坐一星失次則驚惕不寐以至如觀心有亭衍義有廡精誠有録洪範有圖其所以內存敬天之心而外修事天之實者蓋與堯之欽若舜之時幾禹之謹戒文之昭事同一揆矣豈徒以之託諸空言戒諭臣下以為虛文常典而已哉惟我皇上明聖憲天勵精化理國家將興必有禎祥是以大之而黃河清甘露降小之而卉木之瑞鳥獸之祥凡諸福之物莫不畢至所以衍億萬載無疆之慶者於是乎在矣夫何往者忽有星象之異則亦安知非天心之仁愛耶而我皇上方且躬御宸翰凛數百言敕諭臣工同加戒慎是又有以默契我太祖之心於千載之上而敬天之心事天之道無乎不至矣然天無私怒變不虛生則夫感格之機時憲之實又烏可忽之而不講耶易曰觀乎天文以察時變詩曰敬天之怒無敢戲豫蓋星文之盈縮無常而人事之招徠不一試以其略求之則古有以小人而致之者矣如共歡居朝則五辰未撫管蔡在列則保章星動此一說也而今有之乎古有以夷狄而致之者矣如淵聰肆逆則隕星為肉遵鑒相屠則嵗星襲月此亦一說也而今有之乎古亦有以政失而致之者矣而今亦無之也則長星經天豈元朔滲濾之朝所宜有孛宿歷氐豈貞觀既效之日所宜聞乎古亦有以主慝而致之者矣而今亦無之也則星隕而雨豈宜紀於宣尼之筆而太白經天豈宜見於傅奕之奏乎夫數者皆無焉則其所以為世感格之實者果於何而致力乎夫亦求諸用人之間而已蓋天象固常與君子相符而君子亦常與天象相感故傅說騎箕蕭何應昴吾嘗得諸傳記攝提之位列卿鈎鈐之司出納吾嘗得之星家是以君臣和而三台齊君子多而東壁著賢士進而少微絢采其理然也且以郎官出宰上應列宿荀陳一聚猶動德星而况於朝廷之大百僚之廣拱北辰而依帝座者乎是故朝寧之間或忠或佞一人之身乍賢乍否一時之事有得有失凡此皆天心之所以為喜怒而星象之所由順逆者也由是求之則百司之所以欽承仰答上紓我皇上之憂者要必有道而鉤陳太微象緯咸若析木天街星宿清潤下之所以欽若即上之所以時憲矣書曰同寅協恭和衷哉請頌之以為今日在位者之忠告第二問人君之治天下也不患其無統天下之法而患其無化天下之本法者何紀綱是也所以維持聨屬乎天下使其勢無不一而王道之所由行也本者何心是也所以感動倡率乎天下使其情無不一而天德之所由立也故心不加則紀綱弛天德純則王道備舍其本而區區求之於法抑末矣夫紀綱之說何時而始乎一見於書則五子之歌也再見於詩則棫朴之詠也然書之所戒則以失道而亂紀綱詩之所美則以勉勉而綱紀四方吾是以知紀綱固治亂興亡之由而人君一身尤紀綱張弛之本是豈可以不加之意哉惟昔唐虞三代之時不賞而勸不罰而治固無所謂紀綱也然其所以形諸風聲軌物之間達諸上下貴賤大小之際施諸㑹朝表著名位等級之殊措諸朝廷畿甸以及乎萬民之繁四海之逺雖無紀綱之名而有紀綱之實是故天子統三公三公率諸侯諸侯制卿大夫卿大夫治士庶人其所以統天下之法甚修而峻德之明仁義之由行典則之詔人紀之修皇極之建其所以化天下之本甚正信乎王道之備未有不由天德之純也乃若後世則有可慨者矣髙祖之興規摸宏逺漢非無紀綱也而賈生太息於文帝之朝且有指大如股脛大如腰之說矣太宗之治庶幾成康唐非無紀綱也而司馬公追論於有宋之世且有藩鎮阻兵士卒逐帥之譏矣宋之紀綱太祖以仁厚樹之仁宗以恭儉承之亦善矣而數傳之後乃有元帥畏偏禆偏禆畏將校將校畏士卒至或以一夫流言道路而為之變令推恩焉此其故何也無亦本之弗立而徒法有不能自行者乎中間如信賞必罰身致中興宣帝嘗有意於漢矣而刑名之學甘於雜伯以是為漢家制度可乎則其紀綱亦不過宣帝之紀綱而已刻意王道厲精圗治神宗嘗有意於宋矣而新法之行悮於安石以是而上慕唐虞可乎則其紀綱亦不過神宗之紀綱而已是二君者非徒本之弗立且并與其法而失之則夫開漢亡之釁而基宋遷之禍者吾其誰咎哉善乎韓子之言曰善計天下者不視天下之安危而察其紀綱之理亂也洪惟我祖宗創制立法萬世可行其紀綱則備矣其所以體之心而推之天下者有其本矣而承平日久人心玩愒有司奉行容有失其初意者我皇上以剛健中正之資而有釐正弊源之志執事以是為千載一時欲諸生條其所以興革之宜補救之術而愚非其人也雖然亦嘗有得於朱子之說矣曰核賢否以定上下之分明功罪以公賞罰之施斯其紀綱之大者而紀綱之所以立則又在臺諫補察而無所私宰執秉持而無所失而人主又以大公至正之心恭已於上而照臨之如此而已知乎此則興革之宜補救之術不有可得而論乎愚生天德王道之說亦在其中矣若夫仲長統之所謂井田于謹之所謂賞罰姚崇之所謂官爵杜黃裳之所謂法制要皆一偏之說而愚無取焉執事其毋以為嘐嘐第三問聖人之道存乎經聖經之傳存乎人故經有顯晦待人而傳道有絶續得經而存經所以載道也人所以翼經也此其係亦甚重矣而乃區區以文之今古求之其殆非吾聖人作經之意乎夫六經帝王經世之典在焉孔子贊之刪之定之修之其所以垂世立教者卓乎不可尚已夫何火於秦稍出於漢而其文僅存焉壁傳口授誠有上古中古下古之殊矣執事舉以下詢不可謂無好古之志也而愚竊有說焉蓋閲字未盡偏傍固古人所不取而苦於竒字或者又議子雲之艱深以不識而見譏者固無足道而人謂其頗識難字介甫遂以為終身之恨愚今豈敢以是而自諉哉夫亦求夫聖人所以作經之意而已噫昔倉頡之制字也天粟顯晝零之瑞鬼妖動夜哭之祥是誠萬世文字之祖而六經之所賴以傳者也顧其創之當時則有象形㑹意指事轉注假借諧聲之異義踵之後世則又有鳥跡蟲篆懸針薤葉鐘鼎玉柱八分飛白之異文要之非求道者之所先也夷考其始制之時字皆有義姑舉一二言之則如武之為武有取於止戈也乏之為乏有取於文之反正也蠱之為蠱有取於三蠱食皿也亥之為亥有取於二首六身也此其為意亦精矣要之非論道者之所急也何則聖人因道而作經後儒因經以求道道苟存焉經可略也經苟存焉文可略也則夫所謂漆書竹簡特其糟粕之餘而科斗𨽻文特其煨燼之末耳聖經存亡之機漢儒存經之功亦何與於是哉何則易以卜筮存而實亡觀經解所援差之毫釐繆以千里之言今之易無有也其所以存不有賴於施孟梁丘京費之力乎詩自春秋作而已亡觀左氏所引翹翹車乘雖有絲麻之章今之詩無有也其所以存不有賴於齊魯毛韓之功乎既脫酒誥復脫武成書非全也由伏生安國相為授受而二帝三王之傳賴以不墜焉既失月令復失王制禮非全也由魯淹中孔氏相為羽翼而大學中庸之㫖賴以有得焉麟筆既絶策書不存春秋非全也由公穀左氏而二百四十二年之事賴以見焉程子所以謂經不通求之傳傳不通求之經也吾於是深有感於經之存亡道之絶續而姑以文之今古為可略焉雖然三豕渡河非子夏莫之辨而石鼓之聱牙雖昌黎猶或難之則字學亦吾人之所宜盡心者特以之而求聖經則以為可緩耳竊嘗謂字之興莫善於秦而字之廢亦由於秦李斯之所作君子不可以人而廢也夫何始皇以衡石程書故簿書日繁字畫日趨簡便而𨽻興焉𨽻之由名固以其施諸徒𨽻而已斯之後於漢得一蔡雍於唐得一李陽氷於宋初得一徐鉉然先儒嘗謂宋之能者多於唐唐之能者超於宋則知陽氷之學有冠絶今古者矣方今朝廷之士草澤之民必有好陽氷之學而追李斯之跡者愚以為金匱石室之文紀德之碑銘功之器所以垂休光而照後世者不可不還古文之舊而書史之刋布簿書之記録則姑仍乎今日之習以播同文之風而已彼𨽻書之賤吾以為不可施也執事其將謂何第四問不明於天不足以立政不深於學不足以知天何則周旋運行天之道也而其遲速進退未嘗不徵於星懸象著明天之文也而其躔度次舍亦未嘗不㑹於星此古聖人繼天立極君子之觀文察變所以必加之意而不敢忽也夫星官之書其淵源逺矣自黃帝使車區占星而以容成總之此其所由始也太史公有言自初生民以來世主曷嘗不歷日月星辰及至五家三代紹而明之而巫咸甘石唐昧之書出矣姑以其略言之則二十八宿衆星為經水火金木土五星為緯者其象之大較也中外之官常明者百二十可明者二千五百微星萬千五百二十者其數之大較也有主有客有犯有孛有遲有留有伏有逆有表裏盈縮有含譽有昌光有格澤者其占之大較也欲一一而陳之要有不可以更僕終者雖然明問不可虛辱請舉其為用之大者為執事試言之可乎蓋古今星官之學其為書亦瑣矣而其有關於立政之大用者吾得其四焉四者何曰法其象以授時也綜其運以起厯也辨其方以分土也察其變以觀灾祥也何則星之見於六經者莫先於堯典所謂在璣衡以齊政者其官則有羲和仲叔焉其宅則有暘谷南交昧谷幽都焉而民所以遂其析周夷隩之宜者於是在矣然其所以為紀者則曰日中星鳥也日永星火也宵中星虛也日短星昴也堯之政要莫有先於此亦莫有大於此者矣故曰法其象以授時也其在洪範曰協用五紀所謂五紀者嵗日月星辰厯數是也然而嵗本於月月本於日日本於星辰星辰貫乎厯而厯數成焉自黃帝調厯起辛卯顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳三統用庚戌四分用庚辰而卒未有外星以成厯者故曰聖人作厯以天地為本以四時為柄以隂陽為端而必以日星為紀焉故曰綜其運以起厯也星土之書雖無可考而十二國之分載諸傳記類皆可推如𤣥枵為齊之分星而青州之星土則於禆竈之言知之星紀為越之分星而揚州之星土則於史墨之言知之實沉為晉之分星而益州之星土則於子産之言知之大火為宋之分星而豫州之星土則於子韋之言知之以至鶉火為楚之分星則於叔向之言知之娵訾為衛之分星則於申須之言知之以至燕之析木周之鶉尾秦之鶉首趙之大梁魯之降婁莫不各有屬焉故曰辨其方以分土也其在周禮有保章氏以掌日月星辰之變動又有馮相氏掌二十八星之位以觀妖祥自春秋以來迄於今其官雖已不舉而其妖祥所應類有可徵春秋時嵗在星紀而淫於𤣥枵梓慎以為宋鄭必饑則言其所屬禆竈以為周楚所惡則言其所衝此非嵗星乖次之應乎吳之伐越也說者以為越得嵗而吳伐之不出二十年越必有吳以嵗星十二年一周存亡之徵此非嵗星順次之應乎至於後世尤不可以一二舉求其順次之應則有如五星聚東井而髙祖帝漢也四星聚牛女而晉元王吳也求其乖次之應則有彗星掃東井而苻堅亡秦也嵗星犯太白而慕容亡燕也所謂察其變以觀灾祥者不又在是乎吁吾是以知星官之學不可不講而執事之問不為徒發也吾是以謂不深於學不足以知天而不明於天不足與立政也執事倘與進焉則巫咸甘石之書錢樂葛𤣥之術當為執事盡之第五問用於國者修於家者也能知今者通於古者也故觀其談古道之謬則可知其處今事之疏而致用之未周者實由其學識之未充而已愚也於是實不免焉而敢以干肉食者之議乎然執事謂天下之事有言之若迂而實有益於治名為無事而實有大可慮者而因舉夫東南之財賦西北之戎馬下詢承學愚竊以為是二者皆吾國家之大計其言之非迂也名為無事亦不可也是故不敢不陳其說焉夫天下財賦莫盛於東南浙東西江廣固皆財賦之藪也自夫海舟罷直沽之運常盈列淮浦之倉而至者日益積轉兌用坐食之兵列屯授分閫之寄而運者日益來㑹通一河閘埧相次亭傳相望豈非我太宗之貽謀而恭襄之偉績哉夫何近年以來漕渠淤塞輸挽煩勞至於遣重臣以董之而功猶未著者何也得無疏其流而未導其源乎天下戎馬莫盛於西北宣府大同固皆戎馬之藪也且又寧夏守鎮肇於永樂之初榆林控制創於正統之世長城一帶烽堠逺延藩籬外障又非我太宗驅除之功而列聖豫防之謀哉夫何近年以來卒伍干紀緣邊靡寧甚至勒大兵以臨之而始就屈服者何也得無治其末而未絶其本乎伊欲財賦通於東南其說固莫先於治河而今之所以治河者非昔之所以治河也蓋昔之治河也欲除其害而今之治河也欲興其利昔欲泄之使去而今欲疏之使通誠以㑹通一河自淮之上下以達於濟北之境其水一資於黃河今河徙而流絶矣使不尋其遷徙之跡而導其北來之源則雖丁夫林屯畚鍤鱗比亦隨注隨涸而不足為久逺之計矣此愚之所謂導其源者也不然則尋元人海運之故道與河漕並行以為緩急之備可乎此非愚之言也丘文莊之言也伊欲戎馬寧於西北其說固莫要於備邊而今之所以備邊又非昔之所以備邉也蓋昔之治邉也以攘外而今之治邉也以寧內昔欲拒彼之來而今欲防此之往誠以大同一鎮實扼乎南北之交其城一面北向昔也嘗潜出矣使不豫求鎮防之計以絶其北出之路則雖甲兵在前金帛在後亦屢叛屢服而終無輯寧之期矣此則河套之地亦宜豫為經略以防狄之出沒可乎此非愚之言也亦丘文莊之言也若夫治河之說又有如昔人所謂築隄以塞之開渠以疏之或欲作竹落而下以石或欲徙民居放河入海或欲尋九河故道或欲空河流所注之地或欲穿水門以殺水勢如賈讓上中下之三策賈魯疏浚塞之三法皆昔之所以治河者而今不暇為執事詳之也至於治邉之說則又有所謂擇將帥以統我之師撫士卒以養我之鋭修城池以慎我之守積饋餉以足我之食備器械以蓄我之威禁侵掠以彰我之信如春秋所謂守在西夷朱子所謂備在朝廷者猶敢為今日勸焉不識執事肯為轉聞於當寧否具茨文集卷一
