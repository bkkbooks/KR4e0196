body:
  text: 具茨文集卷五明王立道撰書與友人論文書吾子不以某不佞而望以文章相麗益謂非有意於某不可也故忘其淺鄙為足下誦其所聞夫自三代而下能文者非一士論文者非一家要之能者未必論論者又未必能也夫文之所以為髙下夫人而能言之然而作者往往戾焉故逖探冥搜者傷於虛雕琢絺繪者傷於麗詰屈聱牙者傷於竒而竒之失為甚焉夫文何自而始也效諸天也易曰觀乎天文以察時變日月星辰天之所以為文也其光有常明其運有常度其經緯次舍有常所故能廣覆照經四時成萬物而天下古今仰焉一或薄蝕之不得其明朓朒之不順其運盈縮隱見之不安其所甚者孛飛彗流出於耳目之所創見則人莫不指而異之何者非天文之正也今且為廋詞怪語鉤章棘句險僻艱澀不可識測而欲以示諸天下傳諸後世則人有不指而異之者乎故竒譎之文則亦天之彗孛之類耳非盛世之所宜有也昔人有言文非能為之為工乃不能不為之為工六經尚矣古之文皆不能不為者也今之好竒之士則惟以能為為工耳夫是以作之日益多而傳之日益寡作而不傳周子所謂輪轅飾而人弗庸者也亦奚以文為哉大抵知德者無詭言淺於道者多艱說古之君子內足而外章德至而言立莫不平易正達溫純爾雅不雕繪而巧不探搜而逺無詰屈而竒不期於文而天下後世之能文者莫加焉矣後之人德則不至而求諸辭辟諸塗刻繪畫以為龍蛇鬼神不瓌詭其形變惑其勢則不足以駭觀者而眩愚俗然而識者過焉則固土木之而已其竒果何為哉故曰仁義之人其言藹如三代而上所謂文章之士即道德之徒也自夫岐而二之而後世始無文矣昔魏氏典論號善論文大略謂奏議宜雅書論宜理銘誄尚實詞賦欲麗而曰文以氣為主是皆辨其末而未探其本內無所得而虛為之辭吾弗與也且文如兵其作之者猶將也將賢而謀豫則操縱出入隨應而不窮故左右什伍紀律嚴明則其法立威蓄而勢鋭如風發河決則其氣充可攻可守可進可退頃刻異用而機妙百出則其變備要之必主於正而後竒以濟之此將之良也苟廢正而一徇其竒則其軍鮮不僨焉而世必以為無能之將矣故兵無常形以正勝者什九文無常體以竒善者什一盤誥之文則六經之什一耳效而似者猶未可為常而況其萬不類也哉吾子於今之時不謂無志於文而恐其溺於竒不繇其道則愚之所不能默默也然愚固亦論而未能者吾子其毋以為費於辭與王樗菴書惟執事以正色直言偉然為留都倚重弟竊與有榮焉然别來不一通訊者以寒暄私欵無當於進修之要治體之公不足以溷記室耳乃今則有不容於隱情惜已以冒寒蟬之譏者弟常之人也常本劇郡錫亦劇邑數十年號為難治邇得守如張得令如萬蓋私心嘗為一方幸之然弟自入都以來所聞稍有不諧於衆口者豈弟之暗於知人與抑人數面好惡毁譽固有不盡得其平者歟浮議籍籍皆非事實常之去留都尤近計執事亦嘗有聞故欲為一白之弟昨以省覲家居亦嵗餘家父在告則已踰七年矣其所以自處與郡縣諸公之所以見待者執事當自知之飾譽言以酬所私比匪人以罔知已諒非愚父子之所能也往時應守子才僅以一二人私憤遂相詆排守土者至今以常為畏塗論者且謂郡中更無能獨持公論者使弟輩䝉此譏指故聊復與執事圗之然子才今竟何如詆排之者今竟何如今萬令已與行取庶幾公道猶未昧至於張之賢否人言之是非更冀執事徐察而明辨焉使他日不復謂郡中無一公論則弟之私望也餘情不能縷縷答王汝中書追隨數日備承教誨别後惘然若有所失忽拜手札規以紫陽之㫖申以著察之云甚慰甚慰僕素弱劣懵於求道竊自謂平生所誦習與夫師友之所傳聞皆支離汗漫徒務口耳故一意自為已慎獨求之庶幾簡徑易守雖稍覺得力然未敢保其終能不墮落者夫亦於著察之說有未之思者乎敬聞教矣敬聞教矣遊杭之約俟妻父過此即當從行圖遂請益之私就醫則又第二義也使去草附復雅愛惓惓容面并謝不具傅虛岩書昨春過錢塘既得縱覽湖山之勝且日從有道者遊聨床之談飫聞清論自謂與吾兄真有舊緣喜幸喜幸臨行候别兄適有他㑹遂惘然解維歸家後又領手教尤切感仰今春賤恙稍平促裝北上五月初始入京凡夫俗骨秪宜奔走風塵恐西湖孤山之靈方將移勒絶我也弟雖懵於聞道然亦不可謂沉溺者便中幸不惜指教鎮佛老僧好否因久闕敬特託貴鄉髙南宇處附此申悃餘惟照亮張靜思書家居數年重荷雅愛行時又辱禮意稠㳫感愧無任僕多病之軀習於疏懶一入塵途便覺非向來面目山中日對鶯花泉石不復甚以為佳邇來奔趍車馬間始知坐茂樹聽啼鳥觴咏從容古人所謂一日如兩日者真不虛也此豈僕輩淺薄者能堪此福哉因執事知僕聊一道之他人當見笑以為不情也華鴻山書敝居去文府才一二舍而載嵗之間僅得三數奉晤每展頌雅音良用耿耿疏懶習慣又常抱疾疢本不堪驅馳而朝例拘以三年遂勉復來此行裝紛紜不及造别門下罪歉無任時下伏審道履綏和尊翁老先生茂膺夀祉孝養日隆敬羡人便草草布候不備華補菴書僕行時匆冗適尊斾亦且西征遂不及盡晤言今猶怏恨使至辱手教兼瓊章之賜感慰感慰僕五月初已入都而多病之體又久與靜便殊為人事所苦至於觚翰亦似相仇執事謂以忙中廢吟然猶多得好句而僕以病中廢吟真無復一字可道也聞道匡廬彭蠡之概輒飄然有出塵之想倘執事他日盡覽其勝當不惜為僕傾倒也寄有懷翁第三書到京後因病冗久失修候船頭華山還始有小啓附上想已達臺下矣盛使至詢知道履綏和大舅暨尊嫂已康吉喜慰無任辱翰教懇懇且以圖報豫養為誨非愛深骨肉何以有此不肖敬奉以周旋第恐病軀孱劣終負主恩耳比得老父書云四月初因張靜思年叔相攜一識姑蘇諸山荆溪二洞老伯嘗有此約倘秋涼無事一尋此盟亦山林一勝事也如何賤體近已稍平但痰嗽猶未除蓋為鬱火所攻耳與沈原約第三書昨過滄州偶值貴屬胡大尹匆匆附候起居十年契濶之懷殊未盡其一二擬入都後可嗣修問而久靜之體苦於馳驅疾疢綿延尋復數月矣蓋執事向知弟已告歸或不知有荆婦之變今喜弟之還都而不知故疾之猶在也蹇薄之命不足以縻祿食無足為道者執事以何時過錢塘弟故人武進吕君曾上謁否吕君名朋與老父同鄉舉且有㑹文之雅平生謙恭端慎清操絶人而仕不達自寶慶推官為遼東太僕丞約居苦寒之地者七年今升僅得市舶提舉幸托屬下倘以事相見惟稍加禮遇不具張湖村書弟往嵗在羇病愁困之中惟兄曲加存恤不啻骨肉感激無任家居三閲冬春日惟閉關從事方藥於密友至親多闕問訊兼文旌益北愈乏鴻便方圗謝過門下而使至又辱手教懇懇重以腆儀彌增感恧弟自入都亦嘗抱病蓋蹇薄之人不足縻肉食也奈何使回附候并謝餘惟順時自愛以需天寵是荷答程松溪書自毗陵西郭之别已載閲嵗雖因卧病闕問未嘗不馳情左右也去夏㑹羅念菴年伯具知道履綏和毅然以興起斯文為任敬慰敬仰即擬訪醫白下兼得一奉杖履目覩風教之盛於山川都㑹間竟亦坐懶不果素懷良自悵悵今春恐逾明例遂爾北裝入都數月病亦如之舊業荒落殊無可謂請益之地因便先此附候八月承嘉刻并謝唐荆川書入都四月中間不病者僅數日耳蓋孱薄之人不任祿食所遣固應如此且久在靜中一涉塵途便非向來面目如執事茹素有年見腥肥滿案遂生嘔噦此殆難與不知已者道也久不通信執事必能亮之大抵寒暄常語不足溷記室而身心所得又無可請教者几案間非醫藥即道書每展卷亦不能盡數行也奈何奈何所幸毁譽得失了不置意中悠然日用飲食而已知執事以尊嫂之故心事亦不甚佳然豫養自遣為望寄羅念菴第二書北來過京口曾有小啓煩何主政寄上爾時謂文石當亦不逺旬月而久至都下寂無所聞僕日夕以為念顧是區區者不能為人始終即他日何以受知己者之重托乎近得老父書乃知猶未竣工良愧良愧夫冬以寒辭夏以暑辭想世之名一藝者偃蹇固如是哉清秋伏審道履康謐讀書觀稼想於時事絶不經耳目僕亦能羡老叔之樂而不能從也仙凡之隔豈必於物外求之洞山兄明年得來此否幸一示知以副鄙懷僕自入都不能數日不藥大抵即往年所病一涉塵勞遂復交作每自計非肉食人而復勉强牽戀殊可自笑也適㑹曽司㕔先生云有貴鄉人入境之便草草附此抱恙不盡所欲言惟亮之寄袁芳洲書屢拜手札兼惠鹿角後至者尤佳因行促不及製已托之舍弟矣飱和含嘉皆飫執事之德也感佩何極僕數年家居頗於靜中得趣一涉塵途便覺不堪兼存亡聚散種種興懷雖復時念執事之教欲一切割棄然學道未至終難脫然又不能得如執事者相與朝夕汝之往日竹林之約自謂丙午可以必償而俗緣多纍竟作子虛今來回視金陵已若十洲三島之外而執事亦遂如洪崖子晉不可扳矣與艾居麓書弟雅辱教愛然不奉起居者已數年於兹蓋緣多病之人兼以懶性習成遂闕敬於故人耳弟自甲辰得賜告家居昨春因覔醫因一至杭以遊客不可以妨清政竟不敢與執事相聞徜徉湖山間半月而返緬懷道雅日夕馳情兹因賤恙稍平勉復來此偶敝鄉親吳忞者來為貴屬下深澤縣丞附候與懋及弟書二通科場文字要氣充辭暢平正豐潤須於六七月間作得百篇則自下筆有助然辭之繁簡亦要得中切忌支離澀滯論表須胸中先立間架然後措辭亦不可落塵腐套子䇿場偶記舊料亦要轉换恐至雷同耳大抵所當甚留意者全在經書義與論表䇿乃其次也最不可失先後緩急之序吾前兩科正坐此弊然此亦姑就場屋中事論之至大功業固自有在也勉之勉之得書乃又聞我小姪不幸知以痧疹故也執書惟省豈吾父子福過灾生又自念入仕以來凡瘠人肥家利己妨物如仕宦家故態惟恐分毫似之良欲稍自樹為子孫地耳吾父母年已五十以上而僅一男孫懼無以共承膝下之歡今復失之矣天乎何至此極也然正已以安命養身以俟時天亦久之自定吾平日與吾弟每不汲汲望以決科進取而惟以德義相規誨正以名利為浮榮而身心為實地富貴有去來而子孫須善遺耳吾弟幸為後圗毋過自苦然吾前亡女意甚痛傷俗所謂土梗勸木梗也歸計待考滿後恐礙叔叔㑹試須預圗之耳荇洲身後孤寡可哀責在吾弟即此是學也前讓去田既無利他人之産亦聽其所之而已附荆翁書一通舅氏荆川書示王甥吾生平最難開口不是人央得動的亦不是為親戚做人情的若令祖令尊兩世有一不是清苦為善的我不好開口汝家房子不遭倭子燒殘奔波苦楚我不好開口不遇梅林公髙誼我亦不好開口有此三事輳合所以我公道說了不是為親戚也每思令祖令尊兩世小心謹慎毫髮不曾倚官趂錢毫髮不曽使勢害人江隂巷內老佛之語至今鄉評尚在非親戚之私言也若身沒後便與他人家一般毫髮不䝉優恤則善人無以勸矣但梅林公髙誼所謂生死見交情者非今世之所有誠當於古人中求之甥可益自感激不特努力讀書求進尤當立志做人自少須曉得義利是非之辨尋向上去以無墜祖父一脉可繼之志亦所以成梅林公扶植之盛心也勉之勉之毋怠毋怠疏明職守疏臣某謹奏為明職守嚴紀述以勵庶官以憲萬世事臣聞古之人君必設左右史以紀言動故曰君舉必書雖春秋列國之微亦復不廢斯職其義重矣自漢而下代有其官孔明治蜀不立史則君子以為譏謂其失所先務也我太祖開創之初即立國史院而設以起居注修撰編修檢討等官自後國史院起居注之官不設而以史官并附之翰林院雖官制沿革前後稍殊其欲以史事責之修撰編修檢討等官則固祖宗之意也臣讀大明㑹典所載朝儀記事官居文官第一班之後稍上夫史官秩髙者不過六品而使躋居第一班之後稍上豈固以寵之哉欲其便於視聽而言動有紀也夫因事設官故官不濫因名求實故實不悖人臣之職不過官守言責兩端而已今之給事中御史有言責者也內而府部寺監外而藩臬郡邑有司之吏則皆有官守者也府部寺監藩臬郡邑有司之吏不守其官給事中御史不盡其言法得而糾之而黜罰之今史官之於史乃獨無所事事而又得以逭其失官之罪者其初本具名而無實有官而不屬之以事非如户之錢榖刑之獄訟各有司存云耳夫漢之時郡國上計先上太史故司馬氏父子得有所纂敘以成一代之典今臣等修員史局餘年矣自朝參之外輒散歸私第問以史事且茫然不知所答遂使神聖之謨烈閼而弗章賢士大夫之業湮沒無紀國家諸所興為皆訛闕雜亂於簿書奏復之繁而不知所考信則夫居是官者尚安得晏然嵗㑹廪祿之入日受大官之供而不以為愧且畏哉臣愚欲乞陛下參酌古今所以立史之義國家所以設官之制而振其隳廢偷惰之習使臣等皆有所自效以無負於陛下所以簡畀之意夫左順門乃章奏出入之地史館在焉臣愚欲請史臣二人給以筆札兼之書人几章疏之下諸司一一繕録每月終封識而以藏之內閣其有所遺誤輒以罪該日執簡之吏庶乎職守不廢而臣等少逭曠官之譏紀述明備而國家有以立一代之大典矣臣昧死以聞定貢法疏謹奏為定貢法以振士習以光聖治事竊惟國家用人其途雖廣然出於科貢者常什之八九科試以拔才雋嵗貢以恤困滯祖宗立法至詳且善矣然法久而玩寖失初意臣忝修史職每遇考試嵗貢生得與閲卷往往見其空疏腐俗辭氣索然雖考列上等者亦僅舍短取長殊未有明博純雅之文可上塵聖覽者也此等即與附選則今日各有師儒之任如仍入監則他日各有民社之寄夫衰白之士久躓場屋其英姿鋭氣磨礲都盡日暮途逺志無所希而欲寄以民社任之師儒其不倒行而逆施者鮮矣况今名儒碩輔莫不起身庠校而使此輩為之模範且承順唯諾若子弟之事父兄能無汗顔而內慙矣乎往者選貢之法行天下應貢之士一時號為得人然衰白困躓者莫不飲泣咨嗟自傷以數十年積纍之艱而終於槁項黃馘無復一命之望臣時又聞提學官畏避罪謫或不拘廩增拔以充貢此又非祖宗之意矣夫才雋之士豈不能自奮於科第而復使與困滯者競驅於途則胡不盡舉而廢之而獨行科試之制其不然明矣陛下推仁盡下使一如舊章而又行補貢之令使困滯者咸得以自紓海內無向隅之泣德至厚也臣愚以為科貢之途固宜並進而天下學校所以序為先後以充貢者其法恐未為盡得也何則今之所謂廪膳生員者定於提學官之一考而已既與食糧之次則他日充貢一以為先後其十餘年之間凡遇考試文理非甚庸繆輒免於停降罷黜苟不至於停降罷黜則遂私相慶以為幸而進取之心日消靡矣此應貢者所以多庸才而年少敏特者不能無扼腕仄目於後也竊惟國家建學育材著為定式每府學廪生四十名州三十縣二十至於一與食糧之次則他日必以充貢恐非立法之初意也士有志者常少無志者常多彼其所成就自謂可以無咎無譽以苟延嵗月而徼一命之榮猶欲其激發奮勵以從事於學問不亦難乎臣愚欲稍更定其法使廪膳有一定之額而無一定之人貢者雖以年資為後先而實以才否為遲速敕行天下提學官俱以嘉靖二十二年為始嚴加考試各學生員每府以四十人為優等不拘廪增附皆得與食糧之數州則三十縣二十其數既定中間雖有中式丁憂事故等項不復替補存其糧於所在以給諸生之貧而無告者焉至次年再考亦如之以至於三考四考五六考亦如之其有初考與四十人之列而再考居下則不復與之糧再考居下而三考復與四十人之列則其糧又復與之其每考居四十人之列者則常食其糧不待言矣豫奪一程其能故不才者無憾於失選補不泥於格故才者益勵其業考案一定無復頂補申請之煩而學之官吏亦不得挾此以媒利矣然偏方狹境生員之食廪者未必一如原定之額或不及數或半之甚者不及其半則又當何如夫食糧實補之數各學俱有定籍今須一以嘉靖二十年為凖府學生實補之數原三十人者今止以三十人為優等二十五人者亦止以二十五人為優等至於州縣俱可類推矣至於應貢之日則提學官不必再試但計其食糧嵗月多者即行起送赴京或食糧嵗月多寡同者不拘二人或四五人府州縣通行送提學官再試擇其更優者一人充之夫既以食糧嵗月多者為貢則必每考皆優等之士貢者既皆每考優等之士則豈復有庸才得厠其間以玷國家爵命之榮如今日者哉或者以為此法未可即行臣請先以食糧之法行之目前起貢者姑循其舊限以五六年後舊食糧者稍稍起貢然後行此亦自有漸而民不驚矣如䝉俞允乞敕該部詳議可否或中間未盡事宜一併斟酌具奏賜之施行庶使才雋之士進有所奮而無逡巡嵗月之念退得所師而無汗顔模範之人其於陛下聖明之治或可少禆萬一天下幸甚臣亦不勝幸甚原係定貢法以振士習以光聖治事理未敢擅便謹具奏聞伏候敕㫖乞省親疏謹奏為懇乞天恩給假省親事臣伏覩大明㑹典內一欵兩京文職有離家六年之久給假省親者查無違礙許其歸省蓋惟我國家以孝治天下故為是著令所以體羣臣而憫其私也臣原籍直𨽻常州府無錫縣人臣父表由進士歷南京禮部客主司署郎中事主事臣以嘉靖十三年叨中應天府鄉試臣父適以本部祠祭司主事在任臣即於是年九月間辭臣父母領文前赴禮部嘉靖十四年㑹試䝉賜進士出身改翰林院庶吉士至十五年十一月初三日臣父具本奏乞放回原籍養病因寓臣書備言所患臣時念父深切即欲乞歸省侍但猥叨皇上作養之恩未能少效尺寸未敢言私十六年正月又䝉聖恩授以今職十八年十二月歷俸一考給由外今年五月十一日臣父復以久病未痊奏乞再容原籍調理令義男王泰抱齎因以原稿付臣臣讀之倍增憂思日夜不寧兼舊患怔忡暫止復發寢食俱廢是以敢援前例昧死陳情伏望敕下吏部查照近年翰林院侍讀等官華察事例容臣回籍省親倘臣父幸得痊安筋力未衰臣父子自當依限前來供職誓竭犬馬以少報聖恩於萬一臣不勝戰栗懇切祈望之至告養病第一疏謹奏為患病不能供職懇乞天恩容令回籍調理以圖補報事臣原籍直𨽻常州府無錫縣人由嘉靖十四年進士改庶吉士除授今職竊祿十年慙無寸補緣臣體質孱弱素多疾疢本年二月初偶感風邪發嗽不已加以痰火上升中氣鬱塞伏枕逾時藥餌寡效延至六月十七日忽得家書臣妻唐氏於五月二十一日在原籍病故臣於病中驚聞此變痰火轉盛怔忡不寧且臣父母衰年垂白知臣久疾未愈時切憂思近因臣妻之變悲勞百端臣心日夕懸念又臣妻遺下一子兩女皆在提孩㷀㷀靡恃伏望皇上憫臣疾患沉綿情極哀迫敕下吏部查照近年翰林院檢討王維楨等事例容臣暫回原籍調理庶得少延殘喘倘螻蟻微軀未即顛隕自當奔走供職誓竭犬馬以仰酬皇上天地再造之恩臣不勝惶懼哀懇之至為此具本令義男王紹抱齎謹具奏聞伏候敕㫖第二疏謹奏為患病不能供職懇乞天恩容令回籍調理以圗補報事臣原籍直𨽻常州府無錫縣人由嘉靖十四年進士改庶吉士除授今職緣臣南方下士水土未諳自竊祿以來積乖攝養且體質孱弱疾患易侵本年六月間偶因衝冒暑雨饑飽非時致傷中氣而過以虛隂之藥投之實陽遂使邪火上攻咳嗽頓作痰涎升壅日夜靡寧伏枕經時漸就羸瘠詢之醫家咸言病在肺胃受傷已深非旦夕可療况臣父母俱在衰齡家復多難臣恐其聞而憂念每書問訊但以無恙報之然疾痛則思父母人子之情此又臣之所以反覆於懷不能自解而日益以病者也伏望皇上憫臣疾患沉綿私情鬱結敕下吏部查照近年翰林院編修駱文盛等事例容臣暫回原籍調理倘螻蟻微軀未即顛隕自當奔走供職誓竭犬馬以仰酬皇上天地再造之恩臣不勝惶懼哀懇祈望之至為此具本令義男王紹抱齎謹具奏聞第三疏謹奏為病勢危急再乞天恩早令回籍調理以全生命事本年閏九月初八日該臣奏為患病不能供職懇乞天恩容令回籍調理以圗補報事奉聖㫖該部知道欽此臣惟臣之病蓋在肺胃之間醫從肺胃間攻數不售效是病於藥無賴也初臣嬰疾時念二親垂白懼令有聞然獨旅沉綿骨肉背離苦思一歸就父母側臣之為懷又如此乃今伏在枕褥涉歷數月節序漸深疾憂漸加驅之無術去又不獲𤣥冬永夜目不交睫咳嗽連十數發未已神虛魂搖卧視床屋若水波上下臣形質本癯又積疴相纏遂至骨立食兼日不盡一器鄉里朋識憐而訊之者見輒惻惻臣之命已危若纍碁幸即得去就父母訪醫藥沉憂既釋更事調理臣之病庶可已也若延而未去恐二豎守膏肓竟為臣難臣之病未可已也伏望皇上憫臣病勢危急病懷痛切敕下吏部查照前奏翰林院編修駱文盛等事例早令回還倘枯株再榮羅雀復奮即皇上天地再生之德也臣不勝惶懼哀懇之至為此具本令義男王紹抱齎謹具奏聞碑擬奉敕撰新建歷代帝王廟碑臣惟功德立而後可以享百世之祀明聖修而後可以定百世之禮故祀無非族所以明典也禮不虛行所以詒則也大哉祀乎禮之所尊也義之所起也而百王之所崇也非天下之至明聖其孰能與於此夫天下之生久矣遐觀厥初其異於禽獸者無幾也不惟不異於禽獸而且無以勝其爪牙角毒之烈也泛濫懷襄民之不為魚者亦無幾也乃今得以安居暇食優遊焉終其天年而不夭傷而為之上者亦得升冕端委以治民臨諸侯其誰歟致此也故自羲農黃帝肇其治金天髙辛髙陽擴其化而堯舜禹湯武王協其成其功德胡可勝紀也繼是則存亡治亂相尋於無窮而斯民之禍兹益酷矣則夫髙祖光武之於漢太宗之於唐太祖之於宋世祖之於元雖未可以方古帝王而其克亂除禍濟世安民抑亦不可謂其功德之淺淺己夫法施於民則祀之以死勤事則祀之以勞定國則祀之與夫能禦大災能捍大患者皆在祀典此聖王所以制祀之法也故自伏羲而下廟而爼豆之其禮宜矣然自漢以來雖代不廢祀而廟於京師而合祀之則昉於唐之天寶宋亦因之我太祖立廟於雞鳴山之陽所祀帝王自伏羲至元世祖其位凡十有六而配享者風后而下三十七人左右列之法乎古也然自文皇帝於兹定鼎則若郊社若宗廟既皆為之改建矣而帝王廟祀尚循金陵之舊恐未足以明彛典稱秩祀之意我皇上方以憲天之道稽古之學一新制作於凡類禋望秩之典靡不究定禮備樂和品式焕如矣乃卜地於京師阜城門之隙草圖鳩工而始作廟焉凡壖垣門廡堂寢庭戺與夫庖庫井舍之微莫不縪繕翼然燦然儉而弗陋華而弗逾蓋誠足以妥神靈而昭崇報矣夫禮曰作者之謂聖述者之謂明明聖者述作之謂我皇上修太祖之秩祀述也廟於京師作也協諸義而協可以垂逺之其所祭之可以不淫所謂明且聖者兹其在乎廟成當紀其事於麗牲之碑臣愚適奉成命因拜手稽首而謹書之針克己針天生蒸民惟形與性物感無窮人化斯順往聖克念乃達諸天危微之幾舜禹是傳孰無人心理順則德孰無道心欲勝則賊心亦靡二理欲爭之紛紜萬感憧憧百思已自我生亦自我克君子制之若臨大敵我志惟一鼓之而靡我力果毅降旗奔師净彼氛垢湛吾虛明解心之梏復性之恆口無過言身罔擇行視逺惟明聰德以聽視聽言動非禮勿為昔者顔子嘗從事於斯厥功已至不二不遷回也好學夫子稱焉彼為大賢而猶若是顧兹何人忘其有事曰明以察曰健以決希顔亦顔敢告來哲大司馬針書贊徂征易稱帥師赫赫九伐姦宄以威古云佳兵其器不祥正人乃興亂是用亡穆征犬戎祭父納諫懼德弗耀而勤民於逺秦任三帥覆師於殽違彼良士而勇夫是謀先王有道守在四夷漢失厥策翦我羣黎兵不可去武不可黷皇皇六師辟之荆棘如火自焚無或弗戢禁臣司兵敢告執㦸光祿針惟聖饗帝惟辟玉食乃烹乃饔既時既飭以共粢牲以視珍物無曰不㑹冢宰是職在昔聖王飯簋啜鉶不以天下奉豫一人周文即功惄焉朝昃池酒林肉殷商用滅駢脅曼膚國乃多瘠孟子蓋惡夫庖有肥肉而民饑色祿臣司膳敢告執滌太史針茫茫古今上下曷稽爰惟太史簡策是司彤管煌煌左言右事善人以勸淫人以懼佚旦同心成罔邪德董狐之書是稱良直南史侃侃齊不失賊夫子修春秋而萬世允則惟昔聖王業業小心出入起居乃罔不欽勿以深宫勿以大庭書而不法我無以示我後人史臣司牘敢告執典鴻臚針穆穆聖王垂裳而治聽政修令軌儀昭物則百辟卿士是寅是祗㑹朝既盈蹌蹌濟濟各有攸職雞鳴以俟昔在周王惕夜未央視彼庭燎晣晣其光一日二日無或爽厥常亦有淫辟俾晝作夜蔑彼典則而以自逸暇百工是師用隳理於天下臚臣司儀敢告在陛太常針明明天子允秩三禮乃立奉常鬼神是主無怠於守無淫於祀統和天人禔福備至其惟德馨罔以稷黍聖禹致孝衣惡食菲殷人尚鬼俗以僿弊齊景矯誣歸過祝史楚稱先王不越望以祭於乎興國聽民亡國聽神時謂不淫惟齊明中正以徼上帝之歆常臣司禮敢告執籩廷尉針民之有情弗割於欲期于無刑乃利用獄虞周競競或易一夫惟欽惟中懼濫法于非辜其在叔世三辟乃興民弗見德錐刀是爭周圄以空秦血流離夫豈不威二世而夷平仲一言齊踊不鬻漢文弛刑白骨乃肉天矜于民其德好生弗克若天儀鑒于秦尉臣司獄敢告閽人司空針惟王建國乃立司空以分六職以總百工程力順時是經是營罔曰有民觀于定中罔曰有財間於農功昔在堯禹土茨卑宫降於癸辛侈窮九重瑶臺瓊室乃貿厥宗虒祈弱晉章華敝楚阿房未成咸陽以火崇髙雕鏤億兆攸詛先民有言松柏瘠土以鬼則神勞以人則民苦未央壯麗漢髙斯怒土臣司空敢告在户銘求放心齊銘并序今夫人之有心可以宰萬物攝羣動參乎天地而立人極此其為體甚微為用甚大而其妙則有甚不可測者故或跬步之頃出入異域一腔之內存亡異時倏而往忽而來其身猶在此而飛揚馳騖茫焉不知幾千里之逺蓋其放之甚易而約之實難固未有不待操而存舍之而不忘者也古之聖賢其心雖未嘗不存然而日兢兢焉所以約之而不使其或放者猶自力也是故有危微以為之辨焉有禮以為之制焉有敬怠義欲以為之戒焉有格物致知誠意以為之次焉夫是以志定而不移或夕而惕若或昧爽而丕顯或屋漏而不愧或盤盂几席觴豆而有銘有戒夫是以功密而不弛志定故思慮往來不能移功密故造次顛沛必於是蓋聖賢所以能常存其心而不放以宰萬物攝羣動參天地而立人極者良有在耳然自中人以下顧縱焉而不知檢此聖人之所以益聖愚人之所以益愚而孟軻氏之所深憂也夫夫人有雞犬放則知求之而心放則不知求豈愛心弗若雞犬哉弗思甚也故曰學問之道無他求其放心而已矣其將以覺天下之迷而示之要乎愚讀其書至此未嘗不為之惕然省惴然懼也因即所居之齊而顔之曰求放心以倣古韋弦之義云銘曰惟皇降衷乃鈞是人胡聖而賢胡為獸禽匪人則異而異者心是惟方寸至神且靈時出時入誰與將迎出或千里匪形可尋其反而入泰然吾身存亡之間天壤攸分惟古君子其中惺惺晝為宵得息養瞬存孰謂一念時罔弗欽孰謂造次時罔弗矜存存不息湛然虛明如卒有帥如民有君百為萬感動應乎貞乃知吾心厥係匪輕乃知聖賢亦非性生舍之則否操之斯成欲克由聖永鑒斯銘進齊銘易稱忠信所以進德乾乾之誠自朝中昃惟自暴棄是為下愚與聖同類而歸則殊觱沸百川淵渟澤滙其流不息乃放四海平陸覆土一簣未盈日往靡怠丘山崇成豈曰駑馬不如騏驥十駕不舍千里奚致邈彼秦越載陟其垂心則弗競道匪逺而謂豫何人回實希舜仲尼蓋曰吾見其進而我希顔亦步亦趨誰謂今日非顔之徒豫姻丈沈君謙退士也而以進名齊蓋有崇德之志焉頃以國子久次謁選天曹僅得南鴻臚署丞豫益知其非嗜進者夫惟日不足吉凶同情為善為利其孳孳亦一而己豫嘉君之志在此而不在彼也於其行書此銘遺之庶幾古人贈言之義并以為他日助具茨文集卷五
