body:
  text: 具茨文集巻七明王立道撰祭文祭周濂溪文代外父作惟斯文之興喪實與世以汙隆慨㣲言之既絶紛千載而塵䝉諒有開其必先迺徵於星聚繄夫子之挺生盖早成而黙契極精藴之沉郁爰啟秘於圖書言有至而弗盡意獨得而有餘若大明之始升夜㝠晦而復旦若多途之迷方指大道而羣鄉昔仲尼之真樂惟顔氏其庶幾乃夫子之光霽羌異代以同歸某也蚤服膺於聖教幸假守於兹鄉覩河洛而思績入魯阜而升堂嗟庭草之已宿覽風月而慨然聊寄辭於一奠邈景行於前賢祭陸白菴文嗚乎往歲壬寅兄自京師奉太夫人以歸遇兄於吕梁之滸握手立談念其别之遽也而不意其若是乆也今兹兄復自粤南奉太夫人以歸既已抵錢塘館於武林武林去家不數驛自謂可以覯兄於旦夕一寫其暌違之情而不意兄之遂至此也於乎哀哉易稱謙謙君子詩美溫溫恭人兄有名位之崇而守之以澹有才識之藴而養之以拙有問學之懿而承之以遜所謂君子與恭人非耶夫仁鳥覽輝無攫搏之志太阿韜光非擊刺之用是故忠誠足以動物而豈弟足以宜民内而閨門三族得其和外而藩臬僚友稱其信也惟兄之事君如親而事親如其君夫是以東西南北順於從令數涉數千里之險而不言勞惟兄之處官如家而處家如其官夫是以圖書衣衾約於守己累十餘年之禄而無厚殖於乎孰意其道途之勤迺成死疾而五品之禄竟以終其身耶哀哉哀哉憶余年之甫冠陪藝苑之翺翔躡騏驥之逸步始托跡於命鄉同座主而登第聫鳴玉之末行每燕語於清宵失白首而靡忘方聚散之興懐忽永間於在亡詢芝焚而蕙歎憫遺孤之皇皇睇繐帷之寂寞淚霑胸以縱横酌桂醑而躬奠寄哀悰於短章祭談安人文四時代序兮秋氣分白露下兮凄以清木淅淅兮解節草菲菲兮隕榮嗟蕭艾兮猶繁奄芝蕙兮先零將造物兮忌美胡芳華兮易傾河漢長兮月皎皎佳人一去兮重閨扄機絲斷兮支石冷綺羅寂兮塵冥冥佩縱横兮玉珥暗蘭膏委兮徒華燈噫清秋兮復長夜魂營營兮安憑魚遊比目兮一朝析鸞鳥逝兮將雛未成故鄉兮遙遙丹旌舉兮愁雲凝水沿迴兮若咽黄蘆被渚兮多白蘋我欲招兮不可得有酒㫖兮殽馨魂無東兮少延佇羌惚恍兮來歆祭奚賚卿文世卿同年弟於乎惟古道喪民彞殄湮孔懐孰念同體分并蔵賄階厲婦口鑠金荆棘嬰膚憯兵盈庭肥醲歌舞歡飫權榮蔑彼同父邈如參辰滋培槎枿枝葉翦傾不如葛藟猶知本根於乎孰云斯世而有奚卿繄卿之兄允篤且誠拊膺語素雪涕縱横謂卿髫丱友于性成分甘讓燠洽比晨昕辛甲之歲兩偕計行𦕈𦕈燕吴依依冬春繄卿偶載左右令名如彼兩鴻比翼北征一鴻漸羽翺翔帝京胡爾乖影廖廓南鳴傷彼虞羅罥罣水濵鴻集雝雝未幾俜伶於乎孰云異數之遘而獨罹于卿某等誼忝通家愛方諸昆慕類起思驚訃霑纓絮觴臨奠遙慰遐靈祭序菴閣老文天祐我明河嶽降神應期翊世是生哲人抑抑崇儀恂恂令徳不顯有聞金相玉質令徳之徵含華流英作為文章揚于帝廷迺启中秘授以國史金匱之蔵是司是紀迺叅講席弼時仔肩青坊紫署出入周旋迺咨宗伯神人允宜直哉惟寅比美伯夷於惟小心夙夜靡盬帝用嘉之曰汝予輔於惟明聖禮樂肇興我公承之一徳翼憑垂紳正笏贊化宻勿天下乂安公無聲色嘉謨入告帝曰汝忠爾順於外予其爾從百僚瞻公山峙屹屹不震不動大猷允式川澤納垢日月蔵晦公度則然兼容孰逮伊昔見公公貌忽瘠人曰曷以我憂在國胡遽遘厲隕兹典刑於乎殄瘁邦孰懐榮不朽有立史言弗泯矧惟錫典誕光泉扄某等晩托門牆恭承茂誨聞訃䀌傷涕泣有嘅揚辭布奠昭此悼衷冥鑒弗昧惻我忡忡祭外祖母朱孺人文維靈性端以誠徳勤以儉婦婦母母皆可以範於族姻風於里閭惟吾先外大父以道進退靈實相之故出宰百里有鳴琴之治入營三逕有懸車之樂每歲以農時蠶月課田及桑知其早晚豐瘠與作者之惰勤閔閔焉忘其身之既貴也躬爨手績朝夕不倦若有非力所出不以衣食者怡怡焉忘其年之既老而耋也平生尤好施予雖不足必以分人故家常無餘資又無私愛惡雖甚怒人終不為匿意故疎戚卑幼常歡然無怨心於乎是宜其以望九之年而神完氣强目益明耳益聰不知世有所謂衰遲疾痛之憂信乎古所云仁者夀好徳而康寧者也於乎孰意夫造物者竟靳以百歲與人而遂使止於斯耶不肖兄弟自襁褓以至成立其嫗煦保字之恩與諸孫等歲時從吾父母拜於堂下分飴戲嬉雖家人亦不謂有他姓也迺不肖獨以薄宦之故不得望顔色者既五六年于兹而今終已矣於乎痛哉訃至之日𦵏且兩越月歛既不及憑其棺窆又不及臨其穴是不肖所以報其大恩者顧獨不能如諸孫也於乎痛哉瓣香千里聊以寓敬并敘其悲愴不能己之情而以告于靈庶其鑒之庶其鑒之祭吳封君文於乎公之生也鏟迹埋光非有簪組之好而令子實以甲科之英通籍金閨執簡石室於是乎膺寵嘉被章服其榮燁然動於一邦有逸民處士所欲兼致而不能者公之歿也得正考終非有兒女子之戀而令子早奉太孺人以歸桑梓依依庭闈眷眷於是乎共湯藥親含歛其哀愴然感於一鄉有孝子慈孫所深願而不可必得者盖公之教端而豫故燕翼之效由子以及身公之福盛而備故事幾之逢以人而合天於乎即是二者知公可以無憾於始終而某等亦可藉以少慰令子之㷀㷀者也徒以各守其官相望千里不獲一展私情謹束帛以遙奠緘詞以寓哀而已公靈有知庶其歆哉祭李封君文惟靈敏達之器瓌瑋之姿至性克敦孝友怡怡率禮罔愆好徳靡倦介反遺金恵捐逋劵大江之右鬱為聞家駢簪襲組世振其華撫兹軌躅義訓夙𢎞有子蜚英瀛洲載登念昔來斯皇恩方霈錫典躬承對揚丹陛章服有榮禄養欣欣移忠之教蚤夜彌勤于幾何時迺遘末疾桑梓興懐南望嘅息迨兹夏杪戒行有期重以膏肓啟手銜悲某等情切知生義深慕徳布奠焚詞爰告靈魄嗚呼哀哉薊門日慘潞渚風凄靈其遄歸首丘是依嗚呼哀哉祭董母陳孺人文惟有陳之賢媯兮抱淑質之光輝女徳懿以幽貞兮順婦則而靡虧蚤夜毖以勤恤兮稽素業之贏虚佐孝養於庭闈兮贍饔羞而惟時既效績於蠶織兮又恵撫于孤婺母教嗃其孔嚴兮冀成子之令圖惟歲在於閹茂兮果奮翮於天衢髙堂粲以解顔兮何忽掩袂而涕洟將吉凶之倚伏兮抑命運其若兹思遊子之千里兮目欲暝而先悲曽光榮之幾何兮倐與世而長辭嗟余義忝於通家兮聞哀音而悼咨悵繐帷之空寂兮聊絮酒以陳詞魂靈耿其有知兮或恍惚其來斯祭俞母文惟靈毓質茂族婉嫕夙成姆教孔淑柔順居貞爰惟來嬪室家是宜嗟方中道天奪之儀空閨守志矢死無二允迪綱常繄女而士藐彼遺孤㷀㷀靡怙載鞠載訓繄母而父孝養舅姑敬共饋祀服勤終始繄婦而子伶仃自立垂三十年有子登庸克酬厥囏邑儒朝紳列上其事帝曰俞哉旌彼宅里明明令典風于四方烈烈大節侔古共姜爰以兹歲就禄京師綵鷁北飛言笑怡愉曽未煖席二豎搆厄明發悲懐南望絶息於乎哀哉某等托交令子雅欽懿聲謂宜食報多福永齡疇昔之旦訃音忽聞敶詞絮酒薄用申誠祭王孺人文惟靈英英蘭姿溫溫玉質敏慧而能裕婉順以有則謂宜履和以介恒休遐壽以儀羣哲而奄然隕越是何報施之忒也且疾也𦙍嗣未立莫視其湯藥歿也夫子又方守官都下莫視其含歛斯路人所共掩泣而况締交於其夫子有館閣之素者夫安得而不惻惻也然靈以純惠相其夫子卒䇿名偕榮有古令妻之風服勤茹辛孝養無怠安其夫子之心而以及於姑有古賢婦之徳夫於姑為賢婦於夫子為令妻斯古之所謂不死而靈之芳名懿行可以昭示於無極者也庶其有慰也夫庶其有慰也夫於乎秋氣慘烈凉風其悲夜之方長營魂何之爰思令淑悵曕繐帷薄奠展誠申以哀詞祭李太君文惟靈體坤柔以貞順兮含窈窕之淑質揚令徳之光華兮允昭明於壼則謇夙夜以毖共兮懼厥家之未立既祗奉於蘋蘩兮亦效績於蠶織法鳲鳩之平均兮藹慈誨之如一卒啟仲以奮芳兮振朝陽之彩翼漸金門而羽儀兮懋宣庸於石室帝申命以渥洽兮嘉有子之楨國及耄齒之優游兮承章服之輝赫日含飴以㺯孫兮膺多祜之秩秩宜康寜以無期兮何考終之遽及某等偕令嗣以登朝兮雅景行於懿徳誼夙敦於通家兮聆哀音而同戚跽薦誠於一觴兮臨風怳以太息魂耿耿而有知兮庶來歆其髣髴祭鄭碧河文惟君有忠信敏達之資而成之以恬淡樂道之志有溫純爾雅之文而持之以寛博溫厚之器然而器未試於所受志未充其所至若連城之珍方剖璞而旋埋千里之乗未中道而先躓豈良驥非世之所常育而名寳亦造物之所忌某等幸聫美於甲科獲羣游於中秘時考徳而問業等臭蘭之合契誓白首以永好諒異姓而同氣念疇昔之暌攜緬嶺海而遙睇杳魂夢之相依睠寤言而弗置悵音書之乆寂謂道理之迢遞倐哀訃之東來驚彷徨而隕涕嗟良朋之我違傷仁賢之早逝聊緘詞以寄奠情愴怳而中熾於乎孰意夫城闉之判袂遂永訣於當年而館閣之趨陪徒悲懐於隔世也祭閔憲副文惟公負俶儻之雄才兮蚤翺翔於藝圃擅二龍之英譽兮登天衢而並武始服政於秋臺兮懐欽恤而求生占刑書以平反兮帝載嘉其明清迺錫符以出守兮徵遺愛於前古覃千里之美化兮歌來暮於西土肆管鑰之攸寄兮撫介胄乎三闗暢皇靈於朔陲兮威謀戢乎宄奸遄解紱以歸來兮㑹未及乎暮齒托松菊以盤桓兮遺浮榮於金紫歘鳳雛之飛騫兮發餘芳於桂枝方禔福以夀豈兮忽與世而長辭某等偕令子以彚征兮夙仰止於髙躅聆訃音而驚涕兮傷哲人之無禄敬薦誠於薄奠兮宣哀悰乎短詞靈耿耿其有知兮臨繐惟而鑒之祭陳封君文惟靈肥遯玩世清標挺俗含璞埋光碩人之軸五湖之濱姑胥之麓寄好漁弋卜鄰樵牧入倚槁梧出友麋鹿盥濯巢流嘯歌鄭谷隱不違親義惟止足趨庭恵訓有子式榖通籍金閨光我邦族使楚來歸錦衣華轂夕膳晨餐養猶及祿促駕趨朝王程孔肅帝嘉乃績恩輝遐曯龍章鳳藻煌煌命服云何二豎搆此疢毒烏鳥陳情歸途躑躅河清弗俟來歌往哭凡我通家慕徳伊夙聞訃驚悼緘詞逺祝束帛瓣香鑒此心曲銘鄧時行墓誌銘君諱用字時行號思齋其先自邑之興道鄉蟇塘橋徙居城南鍾英街族始分有諱思義者君之曽大父也思義生文信文信生鉞鉞字惟威實生君城南諸鄧世以鹽鐵賈販貲雄鄉里故子弟多習奢誕惟威尤落魄縱酒意氣傾時輩生計日縮君生六歲而孤母謝盛年苦節恃君以老君幼亦秀頴知學母子朝夕相砥礪業舉子無所成即棄去為弟子師養薄而共愉愉如也惟威卒時遺金尚盈斤舉授所親俾營什一資薪水乆之以空劵見紿君雖甚悔恨終不以語人性整潔几席書劍衣履具有常度恬澹謙柔外若循俗無所可否而中心是非不爽毫髪其所交與雖賤㣲必盡欵曲初善沈度書晩亦喜為韻語暇則往來仙居梵宇間酬倡終日蕭然無營年七十三以嘉靖庚子三月二十八日卒其生則成化戊子八月十日也銘曰元侯之功宜百代祀締昏王家漢宋襲軌爰及鍾英遺芳載嗣多藏厚亡迺以傳世植爾子孫羅山永峙明故王孺人東氏墓誌銘嘉靖乙未闗中王子允寧與余同舉進士又同被選讀書中秘業比館試比席雅相慕重允寧時時為余説孺人賢既母太孺人來就養于京孺人從丁酉冬允寧以冊使出便道奉太孺人還闗中孺人亦從遂留以養允寧以己亥春單車入復命再閲時而孺人之訃至矣允寧又詳綴其系行以屬余銘且謂余毋辭按孺人姓東氏祖思忠四川按察副使父魯兵部車駕郎中盖東氏世衣冠以詩禮教家孺人習焉又雅性端靜不喜逐諸女子嬉戲祖母某姓恭人憐而撫之曰是兒有食禄相必得佳婿已而識允寧於焦碩人所孺人遂昏王氏碩人允寧祖母也故善某姓恭人歲時數相過從允寧以童子與徃云比歸王氏業稍替時太孺人亦恧縮自疑吾新婦得無怏怏迺孺人承順委至共服惡茹糲無幾㣲不滿意諸所職愈慎以共太孺人用是嘖嘖嗟其遇内外姻乆益敦和易于于至閨門嗃如也車駕君殁有頃孺人兄弟議析業母栁宜人欲為孺人分使召不往但持朱衣來遺稱宜人命孺人顧且笑曰朱衣耶秀才安庸此即他日不能自衣耶卒以故封復其顧義不妄取類此贈檢討君之喪允寜方為弟子員意卓犖不能俯仰于時時亦無問費者遂踰年不克𦵏徒日夜深念憂戚孺人知之輙裒常所御簪珥授使為資又輒手自磔裂鎔之火示不意惜藉是𦵏始有日矣允寧涉艱乆取志益大以逺日務讀書為古文辭或矻矻夜繼孺人每坐傍側治女紅相之又稱説甘苦申儆無怠如是十數年而王子遂以成名得㣲孺人有大助歟余又聞孺人知書有識度其發言往往當於事宜允寧不能詘也居常質約於世俗紛華了無徤羨心即貴服食僕御一如其素人咸謂孺人宜享遐福乃竟止是悲夫孺人生正徳丙寅九月二十一日以嘉靖己亥五月二十六日卒年三十四某年月日𦵏有二男子逢春長春皆不育銘曰山石碌碌易毁惟玉羊腸之車夷道裂輻厥囏並服胡寧爾獨茁茁蘭芽載茁載剥霜露夏零本是用梏有賢不福終始于鞠兹蔵既卜爰復其璞我銘無文以綏令淑王介婦華氏壙銘余仲弟重道娶于華氏華氏婦以嘉靖庚子五月六日卒六月廿有三日訃始至京師余婦聞而驚且泣曰是曷宜有是是曷宜有是吾叔姒性婉靜端重宜夀迺不夀耶自其未歸時媪有從華氏來者頗道其事父母孝謹有一弟一女弟愛甚習女事足不踰壼閾既歸與吾朝夕舅姑左右問衣上食每見益共或吾舅姑少不安樂輒踧踖共語意恐恐不自釋平居有所可否不妄發言亦不為大聲厲色蚤起盥櫛未竟已督諸女奴列坐治麻枲繹卉成布丈尺日有程雖寒暑無少怠冬非甚寒爐不火服飾不取費每昏時退自舅姑所使視叔姒何為方呼燈促筐篋剪紉紃組或夜分猶然其勤儉亦天性也與吾居三數年無幾㣲方員異同有語各盡情實憂疾相恤喜相慶也族里往來者不謂吾二人非一姓焉比來京師又時時相念不少置聞既病猶數問伯姒何時當還庶幾一相見死乃竟不相見也余聞而悲之㑹仲弟以狀來徵銘其事八九相符且曰婦華氏系出南齊孝子寳大父頤父性傳邑庠生居興道鄉若干世為錫望族母江隂陳氏亦家世相埒其生為正徳丙子十一月朔卒年二十有五為王氏婦八年凡五產子三男皆不育惟二女子在先是婦多病每産輒病數請樹妾弟猶豫未果至是迺不彌月而産産八日而遂以卒余讀其辭又甚悲聞將以卒之明年二月二十一日權窆于慧山祖塋之次余父所命也乃敘而銘之銘曰女徳曷徵觀于所聚宜爾家人異姓同志豐耶嗇耶胡歸爾遽二十五年實命之以爾復爾魄𤣥室其處永即爾安尚不忘爾後嗣明王介婦顧氏墓誌銘介婦顧姓邑之膠山人封刑部員外郎諱盛章之孫承事郎諱可賢之長女母繆氏其生以正徳辛巳四月三日年十六歸予季弟邑庠生望道生子女各一人皆殤其卒以嘉靖庚子六月六日去予仲弟婦華氏之卒適一月時予方在京師仲弟為婦請銘予哀而許之至是予自京師歸季弟亦以狀請予益愴然不忍然不得辭也按狀婦雅性儉素勤恪自其父家盛時以第宅輿馬相髙紛紜煜爚鼎食而綺衣牙籌滿前寂若無睹唯日事紃組績紡必以身先服御不喜華靡既為予家婦綜理益勤閨門之政宻如尤能執婦道處妯娌以和雖僮僕羣萃數百指莫敢有煩言焉承事君之厄于訟也仇家多徒鴟張而虎視時又弗值良有司進退跋㚄予弟蚤夜奔命稍稍廢學婦蹙然不寧數相勞苦曰吾不能為緹縈如累君何已而承事君竟以憤懣發疾卒婦慟哭毁瘠見者歎曰誰謂承事君無子者承事君遺言畀以别宅一區及某鄉之田千畆婦不為意動間歸吾父語之曰而翁以無子故以是為汝分良宜顧而翁方不幸可因以為利耶婦涕泣唯唯退遂以田宅盡反諸母氏無靳色於乎婦生長華族無侈汰驕盈之習共於從令郤數千金之資不為係戀此皆婦徳所難者可不謂賢歟生二十年而竟夭死哀哉予父命以卒之明年二月二十一日與仲弟婦同窆于慧山之新阡異塋實藁𦵏銘曰貨財既聚見所爭天下攘攘為利奔嗟爾婦徳堪儀刑千金一言敝屣輕生則無禄兮殁迺永寧明故顧孺人墓誌銘孺人太醫院御醫錢君春林配也錢君自嘉靖壬午以名醫起家至甲午遷御醫進直聖濟殿孺人從事京邸乆之君有節菴翁之喪解去辛丑服闋始復来明年壬寅孺人迺又至至未幾卒七月二十六日也往余嘗與君同里居孺人之卒余吊之君既命其子𤣥齡奉其櫬歸吴卜𦵏於杜宇山之新阡粤癸夘某月日吉先期手𤣥齡所乞翰林吉士嚴君所為狀以泣請銘於余盖猶以同里故余不能辭也按狀孺人長洲名族有世徳父伯和母陸氏夙稟懿訓婉嫕有儀御醫君既失前配遴而聘焉始君父世菴以弟節菴無子以君後節菴節菴翁素嚴毅厥配鄭孺人性亦專慤孺人相君周旋祗服弗怠外内咸安之逮君獲以禄養節菴翁孺人益朝夕恪勤婦道有疾必親侍湯藥至籲天祈以身代君醫術既精明名傾搢紳間求療者户屨雜襲孺人時時語君醫生道也毋以緩亟毋以厚薄必盡其情使勿憾用是君名又日大起孺人與有贊焉孺人雅性素約不為華侈之飾經紀閫以内事具有恒度教其子𤣥齡輩動以禮義待女若婦尤委悉有恩先是𤣥齡之婦卒孺人哭之慟兩越月竟以不起人哀其慈云孺人生於𢎞治己酉四月初三日春秋五十有四子男三長即𤣥齡順天府學生娶沈河南布政杰孫女次昌齡太醫院醫士娶張太醫院判承宗女次永齡娶張蘇州衛指揮使瑀女女二長嫁蘇州衛鎮撫徐霑次嫁太醫院醫士張子貫孫男一好禮𤣥齡出孫女四俱幼銘曰不知其婦言視其夫謙謙之度是惟刑于迺惠迺温婦婦姑姑委禄順終首丘于吴鐫石幽宫爾善永孚表封文林郎蕭山縣知縣東涯張翁墓表於乎自先王之政不行而民始有不獲其所者生無養死無蔵重之以水旱癘疫之灾則號呼頓踣僵腐於溝壑之間者相隨屬也犬狐野豕白晝而爭人之胔而烏鳶翔於水上與河魚競飽雖有惻隱之心一過怵然哀之再見則習而忘焉其不仁甚者雖其親戚宗黨知舊知其主名居止而莫之相收恤夫固以為非已責也或諉曰吾力不足也余悲之乆矣比數年來水旱癘疫不時作而民又非有所仰于寛政以生䝉袂而丐于市者屨大小相續然余行邑中則固無有死于道路者以為皆轉徙于四鄰則又非理矣既而聞諸邑人曰噫嘻此張翁之徳也翁司諫張君之父司諫君嘗令蕭山有恵政蕭山之民歌之天子嘉其最以為司諫未數月以直諫罷歸君之歸也翁迎謂之曰死諫爾職也然吾夫婦老矣天子以餘生畀汝此洪恩也他日則又曰吾嘗一入蕭山知汝有徳於蕭山之民夫士茍可以澤物不必有禄位雖不能生死者然猶可以使其有歸而不憾汝其推蕭山之餘以恵吾邑之人終以母怠乃出一圖授司諌君以墨規其上幾數千曰自今死無歸者必於我乎棺每棺一人則於規中識月日焉期滿數乃更為圖有不及棺者傭貧人完而瘞之而優計其工於是貧人日覘伺其邑中之死而未蔵者持鍤走翁所無逺近必如翁指乆之環數百里間雖甚凶歲而水無流莩野無遺骼則翁之為之也於乎翁可不謂古之仁人哉余一日過司諫君問之前後所收已數千百人矣夫奪人於魚鳶狐犬之腹而壤庇之使游魂殘魄各得其所安其徳厚不啻能生死者而世顧莫之能行豈非以枯骨為無知雖有禄位為民父母者猶或難之與余於是數嘆慕翁以翁為仁人也司諌君又每為余言翁少貧困學稍後時然有竒志鋭然欲以功名自見日夜誦讀至醫卜星厯堪輿佛老家言罔不涉獵性勤慤鄉人往往樂得翁為弟子師翁亦樂以其所嘗學與其所以教子弟者以教鄉人子弟故彬彬多成材平生外和内剛審於義利輕重之辨遇人無貧富貴賤皆能不失其意聚外氏之孤而衣食之有稱貸不能償者召而與之劵其喜施而恤窮盖亦素所志也司諌君之為蕭山也翁奉詔如其官封然終抑抑自將出不輿馬晩得痔病起居為艱司諫君嘗躬抱持之後又病欬逆每發必以十日晝夜有聲其少間也亦必十日乃復發如是者三年竟以乙巳閏二月癸未卒年七十三卒之前數日有喜祥既含歛四體猶柔軟識者以為翁好徳之報云翁諱獻可字廷諫别號東涯配孺人周氏與翁同封子男一即司諫君選娶顧氏繼華氏鄷氏女二適朱仲武恵繡孫男一應科娶尤氏女七許嫁庠生宋儒殤其次許鄭邦係華孟珍黄學憲吴申鍚又其次許喻永齡亦殤又其次許余季弟信道司諫君與余父同登己丑榜進士雅相契重故翁之𦵏司諫君欲得余文表諸墓隧余方以病謝文翰然義不可辭為書其常所敬慕於翁與所聞於司諫君者而歸之若其世系姻族與夫生卒歲月之詳則别有誌者不書狀唐氏行狀孺人姓唐氏常之武進人户科給事中曽可先生諱貴之孫永州府太守有懐翁之第三女也母贈宜人宜興任氏有懐翁與吾父同上春官一見相得甚有婚姻之約故孺人歸于我翁吾常禮法名家任宜人尤善綱紀内政愛而能教諸子女皆敏恵夙成孺人年五六歲時已解為纂繡紃組諸女工其兄應徳君既就學則又效其佔畢習字書應徳君喜其聰警每曰惜女不為丈夫子當遂亢吾宗比長益知書識古今又雅性孝謹動必咨於姆訓自吾父母及妯娌姻族内外皆安之始入門猶及事吾祖贈户部主事約齋府君吾祖喜曰得婦若此足慰吾老眼矣予未有子孺人方盛年然數以為憂一日自歸寧從一女子俱還顧謂予曰君大宗之後也不可以不亟圖此於卜相皆宜子吾故為君聘之既乃時時為理笄櫛膏沐飾容止唯恐其不得予意也歲庚子予兩弟相繼喪婦孺人適從予京師泣且請曰日所以來以叔姒實朝夕吾舅姑側耳今安能乆留此乎予遂以是歲陳情歸省又明年兩弟各繼有室孺人以復從予如京師將行吾父母撫予曰吾二人齒髮若此此别也無逺三載孺人聞之大感動至京迺數以歸期訊予予遲之孺人輒請前發曰以堅君志竟以甲辰三月歸歸時舟中人病寒熱者相繼孺人憂且悴故抵家未匝月而病病幾再旬而卒不起於乎哀哉孺人之既歸也吾父以舊所居囂隘欲處之别宅孺人辭不可曰凡所為歸者以奉吾大人耳即少逺左右其何以共婦事且非吾夫子意也孺人事予十七年從宦者十年然服御一不改其素以予禄入之薄非歳時賓燕食不設重肉或予偶飯於他所孺人輒為蔬具問之第曰吾適不喜肉耳至予所飲食滋味必手調或一飯數起聞病既憒索杯羮嘗之以為㫖目女奴使進予所盖猶其平日事也於乎哀哉嘗言人生衣食各有定禄溢其分則易竭吾欲使常有餘故不敢取費耳於乎迺又終不禄也豈予徳薄而厚饗天故以為孺人嗇耶予素簡黙室中無外言然物情臧否或人事隱顯得失親賓往來禮文疏數之節取予進退之宜時以一二觀孺人孺人言之未嘗不中肯綮也平居不為褻語惰容雖遇僮使亦無妄喜怒予有㣲過則孺人終日不自得或一事稍善未嘗不從㬰其間盖孺人於予有友道焉終孺人之生蚤作夜思綜理纖宻予不復問門以内事然孺人必以請於予示有從也於乎孰謂天竟奪吾良友耶孺人生於正徳壬申五月朔以嘉靖甲辰五月二十一日卒年纔三十有三耳子男一化𢎞聘太學生安子介女女二俱幼其一人母陸氏孺人故所聘也於乎予為薄禄所縻不克偕孺人以歸使攜諸兒逺涉數千里之險迺孺人之殁又不克一言與訣訃聞留滯數月始得歸則塵滿繐帷凉溫變節矣撫棺長慟竟何及哉竟何及哉獨計乞銘於聞人以為不朽之圖庶可少慰幽泉未瞑之目敢先窀穸之期而以請于下執事惟執事其憐而許之具茨文集巻七
