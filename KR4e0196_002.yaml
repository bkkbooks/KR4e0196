body:
  text: 具茨詩集巻二明王立道撰五言律詠汙渠鶴華表歸何日乗軒事已非終朝獨含垢所幸脫虞機失侶頻看影長鳴似訢饑空餘出塵意皎皎向寒暉逰仙三首仙人住玉京累刼道初成指樹元非姓飡松偶得名龍噓雲蓋引虎奉嶽圗迎相待天台路何時返赤城玉室書名久清溪得道初赤文河上籙鴻寳枕中書龍吐燒丹火鸞驂度海車偶来華表上終與世人踈何年海上客移住緱山岑未辨雲霞色先聞鸞鳳音山神供石髓童子問琴心一謁紫皇去仙蹤不可尋前湯菴僻地多逢寺秋花滿石壇僧閒縫衲坐客到出門看失姓離羣乆躬耕乞食難清言殊未厭車馬去長安送嚴節推佐郡聲名乆辭家道路難那堪今日去猶是昔年官旌節先春度爰書入夜看君平能自卜留滯不須歎送陳守之任沂州郯城今沂屬邑餘春隨五馬千里去長安羡子成刀夢従人問鳥官花迎新佩綬草長古雩壇政美偏多暇言追㸃爾歡許院判挽歌二首越人生死術何事不長年仙跡壺中隠神方肘後傳遺忠猶藥石故里自風烟應是軒農佐相将去九天醫國早稱良金門數獻方忽聞騎鶴去無復入鵷行洗藥春流咽藏舟夜壑光長安今罷市相恨失韓康送益上人南歸苦行不求知清吟祗自怡来尋白馬寺去作紫衣師弟子邀升座山人覔贈詩還思渡杯處明月滿須彌悼亡友握手幾論文髙才夙所聞将因厭塵網早已謝人羣日短風雲駛山空芝蕙焚不堪重挂劒宿草滿孤墳正月雪和韻長安春後雪猶自兆年豐萬里鴻歸處千門曉望同氣融疑湛露質薄故衝風莫羨梁園賦應憐東郭窮謁三忠祠寥落遺忠像杉松古殿隂興亡問流水哀怨動鳴禽志厄當年㑹神垂異代歆獨臨車馬道應識往来心春日閒居三首我本陸沈乆幽棲意自宜心清知俗逺地僻訝春遲種竹先留徑移花欲傍池門前剡溪棹来往更無期習静因成癖春来常閉闗山人留藥去稚子借書還讀傳希髙士攻辭媿小山猶牽青瑣夢供奉紫宸班市隠不違親移居正及春未能從白社稍得謝緇塵僦地但栽秫釣魚唯煮蓴時逢河曲叟笑我獨長貧題畫結宅千峰裏真堪與世違雲来似招隠鳥下為忘機花徑緣溪窄茶烟帶雨霏有時還隠几應是灌園歸村居感興三首芳樹含春風鳴禽亂晴日藜蒿欲滿園掃除唯一室閒情共水雲生計躭書帙時無問竒人悠然獨抱膝翩翩髙世情悠悠避時計築室近樵漁乗春樹蘭蕙雖無求仲隣亦有君平藝不學同時人獻賦空靡麗出郭車馬稀况復園林好言念當塗人翻悲灌畦老青瑣乆已疲𤣥文近能草澹然榮利間何如乞身早喜唐應徳見訪别墅二首學隠畏逢人郊扉絶四鄰時多譏偃蹇子獨念交親竒樹行相問幽蘭坐共紉還因漉酒便一解陶潛巾閒居澹時好日倚槁梧吟幸枉空虛足重聞山水音滄波投迹逺𤣥理寄言深野服君能慣從来多道心秋日溪上偶成本無羨魚意聊復上苔磯坐惜青蘋晩行攀碧樹稀兒童喧釣艇鷄犬狎鄰扉近喜桑麻好迎霜早授衣晚起偶成晩起獨悠然雲山滿目前常疑身是隠早覺性通禪座引清心月池分洗耳泉故園翻似客草色又經年秋居用唐人韻得五首平生軒組意不為慕輕肥身世䕫憐蚿風塵犬吠衣㣲官百指累舊業五湖歸怪得驅馳乆秋来雙鬢稀本為悲揺落還因厭俗塵次公酒狂士方朔謫仙人偃仰四空壁周旋一墊巾眼前無長物非是拙謀身四戸啼螀亂秋隂欲上階菊花收作枕草蔓緝成鞋得句先書壁因琴别置齋溪雲與山月總不費安排重来北山客却媿草堂靈窈窕鄭生谷寂寥揚子亭檢山收地志盥手閱心經長日看逾短秋聲入夜鈴木落隨寒雨林開際逺天水紋揺簟竹秋氣入琴絃倚樹禽相語班荆鹿共眠機心日以盡自訝骨如仙送駱質夫謝病歸湖州和王允寧二首聞君舊隠處正傍太湖濱課樹收柑子澆松養茯神秪緣身病累轉覺道情真何日重開徑求羊卜爾鄰髙卧山圍屋幽吟竹遶町鬭雞新續句相鶴舊傳經一鳥波間白千峰雨後青相憐少同病怪爾室常扃七夕雨二首漢渚邀靈匹幽盟此夜尋盈盈唯一水暮暮更為雲灑道流餘潤揚波蕩夕氛含情愁雨絶隨淚㸃羅裙靈鵲翻占雨神京似灌壇迎針絲亂度映燭淚先殘機石新含潤河梁欲下湍尋源海上客昏黒路應難送髙都諫倅廣東藩幕憐君香案吏乆奉紫宸朝暫解荷囊去言從薇省招秋經吳苑樹晨望海門潮逺近無須問平原欲試蕭鄉園偶成為園非擇勝所欲奉親娛樹與人俱散溪因主亦愚宦卑情自澹戰勝體猶臞敢謂輊纓冕出門多畏途讀李忠定靖康傳信錄二首國勢已紛如忠賢乆見疎天心未悔禍兵事竟成虛玉府非金穴魚符是蠟書空聞求内禪猶自昧前車治亂亦無端興戎自晏安㑹因千道設嶽擬萬年看城下盟初合宫中戱未䦨可憐忠定淚獨灑北風寒幽居幽居何處是一徑落花中人似鹿門隠溪将剡水通閒尋種瓜伴因識養雞翁獨往平生意多岐秪自窮途中暑寄所知旅泊淹中夏愁添毒熱新時逢隔水騎相顧滿衣塵擇木頻移䕃貪程更問津不緣趨捧日長作北窓人寄趙孟静時方在告一官常卧病知爾學沈冥對客稱居士呼兒説道經支離堪混俗猿鳥共忘形為識峨嵋老年来畏獨醒舊愛山中宿因成方外遊寫經多施寺草賦獨登樓耿介於陵子栖遲馬少㳺未能諳蜀道夢爾到滄洲卜居後東吳曰静歐學章與君數相見但訝往来疎不惜買隣費初營近市居卑棲隨燕雀長物載圖書何日登樓賦虚名愧應徐賀王允寧移居二首允寧太夫人迎養於京師故首章云仄徑不容車迢迢奉板輿思𤣥隱几處入直倚門初夜户蛩螿滿秋墻薜荔疎自憐趨祿養時復憶吾廬甲第連雲起一枝吾自安箧中鷦鷯賦壁上鵕䴊冠客至供蔬具人閒理藥欄不須歌考室久已夢斯干允寜未有子故以祝之柬盧浚卿移居年来頻卜築只傍帝城西省樹寒猶緑宮鶯春早啼官閒成小隱身病惬幽棲况是盧敖宅紅塵未許迷送吳道士紫氣来何逺青牛又出關客程江上雪歸夢海中山風御雙鳬去身輕一鶴還餘丹幸留贈我欲駐頽顔送楊都諫謫貴洲子雲羞執㦸萬里去金門衮職将誰補𤣥文祗自論銜恩雞舌在渉險馬蹄翻為問居夷好一官聊避喧陳封君六十雙夀六十鬢如絲林泉乆避時性唯便野鹿手自蓺園葵愛客常青眼傳家有白眉醉看章服貴莱婦笑相宜江隂花母節夀詩故醫家一身唯苦節三徙得仙閭欲試趨庭訓還探繋肘書江清魚入饌秋晩藥供蔬白首堪相慰清尊幸不虛寄尹汝基秋杪正愁予逢君憶嵗除頽然泉上酌慰我獨離居烽火驚初定田園意轉疎平生匡國願早上治安書至後二日雪至後雪霏霏初陽力尚㣲細霑羅襪冷輕逐琯灰飛對樹驚花發看山失翠圍猶餘閉闗意一任積荆扉觀出軍十首萬騎出長安都人夹道看旗叅龍虎動劍帶鸊鵜寒𤣥社新分土黄金盡築壇九重憂正切又見選材官聖主本修文安邊再出軍戈鋋六月雪旌斾半空雲候騎宵中發屯營栁外分幕前文武士年少有終軍詔出選元戎人推衛霍雄天兵六郡卒漢馬五花驄氣蓋燕山石歌酣易水風匈奴行徙牧不敢向雲中王師亦有征慷慨羽林兵盡說從軍樂相和出塞聲旌麾天際下刁斗月中鳴自媿劉生勇空令氣不平瑣甲膺朱紱銀鞍跨紫騮将軍五道出戰士百金收賈勇多超乗論兵競借籌相期窮絶漠梟取左賢頭君王方北顧萬里動天誅日月占兵氣風雲識陣圖邊隅休士乆将帥受恩殊一取單于帳嫖姚真丈夫塞馬飲河汾兵符閫外分盡徴驃騎將逺逐虎狼羣燕尾翻晴旭犀皮暗曉雲不貪麟閣畫報主藉㣲勲邊警先秋報重興六月師簡書傳鳳闕兵陣動魚離吹律風初應揮戈日乍低一軍齊洒泣為感采薇詩大将鑿凶門邊庭節制尊登壇戈劒擁掃境鼓鼙喧投石軍中戯椎牛幕下恩折衝樽俎意千載與誰論烽火照甘泉将軍出塞年萬夫齊決拾一鼓蕩戈鋋地極迴看斗谷深長㫁烟蕭條夕陽外應聽哭祁連芳洲為蔡長卿題世醫家傳聞蔡經宅一逕入烟霞地古藤蘿合溪迴城市賖藥畦連别塢碁局上浮槎肯念文園客相從老嵗華和鐘石學士齋夜見雪拗體二首素心仰𤣥鑒靈澤先成雪六出花更繁五更綿復折瓊筵先幄張寳鼎名香爇懐君坐中夜虛窓澹微月北地多苦寒春半猶飛雪東郭履盡穿淵明巾欲折林花吐還縮野烟凍不爇遥瞻白玉臺羣神朝二月輓張封君何處訪髙蹤岧嶢江上峯遺安五經笥寄傲一枝笻姓字漁翁識茶蔬野老供無嗟終不遇身後渥恩濃贈朱從龍外兄二首祗為憐同病時来款竹扉藤蘿一畝宅荷芰四時衣石几焚香坐春流抱甕歸池塘入幽夢相客各依依嵗晩不一遇知君自晏如貧收乞米帖病學養丹書野竹編漁舫山花薦客蔬風塵初息駕莫訝故人踈贈數疇一首為儒長濩落中嵗學淵潜蕙草春三徑蔷薇月半簾藥方閒裡輯詩巻病来添野老時相訊微吟坐短簷代贈崇安住持僧近市開蘭若塵中得静㡬鐘催城樹曉錫伴野雲飛化俗多傳偈持齋獨掩扉自今身得度僧法盡皈依題華氏撫絃小像池臺應未改山水已希聲妙寄丹青筆深傳緑綺情幽蘭春日恨别鶴夜堂驚何必雍門客能令淚滿纓代賀張尚寳兩嵗生兩子即羅峯閣老子也丞相好推賢金貂七葉傳恩遺掌璽日慶發夢熊年玉樹看雙植桑弧喜再懸慚余湯餅客秋至又登筵送萬容齋通判南雍人言南土樂况復郡名雄五嶺雲中合諸夷徼外通家傳孔林學俗仰曲江風驥足真堪展無嗟西復東送南豐尹髙文明無言得官晚墨綬自為榮列宿郎官寵餘春鄉國情花添製錦色江助酌泉清他日雙鳬至應蜚百里聲梅窓為蔡君題為愛孤山友閒窓手自栽塵襟風外洗野望雪中開心賞芝蘭共年芳桃李催不嫌居近市清夢自徘徊夀彭宣父三月長安道東風送客歸十年桓氏學此日老莱衣江入青春暖雲隨畫鷁飛鉅公名筆在桑梓自光輝送羅希文掌鄞縣教兩獻蓬莱賦嗟君數尚竒翩然従吏隠真不忝人師梁棟他時用琴書此日宜更憐桑梓近可慰白雲思夀沈徳夫母春日休文第東風萱草花共姜心獨苦王母髮初華綵服迴清晝丹帔拂曉霞人間有瑶島何處覔仙家輓盧湲江父鳩杖迎賓日君顔幸未衰不妨親藥裹何意泣靈輀紫誥生前寵青山故里思漳河風色暮歸路不勝悲送李威甫掌長興教匹馬河橋别南雲欲滿空歸心依岸栁秋色動江楓帝命師儒重文風吳越同他年逢弟子應自識胡公送俞汝承行二首國計須鹽鐵君行亦壯觀一星離北極六月發長安城樹欹殘暑河梁下急湍佇聴旋斾日獻論續桓寛魏闕光新命秦淮戀舊逰清心鷺洲月極目牛山秋梓里情何劇萱堂志已酬明時多雨露應自足忘憂送朱月河判雷州二首帝徳通炎海官曹接要荒緣知今别駕非復古雷陽展驥材堪逺歌驪思更張都門旌斾迥寒日正蒼蒼藝苑久蜚英才髙獨晚成東南多好郡江海足閒情春樹三山合寒雲五嶺平天門驚浪動此日仰賢聲補送駱尹敖歐四年兄使諸藩二首螭陛虛彤管龍章下赤墀尊親周典禮磐石漢宗支天啟儲宫豫春迴使節遲淮王如好客為索桂山詞泰壇初薦冊離景又重輝帝命先宗室天書出瑣闈十行窺聖妙千里逐春歸此日髙堂近還看著舞衣送潘勿齋司黄巖訓楚楚江南士扁舟向日東師儒新拜命吳越舊同風海氣蔵仙宅山形擅學宫諸生相問俗試與說尤公賀鮑如泉七十緑水遶門閒楊花滿釣船折腰寧作吏負郭且歸田義訓徵圖史春情屬管絃相逢不惜醉應有酒如泉送孫志髙侍母歸浙春水正悠悠圖書上越舟潘輿憐逺道華服炫晴洲况是蓬瀛客真成天姥逰明光殘草在桂樹莫淹留題陽峯一首楚山竒勝處共說繡林亭今古留天柱東南發地靈沱江深映碧巫峡逺分青雲氣時時合為霖遍四溟芳洲贈袁太醫明時容吏隠猶自慕滄洲絶藝成三折新詩寄四愁為園謝機械行世任虛舟鄉夢依然在清溪雙白鷗為顧汝隆悼亡旅魄悲新月歸魂逐斷雲蘭芳春日盡鸞影曉窓分廿載人間世千秋湖上墳重吟贈婦句悽切不堪聞野寺古寺亂田間尋僧夜未還萬縁塵外盡雙樹月中攀化俗多傳偈觀空獨揜闗問余還嗜酒何日住廬山送陸鍊師歸領道㑹少君初得道謁帝上清宫鳬舄来天外鴻書秘枕中祗緣丹室在重與世人逢縮地元無術泠然獨御風送益上人南歸面壁已多年遊方向日邉三千俱法界来去但隨縁俗逺詩成易溪晴杯渡便還思竹房月獨煮恵山泉送顧槩逢君未徂暑别去又重陽一官新拜命廿里古封疆水落舟檣逺天清驛樹長東昌本畿輔指日見輝光送張僉休寧二尹石室徵勞乆彤墀錫命新春光和雨露行色帶風塵折栁聊隨俗哦松太任真君知操割否應藉佐刀人月溪號詩明月共千里一谿君獨幽此時堪着屐何處有蔵舟猿鶴聲如答藤蘿影漸收小山今寂寞願子勿淹留送朱省簿樂安居人怯中夏行子發長安尊酒憐鄉國天風思羽翰鶯聲春盡少江色夜深寒回首孤帆逺誰歌行路難鐵瓶草堂二首大市多真隠名都有逸人春深草堂静雨過棘籬新貫蝨功非拙屠龍術不貧雲雷隨變化池上見飛鱗喬木不知年茒堂鎖晝烟人疑揚子宅門有米家船隠跡山南霧将雛冀北天晚成良有㑹莫自惜華顛輓湯母令子彈冠日慈親屬纊時荻灰尋舊畫機石訝新支上國人留輓空庭鳥助悲秋風不相惜偏向楚帆吹陽峯巻雄勢標南郡岐陽第一峯雲中開錦繡天際立芙蓉人物全荆盛辭華百代宗莫牽松桂夢宻勿待從容夀詩遶徑春風入臨流甲第開冠裳三島客沆瀣萬年杯紫誥兼君寵斑衣憶手裁瑶池何處是絃管夜頻催夀吕思齋七十北望心猶壯東風髮已華客盈文舉座春屬老莱家對酒新烏帽傳經舊絳紗非熊行自卜十載未論賖夀陸頤齋七十七十健逢迎知君善養生笙歌娛晚景車馬雜春聲鶴唳聞應慣茶經著始成漢庭方貴老章服此時榮題惠坡幽懐羨獨往茅屋住山坡蠟屐看鳴鳥浮觴坐淺莎薜蘿罥僧錫麋鹿駭樵歌我亦巖棲者藏書近若何題顧與新清溪庄和唐應徳韻四首罷官應自好負郭有瓜田宦味陶元亮詩才賈浪仙髙齋聴雨枕斜月過湖船誰共幽吟者空聞招隠篇舊是樵漁地投簮此卜居溪閒安藥磑春至檢農書食笋思分竹腰鎌擬佩魚也知濠上樂媿我未能如林卧堪遺俗村居復近湖應門時見鶴鼓棹不驚鳬樹與人俱散溪因主亦愚翻嫌太寥僻庄外有桑榆知君閉闗乆一徑落花深書癖年長在詩盟春更尋空山㡬兩屐逺道四愁吟北望休相笑平生魏闕心送周顒分教嚴州斯文周茂叔清節漢嚴陵風月還誰共雲山思獨凝道依家學重教並郡賢興庭草多幽意髙臺時復登和龍岡送白洛原将命護作因得歸沐畫省猶牽袂征㠶動渭潯九重将異命千里惬歸心闕幽居忘越吟我亦多鄉思金門聊陸沈酬包元達侍御見示之作兼致别意二首逺道客情多停橈時共過綵衣霑雨露繡服炫星河時論深杯酒鄉音接棹歌清江明月滿莫問夜如何吳趨投暝發楚樹帶烟㣲千里占星聚雙帆逐鴈飛寧親恩詔渥報主壮心違尊酒憐同病天涯更獨歸郭允新宅中秋燕集限韻得王字二首圎魄臨秋半邀歡奉桂漿感時俱異客卜夜共清光影揺鳷鵲鴻聲度建章還思擬金鑑持以奉明王天街秋宇浄月露淡交光對此懐千古悠然覽四荒開尊浮桂影裁句競蘭芳未就登樓賦多慙姓是王秋居五首和靖常攜鶴羲之本好鵞山隂秋日浄湖上野烟和大道機中息虛名身後多淵明真解此詩酒一生過雲樹秋容澹悲歌野興豪蕭蘭元異種牛驥亦同槽露白芰荷盡天清鴻鴈髙朋逰隔千里魂夢為誰勞種樹邊茅宇抛書滿石牀林居慚束帶晝坐憶含香土木形骸拙江湖憂思長秋来頻對客山桂挹寒漿卧遊真自得日對輞川圖燒葉茶頻煮懸錢酒旋沽大言傾宋玉濳論學王符秋至吟尤苦臨風獨撚鬚避樹營牆短看山引坐偏長松盤野鶴疎葉度寒蟬蜂塢花成蜜蝸房露洗涎村居時易姓祇畏俗人傳偶成野外常無事多看種樹書迂頑堪自笑躑躅欲焉如飲客中山酒尋春下澤車倦游頻息駕意惬即吾廬送姚友竹二首東風桃李滿忽向剡溪歸江暖知鱸美春深愛蕨肥故山麋鹿友初服芰荷衣千里還相憶尋君舊釣磯亦知簮組累自愛水雲居匹馬歸来早三鱣屬望虛閒情任吳越行李總圖書何處堪髙卧山中有草廬書觀瀾巻贈行涂堂主簿父二首旅館忽經年歸懐感逝川雲来震澤藪春去洞庭船濠水思䝉吏龍門悵馬遷江湖堪寄興莫自歎華顛青春白日好千里一帆初野色雲俱媚江聲夜轉虚逢人談惠麓久客憶匡廬好去看消息殷勤戒子書代作恵坡詩鄭子由来厭朝市卜築近山家路入雲林杳籬侵石磴斜汲泉因釀酒掃徑為看花屋角清溪轉桃源那更賖夏日偶成窮巷謝華軒幽齋入斷垣卧遊非擇勝坐鍜欲辭喧有客問竒字無人知寓言時来松樹下長嘯似蘇門代夀曺山人六十釀酒擷園蔬為歡此度初身因烏帽寵人以白眉譽舊識尚書履今来長者車早諳清浄理寧藉養生書義興道中倚棹水雲邊溪光共杳然琴尊百里道竹樹一村烟山果迎秋落汀花帶晚姸夜来何處宿相逐捕魚船登孤山用唐人張祜韻兀坐俯孤岑翛然出世心烟霞千嶂曉桑柘半溪隂鶴去亭猶古人幽山更深已看塵跡逺况復近東林紫陽菴幽翳蔵靈境攀窺石磴寒奔峰度天外飛閣出林端憩洞思探籙疏泉學煮丹重来定何日明去欲辭官崇徳道中望望越溪幽烟波横素秋桑園多傍水荻岸一維舟落鴈窺沙溆行人指驛樓棹歌中夜發芳杜滿前洲吳廷宣父母雙輓鹿門棲隠處耕織自相依忽此歌狸首初因哭少微梁鴻山下宅孟母室中機寥落那堪問空餘明月輝夀苗東洲七十為儒不得意老去素風存愛客多懸榻謀身獨灌園柴門耽舊隠紗帽奉明恩白髮春来長怡情此一尊題文苑常熟錢氏别業也家本詩書業幽居總好儒天龍座上客山海壁間圖問字時能說鳴琴聊自娛重来解組後不似北山逋茹瀾堂號詩靈液千年發虛堂半嶺懸池喧瀑布雨窓暝具區烟長日雲俱卧幽襟俗盡捐吾纓如可濯攜手弄潺湲陸節之夫婦七十雙夀奕奕金章客歸来兩鬢星仰天窺鶴唳閉户著茶經五栁宜同傳三休已作亭使君况有婦七十共修齡途中送春寄諸弟客行愁節換况復是春歸檣燕如相訊汀花亦盡飛問程猶故國千里更遲遲遥憶髙堂燕重嗟定省違初入都寄親知薄宦蓬應似往来唯所飄振衣聊息駕鳴玉更趨朝慣學金門隠多慚華鬢饒滄洲有故侶松桂欲相招吕梁題養素軒大檏元無事幽居堪自怡雲依書幌静石共藥欄欹白賁存吾道𤣥文任俗疑風塵千古意誰識染絲悲野望水漫孤村白花依别嶼紅隂隂沙際日細細午前風貰酒從隣媪呼舟學釣翁一春唯寄興山色鳥聲中寄王允寜用舊贈韻憶昨趨金馬承恩共一時君今卧西華我亦戀南枝永念闗中使多傳别後詩燕雲猶自隔吳苑倍相思送篆文生吳客偏多藝君能解古文鴻都初待詔燕市忽離羣科斗舟迎字鳬鷖沙漾紋相看俱得意寜惜去来勤夀蕭尹吏隠不違親歸来白髮新大椿宜晚嵗五栁絶風塵紫誥銜恩重斑衣獻舞頻庭中聞鳳吹蕭史是前身嵗暮送客月窮知嵗晚㳺子促歸心殘雪千門曙寒風百里隂目隨長路斷情寄故園深日暮幽齋裡何人共越吟得家書三首三春候歸鴈四月見家書客思真無賴親恩自不疎詩書餘舊業水竹卜新居喜極渾忘寐千金定未如吳楚同千里君親自一心看雲遥北極望日遲南音未返王陽馭空成越舄吟春来江漢水何似舊時深春盡逢南雁翻令感嵗華五年猶作客一命亦為家肉食愁黄竹蓴羮想白華何時莱子服謾向故人誇送黄三峯僉憲山東羨爾獨懐竒為郎已後時欲觀滄海日不戀白雲司繡斧承秋令丹書屬夜思寄車應問俗更訪嶧山碑和陳平岡七夕韻牛女何年事猶尋此夜盟多君先得巧揺筆報詩成秋興尊前發河流天畔明蘭章無以報空自媿同聲送夀昌吳尹出宰動星文孤城百里分山猶富春古道以子陵聞鳬舄雙看别牛刀獨樹勲重尋治縣譜美政接番君送李仲西都諫節推大名未厭承明直那堪祖道看象刑清禁甸持節渡桑乾朝下衣香在焚餘諌草殘霜楓迎去馬似照寸心丹九月七日汪維義宅對菊他鄉七日酒應為菊花催疎鬢風前帽覉懐江上臺秋光寒拂檻霞色暝侵杯揺落易為感酣歌日幾迴和孫季泉韻二首聖主正垂裳同依日月光芳辰共清燕聮珮此登堂座接陳君榻衣沾荀令香明時多事業莫遣鬢毛蒼髙軒貴戚里良㑹小春時逸興頻催酒清談各問詩鵷鸞天外集商羽曲中移聚散興餘慨何年更此期㑹同年二首對酒復何疑相驚十載期鯤鵬同變化鵷鷺數追隨筵敞通侯第歌憐少女詞不愁歸路暝後㑹恐參差綺席照朱甍侯家接鳳城歌鐘五雲近軒葢一時傾星聚慚名徳風期協友生相看語不盡特此寄同聲左順門問安同郭允新作追趨雙闕下瞻拜五雲間為問君王寝相隨供奉班啼鴉丹禁曙調馬玉墀閑佳氣葱葱合深宫護聖顔酬歐學章見贈移居六一歐居士琴書滿屋清故開松菊逕應有薜蘿情客借陳君榻鄰慙求仲名趨朝慣相逐暗識玉珂聲張映山書屋巻君家碧山後舊業五車書欲就張衡賦先營諸葛廬下帷山桂發隠几嶺雲嘘勤苦無須問行看上石渠登鏡光閣梵居依鳳闕虛閣瞰龍宫車馬三春賞山河四望通林鮮迎佛日磬逺引皇風鳥似隨緣下僧因出定逢烟花迷色相水樹悟真空贈僧杖錫去何遲東林烟雨㣲出山吟更苦得祿意多違鐘鼓侈齋磬袈裟厭客衣自令身得度僧俗盡皈依黄公澗積雨千峯潤飛流百道懸穿林驚宿鳥激石亂鳴蟬闕共十三字楚相陵谷自依然移居儒宫無一畝宦薄易為家地入黄啚僻門依紫陌斜㣲吟對秋草閒歩拂簷花未就登樓賦端居念嵗華安黄門曽祖母九十八夀詩問訊日邊書髙堂百嵗初蘭孫五世滿甲子六身餘地訝瑶池接星占寳婺虛賓筵秋正好仙菊照華裾又柬盧浚明移居葵藿心常切移居近日華門窺狭斜道春傍上林花守拙家四壁多方書五車清談留客處寒竹浄交加歩虚詞四首王母傳青鳥秦娥控紫鸞相期瑶島外忽上綵雲端海水年来淺桃花春去殘未能逢玉舄那得問金丹海上三珠樹雲中七寳車空聞徃来處何地是仙家洞古羊成石林春棗似𤓰刀圭雖可學嵗月莫應賖霧幄遶霓旌氤氲滿太清龍成雲葢引虎奉嶽圗迎七聖猶同御三天各異程試求香案吏誰是嵗星精歴歴白榆中飄颻雙玉童神宫開太一仙路接崆峒子晉仍驂鶴浮丘亦駕鴻不須能縮地萬里自乗風寄題前湯菴空林迴夕照清梵尚依㣲野鷺窺僧鉢天花綴佛衣經翻長日過錫伴暮雲歸欲托門人宿因觀靜者幾銅雀伎二首掩涕辭金屋含情向白雲衣冠新卜道歌舞舊来羣貟枕無時覺哀猿終夜聞誰言妾薄命生死只從君漳河流日夜歌舞未能休艶色今誰妬餘香空自留朝雲不作雨陵樹早生秋滿目多疑塜君靈在此不具茨詩集巻二
