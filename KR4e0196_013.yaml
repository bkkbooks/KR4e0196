body:
  text: 具茨文集卷八明王立道撰充國不欲歸功二將天下之事有必然有當然必然者理也當然者情也情可以徇理而理不可以徇情是故君子可貴可賤可生可死而其言終不可奪者要諸理而已理固有必出於此必不可出於彼者出於此則濟雖不幸而敗無恤也出於彼則弗濟雖幸而不敗無取也况其已然之效出於此而濟者已具可見顧乃避一時之嫌推以自逺而姑反常以徼名徇情以貶理豈惟誣人抑亦自誣而已吾於漢之充國有取焉方其誅先零下罕开釋兵振旅䇿馬而入京師其功名固已籍籍滿朝廷矣於是而修退讓之節為古人之事豈非士之所貴而俗之所謂長者然歟故當時之愛充國者欲其稱武賢譽延夀一歸之功而已弗居焉是亦一説也傳曰世之治也君子讓能而讓其下小人農力以事其上是以讒慝黜逺由不爭也嘗觀晉之三卿歸自克楚而其遜功之言若出一口不曰君所教也士用命也則曰庚所命耳燮之制耳君子是以多欒郤范文子之不伐也艾會渾濬之爭古今以為大恥故曰功蓋天下守之以讓勞而不伐有功而不德豈非處功名者之一大律度哉然吾聞之君子不以變易常不以身先國不以近忘逺不以小遺大浩星賜之言謂之愛充國則可爾謂之知充國則未也何則當時西羌之叛其於中國不啻若疥癬而生事喜功者輒欲一舉而劓殄滅之噫亦甚快矣豈知用師之道固以還定安集為期殺人以逞以徼幸於一時之功固仁人之所隱耳而謂我充國為之乎屯田之疏凡四三上而異議者始一息喙而終不能止破羌強弩之師充國之功其不撓於二子者幾希矣正使不幸而師老於田虜稽於誅妨我農功索我士氣坐食罷敝而一無成功焉微破羌強弩之師誠罔攸濟然而釋懷柔務戰攻委良圖從少算是直可以僥幸而不可以萬全吾雖無功猶欲為天子一明言之使後舉者無以辛許藉口雖天子不察而以忌功疑我亦甘心爾今也先零破散而罕开之屬竟不煩兵而下則天子亦既信老臣之言為不誣而知兵事之不可不圖其萬全矣而乃避矜功之小嫌忘經國之逺略舍必然之常理沽讓善之虛名其所以謀其身者亦得矣而何以為漢家久逺計哉昔者嘗讀秦史記至殽之師穆公利鄭管鑰介三帥而潛趨焉時惟蹇叔入則諫諸朝出則哭而送之野曰吾見師之出而不見其入也既而晉以先軫之力卒厄而殲諸殽墓木未拱而蹇叔之言信矣秦誓之作大都以違良士任勇夫信諞言為深悔然則為蹇叔計者亦將終以孟明之舉為得䇿哉理固有所不可易功固有所不必讓老成謀國其胸中各有定見蹇叔以不用敗充國以用而成其可不可要皆有必然者而何暇徇人之情以求名耶甚矣浩星賜之非知充國也為人臣殺其身有益於君則為之已欲以讓為名而使吾國家蒙無窮之禍此固不俟智者而後能計其失得矣漢宣之立去武帝猶未甚逺呻吟之聲創痍罷病之卒其絶於耳目未久也藉使衛霍公孫之屬得一充國焉豈不可以少抑武帝之鋭而動其天而何忍以數百萬之師為胡鬼哉而輪臺之詔又何至末年而始下哉故吾謂充國之為漢將有數善焉以恩信招羌人而不果於殺仁也休兵屯田不血刃而罕开服焉略也料羌虜之必破智也慮及國家而不為身謀忠也漢一代老成之將誠未有出充國之右者易曰師貞丈人吉充國以之真為伏節死義之舉君子之消亂也於其治不於其亂而其知人也於其始不於其終誠以禍機之伏每無常形而忠義之在人心則固未嘗不素定也明主知其然故常用其素定之忠義而制其未然之亂焉此其保邦之略存乎用俊之明要不待亂生而後為之防忠義已成而始識其人之有益於人國也故曰始之不圖終悔無及唐之玄宗良可歎已昔者常怪唐虞之盛外而百辟內而卿士莫不濟濟焉師師焉相安於無事而無一節義之士挺然於其間豈其人之不後世若哉蓋至於夏商之季而後龍逢比干夷齊之徒出焉言激而危志貞而固其所以自靖自獻以無負乎當時無愧於天下後世者初不敢一毫自愛其身君子於是而傷世道之不幸矣夫忠義之來根於天體於人成於性不以生死存亡不以古今有無用之於治世則為嘉謀嘉猷正道直行其身與忠義而俱存焉者唐虞之臣是也用之於亂世則為危言危行精忠徑節其身以忠義而自殉者夏商以後諸臣是也然而君子不以是為死忠義者之不幸而深以為當時國家惜者何歟宋之范景仁有言古之君子消亂於未萌無智名無勇功吾獨不得為此使天下受其害而吾享其名吾何心哉吾是以知忠義之不幸在國家而不在臣子也然世之人主其慮淺而術疏方其承平間暇之時莫不侈心縱欲以從事於聲色狗馬之間晏然自以為天下莫敢謀也一時載髙位食厚祿者非其私昵近幸則其外親小童而凡才猷之士不二心之臣一不見録有或昌言而顯爭之則輒斥去不用及其危機潛伏禍亂既成而彼偏方下邑平日未嘗一識天子之面而受其榮施者乃始任其難而委身焉此正韓非之所謂所養非所用而所用非所養者而何以為天下國家哉夫制之於未然者其勢順而易救之於已敗者其勢逆而難順而易故忠義無迹而隱然為國家之益焉逆而難則忠義之在臣子者非不足以自韙其身而國家之受弊深矣昔人嘗曰蹇叔宫之奇不用燭之武張孟談受大賞唐之玄宗良可歎哉天寶之際溺於晏安祿山首亂而河北無一義士賴有巡逺杲卿天與忠義孤城守死蓋凜然為國之重然考其名位爵祿則不過一守一令之微而已夫以使之之病也任之之重也而魯之負杖者猶不難其死焉數子名位雖下要亦朝廷一命官食君祿而死其難蓋無足怪者吾獨惜明皇委用之不早也當時祿山之必反張曲江嘗爭之矣帝固不以為然也九齡之忠義即巡逺杲卿之儔耳使其不先祿山之亂而死安知死祿山者不又有一九齡哉曲江之祭即其所以歎息於真卿者也噫亦晚矣此先儒所以推明皇之亂不在於祿山之反之日而在於罷九齡相林甫之年也使九齡而常在朝則安知巡逺杲卿之流不由之而彚征而開元之治其復還矣雖然明皇嘗任姚宋矣嘗任韓休張九齡矣其所以用君子而不克終任小人而致大亂者良以居位日久有所蔽惑而然耳故曰為國有九經以尊賢為重尊賢有四事以去讒逺色為先旨哉言矣萬世相天下之法古今之論相道者其説不一以道德言者曰唯大人為能格君心之非一正君而國定此孟軻氏之説而傅説諸人實為之以節行言者曰立天下之大節而後能辦天下之大事此蘇氏之説而伊尹實為之以才能言者曰宰相能否視天下安危此董晉氏之説而房杜之屬實為之以大體言者曰不衒能矜名親小勞侵衆官而獨論討其大經焉此栁氏之説而曹參丙吉之徒實為之夫輔之以道德貞之以節行宏之以大體而經緯之以才若是則於相天下之法亦幾矣而論者猶有取於孔明之四言以為是萬世相天下之法何哉吾知之矣荀子曰臣之於君也無適而非命也無所逃於天地之間也世之人臣類多懷是心焉以事其君故其所以奔走而服勤者要不過相持以分相縻以祿利而非有所謂繾綣不容己之情焉於是乎有曲學阿世躐取髙位而假經術以文其姦者矣於是乎有優遊充位伴食自容而借鎮俗以飾其愚者矣於是乎有重厚可任不學無術而藉粗才以成其功者矣於是乎有剛愎自用妬賢嫉能而蒙主心以行其私者矣如是而猶欲以所謂四言者望之不亦類於持方柄欲內圓鑿也哉吾是以尤夫相道之不立未必皆夫人之過而君子者不能昭之訓而啓其𠂻也夫四言者何也曰開誠心布公道集衆思廣忠益也是道也夫人不能知而孔明知之噫是可以昭萬世之訓而為之法矣今夫所謂相者其上為天子之所仰成其下為百官之所承式其內為萬民之所倚以為安危而其外為四夷八方之所觀望以為順逆去就此其為責亦甚重且大矣傳曰天生民而立之君使司牧之有君而為之二使師保之大臣所以二也而可以姦私且愚者為之哉有志於相天下者夫亦即孔明而法之耳蓋其於昭烈枉駕之初即慨然以馳驅自許厯二十一年而無變度易慮焉曰臣竭其股肱之力不濟則以死繼之其忠精至今可想也是故取益州而天下不以為貪兄弟各一主而百姓不以為二昭烈臨崩有君可自取之言而亮亦不以為嫌何哉惟其誠耳左右昭烈父子立國巴蜀中外之事罔不經理綜畫而於身及家曽不一措念是故容法正用士元而人不以為比廢李嚴廖立殺馬謖而人不以為專何哉惟其公耳至其自表於後主每以攸之禕允等為言而作教與下拳拳於徐元直董幼宰之勤渠曰違覆而得中是棄敝蹻而獲珠玉也於主簿楊顒之諫生既謝之死又哭之其為心何如哉所謂集衆思廣忠益者孔明又自得之矣相天下者不於孔明而誰法哉雖然盡大臣之道宜建大臣之業而孔明猶不能佐昭烈而王何歟此世之以成敗論人物者所由滋惑也要之孔明之可法者相道也而其不能成業者時與勢實為之也君子亦惟其道而已而奚以時勢為哉孟子謂滕君曰有王者起必來取法是為王者師也是知滕不能王而王者之法固存於滕孔明不能佐其君以王而王佐之法固存於孔明矣君子其無以成敗論人物哉管仲致慟於鮑叔君子以其所可必者責之已而不以其所不可必者責之人故屈伸得失一無能動其情焉夫人之難知尚矣人之於我則亦我之於人也我之於人不可必知而欲責人之必我知焉亦常常之見爾夫子曰不患莫已知求為可知也蓋所以求為可知者乃吾之所能自必吾且責已之不暇而暇計夫人之知我與否也與哉然責已之士世不一二而知己之説古今以為口實者何歟噫亦有自矣夫一介之士生於窮巷長於白屋其始莫不頓蹙齟齬困鬱離騷有不能自免於寒飢者一朝遇相知有氣力得位者推挽而遂釋羈絏弛負擔致身卿相彼其視窮厄時不啻若異世事自非大有見者亦安能不為之動心哉夫遇以國士此豫讓之所以死智伯也早不能用急而求之此燭之武所以有辭於其君也士固薄於不知己而厚於知己者故曰士為知已死女為説己容何獨一管仲鮑叔哉雖然古之人無有也其原起於春秋戰國之士奔走形勢其足迹交於公卿貴人之門冀一托身而自售焉得之則揚揚然喜一不遇則薾然悴悒然恨望爾吾聞辨士之善喻者曰驥之齒至矣服鹽車上太行蹄伸膝折尾湛胕潰遷延負棘而不能上伯樂一見而覆以紵衣乃始俯而噴仰而鳴聲達於天若出金石蓋其心誠以伯樂望之人而不量其身之非驥也故郢人死則匠石輟斤而不斫伯牙之琴絶絃破軫而不更鼓者以世之不復有子期爾於乎此士之所以貴知己也而豈知聖賢之所以自處固不若是耶昔者舜固一厯山之野人也堯舉之而位以司徒授以百揆既乃老而禪之天下焉自後世之士得之宜何如其為感而舜曽不以是動其情者彼誠有大見耳仲尼之在春秋周流於齊魯宋衛楚蔡之間車轍幾半天下而曽不一大遇當時之知孔子者魯有孟僖衛有伯玉孔子亦聽之而已夫天生聖賢責任有在而豈區區由一人之私哉吾是以知舜孔之非悖施也故曰養其才天下無窮士成其德古今無棄賢正使一人不知而天下自有知之者天下不知而後世亦自有知之者通塞時也屈伸勢也遇不遇命也而何能舍其所以自信而求人之信汲汲焉為欣戚纍耶管鮑之事世多道之觀仲所自謂見知於鮑叔者曰貪而知其貧也怯於戰而知其為親也三仕見逐而知其不遭時也遺子糾不能死而知其不修小節也甚矣叔之知夷吾也當時射鉤之恨桓有殺仲之心矣鮑叔厯道其五事之賢詐而請諸魯於是解束縛就釁沐未幾而命為卿尊為仲父舉齊國惟仲之聽焉凡其所以顯庸而尊遂者秋毫皆鮑叔力也仲其敢忘諸乎吾則以為不然古之聖賢其心事可以表天日其素行可以質鬼神明白而無疑正大而足以取信於天下萬世故用之臨財而廉用之戰陳而勇用之事君而合用之死生而審其所為其所不為要可使天下共知之耳而何藉於一鮑叔哉不然則鮑叔能知其為貧與親諸不得已之故而其貪其怯其忘君事讐至今猶昭昭在人耳目固不以一鮑叔之知而盡信之也吾是以知聖賢之所以責於已者重而望於人者輕耳世之人類以為名必有所托而後起功必得所主而後成蒼蠅之飛逺不尋丈止驥尾則一日而千里焉其所附然也故馬遷謂砥行立名者非附青雲之士不能施於後世噫亦淺之為丈夫也吾知吾之所以自立而已而又如人何哉雖然夫子固曰不患人之不已知患不知人也管仲慟鮑叔魏之遊雅以嘗失知髙允而自訟云爾蓋當時崔浩嘗謂允之豐才博學一代所推所乏者矯矯風節而雅之心亦以為然然方浩之得罪戰栗不能一言而髙允獨敷析其是非卒有以悟主心而活數百人之族以是而知其矯矯也揖宗愛於王公趨拜之中蓋挺然不為威屈以是而知其風節也况於忠不欺君貞不徇太子義不負翟黑忘崔浩又有知之而不盡者乎此雅之所以悔恨於知人之未明也故嘗謂知已之許在鮑叔而不在管仲不知人之咎遊雅可以自責而髙允不可以責人謹論垂世立教之大典論曰讀大學書而後知聖賢憂天下之深也惟四代之學考諸經可見已其所以引之表儀陳之常道約之以法制使無失其固有者蓋已莫不煥然其大明卓然其有定士之生於斯時者童而習焉終身而勉強焉不見異物而遷焉而何俟乎詔之以言也聖王不作而學校廢前日之所以維持紀綱乎天下者至是而蕩然無復存者矣嗚呼君子以是而悼周之衰也夫大道湮則邪説起正教弛則異學行而人心之壞斯極矣斯時也位不在夫子而道在焉則夫進而淑之人退而明之書吾夫子固無以自逭其任於天下后世矣韓子曰上而為君故其事行下而為臣故其説長噫説非夫子之得已也憂夫教之不立而天下後世將無有不得其門而入者乎將無有荒唐其詞以溺人而使之不自覺者乎將無有艱難險危其説以阻人之進者乎將無有為之不以其漸造之不自其端而終身擾擾焉以求之者乎而夫子之憂滋甚矣嗚呼此固大學之書之所以作也此固朱子所謂垂世立教之大典也自今觀之先之以明德則為格物為致知為誠意正心而修身推之以新民則為齊家為治國平天下述之而為經釋之而為傳而孔曽相與講明之功於是為大矣夷考學記諸篇大抵述其所以教之之規與夫學之之益而入德之方立教之法則舍大學一篇無所於考夫提其綱領而先焉所以為之使其易知也舉其條目而詳焉所以導之使其易從也其進之有序則其施之也不悖矣其為之有本則其求之也不拂矣是故以之為已則順而祥以之為人則愛而公以之為天下國家則無所處而不當古昔聖王之教雖不必其常存於天下而有志者因是考焉亦庶幾其無遺法矣乎吾夫子憂天下之心蓋至是而可以少自慰也人之言曰太上立德其次立功其次立言若夫子者其果止於立言非耶憂以起思思以立意意以立言言以立典典以立教教得而天下後世無有不得其所者矣嗚呼萬世之下其將仰而慕曰吾夫子之德也鼓舞其澤而思曰吾夫子之功也謂果止於立言否耶抑嘗謂中庸之所謂修道所以原立教之本也論語之所謂富而教之所以定立教之時也孟子之所謂庠序學校所以設立教之地也得其本得其時得其地而後舉其法則立教之方盡矣大學所以挈其綱領論孟所以盡其精微中庸所以極其歸趣先之大學參之論孟而復會其極於中庸則入教之等盡矣愚敢以立教之方為上之人告以入教之等為學者告亷逺堂髙人臣而欲導君以尊禮其臣者必先有以伸其尊於君而後其説可行矣何則人之情莫不好自尊大而况於履天子之位居天下之上其自視為何如也其心以為朝廷之上所奔走而趨事者皆利賴乎我者也抑而下之卑而使之彼亦未必不於我乎甘心焉臣之分愈卑則君之尊益甚而吾晏然而位於上信乎天下之一人矣於此而欲導之使尊其臣彼固不能不疑於彼屈而此伸而吾之所以欲尊其臣顧類於欲卑其君者矣夫必先伸其尊於君而後入之説焉則其君樂於自尊而吾之説或始可以動其聽賈生太息於文帝之朝而曰亷逺地則堂髙嗚呼其亦可謂善喻矣其亦可謂善導君矣何者君之於臣非徒以分相使而已也亦以勢相維持云耳記曰刑不上大夫又曰大臣不可不敬也是民之表也古之人君所以必隆其禮於臣豈過卑以下其臣哉天下之所仰視逺方之所觀望蠻夷之所四面而內向者君之下臣而已矣元首股肱言乎其相須也手足腹心言乎其一體也故臣之勢既卑則主之勢亦降勢降則威奪威奪則命犯命犯則政弛于是而有悖逆無上之人焉于是而有僭亂不軌之事焉皆自夫卑臣始也故人主之欲卑其臣而求自尊者亦弗思之甚矣夷其陛而求其堂之崇世果有是禮哉楊子曰周之士也貴秦之士也賤卑臣之説自秦人之作俑也秦行之叔孫通陋儒襲之當時髙祖方自喜其為天子之貴而豈知騎項之態益足為天下笑哉故臣卑而君亦卑矣文帝之時沿漢初而不變者也朝廷之上固有朝縉紳暮縲絏身未違君側已捽而之圜土者區區獄吏豈固貴於諸侯哉而所以使之俯首下氣於牘皆之視者亦辱之深矣嗚呼此誼之所以忿悶而太息也然方當尊君卑臣之時而首倡為尊臣之説焉此其君得無駭而不信耶故啓之以昌言之拜則疑于迂告之以畏相之事則疑於妄語之以伯父叔父之呼則疑於僭誼之為説亦難矣夫織薄之徒吹簫之夫固亦未足多重然既舉而加諸上位則固民望之攸歸也聖人之制禮也豈為一人惜哉廉逺堂髙之説吾故以誼為善喻也吾故以為善導其君也名尊其臣而實所以自尊雖微文帝亦審有必從者矣雖然吾猶惜誼之生之晚也觀漢之俗大抵多蹈秦故而誼亦數推其首禍於秦如教太子如律令刑罰如德色誶語之薄俗不一而足使誼之説聞於始皇之時則庶乎可以深絶其源而不至於甚敝及文帝之時而後救之故所喻者一文帝而已未幾而釋之以名臣死淮南鼂錯以近臣斬東市亞父又以取筯之戅見殺矣彼景帝者豈亦習見夫秦俗之常而不能近守文帝之家法故耶嗚呼吾是以深惜誼之不生於秦也吾是以深惜誼之説不聞於秦也謹論三代遺直士之所以上附於古人者必其能立天下之大節端天下之大本以享天下之全名而一行之稱弗與焉大節者何君臣之義是也大本者何君心是也全名者何德業聞望昭於一時表於後世天下之人仰而慕之而不可以一二名焉者也有大節然後可以服天下端大本然後可以化天下而天下之全名於我乎享焉斯則可進於古君子矣然則非後世之臣三代之臣也嗚呼是弗之盡而徒以一直名焉此吾之所以不滿於魏文貞也是所謂一行之稱豫之而不盡豫者也昔子産之卒也孔子以為古之遺直而後世之論孔明者亦以三代遺才稱之徵之為遺直也亦若是而已而君子何過之深也噫君子之論人非好論人也論諸古者所以訓諸今也吾恐世之徇於直而忘其大節之當立也而忘其大本之當正也而何能為一徵惜耶嘗觀徵之於太宗也糾過繩違諫無虛日賀有唐者衆矣賜之金帛以旌其忠列之屏幛以紀其言方諸鑑擬諸韋弦以須其益不惟徵以直自許而太宗固亦以直許徵當時之臣固有事太宗三十年而無言及獻替者徵其不為唐室之翹楚耶謂之曰三代遺直夫奚議然吾聞之人臣事君有死無二二乃辟也徵也名在建成有年數矣古之人有言曰竭股肱之力加之以忠貞不濟則以死繼之如是而後無愧於天下之大節也玄武之變豈徵也茍生之時乎存而臣之沒而背去之顧僕僕焉為讐人役徵其有靦面目矣田舍翁之殺碑之仆徵固以是取輕於太宗也故伊川謂寧無魏公之忠亮而不可無君臣之大義蓋有以識此矣大節之弗植奚直之云乎至於貞觀之治僅止於米斗三錢外户不閉而不能列於三代之隆甚則內亂之辱外夷之侮更不免後人嗤笑徵固與有責矣君心之弗正而徒區區於行政用人之間抑末也孟子曰惟大人能格君心之非徵其嘗講之乎心之未格是大本之弗端也又何以其直乎哉不然則人將曰是三代之臣也是伊傅之亞匹而周召畢榮之儔也而何止以一直名耶徵之徒以一直名是吾所謂一行之稱豫之而不盡豫者也嗚呼繩之以三代徵固未得為純臣自後世求之要亦未可以厚責也直道如徵善論天下事如徵侃侃焉為後世之所尊信如徵漢唐而下誠亦未暇多見觀人者固當于是乎取節矣故曰論徵之大而責其全徵固僅得為遺直責徵之全而忘其直則愚亦不免有遺論願為良臣古人有愛君之心者知欲與其君相安於無事而不欲自為功以干天下之譽也夫臣之事君其事不一而其心亦不一也彼君安共其榮而國危不與其憂如鄙夫憸人者固未足多誚而乃有幸天下之有事以自名其忠於後世者獨何心哉古人愛君之心於是乎可識矣魏文貞之對太宗也曰願使臣為良臣無為忠臣嗚呼是豈薄龍逢羞比干而竊自附於皋陶稷契之列以夸毗於君也哉觀徵之言者蓋不當泥其截然分别之過於忠良之間而藹然忠愛之旨固當識之於言意之表矣君子之事君也治而相安焉亂而致身焉惟其時而已武子不求生事於有道之朝而於衛成之季獨周旋焉則今日之良臣亦他日之忠臣耳而臣之所以自居者則固不得不去彼而取此徵之言其有見哉去國以逺害誠潔矣弗愛吾君故不忍委身以致命誠難矣無益吾國故不為擇而取之君子於是乎有在徵其不為良臣而將誰為耶上下相安不動聲色使天下隂受其賜而吾無所與其功焉徵之願於是乎畢矣折檻牽裾皆出下䇿而况於剖心之事耶名在我而禍在君徵也其忍言之臣之於君非以其強言敢諫為難而歆之以堯舜使其有好之不已而能常保夫治者斯為可貴也故有稷契皋陶之臣而自無龍逢比干之事使其先有意於地下之從遊而自諉於言合稷契謀合皋陶之未能焉則事變之末吾恐其不免於亡羊補牢之悔而吾身與國其偕亡矣徵之言其有見哉其誠有愛君之心哉太宗初政亦稍可觀而末年志怠弗克有終若徵者糾過繩違諫爭已任輔政得人賀有唐者衆矣韋弦之比屏幛之列庶哉乎言聽諫行者而仁義之説卒致天下於治安者徵尤大有力焉嗚呼徵其可謂不負其志者哉當時如劉洎以堅貞名禇亮以鯁亮著而馬周之論列又表表于時皆不可謂其無意於太宗者而忠良之説均未有及焉則徵又獨有得矣雖然徵有稷契皋陶之心矣而未聞道也格心之學徵其嘗講之耶故當時之治雖小康而內亂之辱外夷之侮終不免為後人嗤笑則徵亦與有責矣况夫翦鬚之意雖美而田舍翁之殺終蓄諸心故鑑亡而碑亦旋仆矣其身之不保而何以能善君之後耶是故欲為稷契皋陶之臣者尤不可不知稷契皋陶之道行沖諸備藥物之末論曰求士者以相成為賢知道者以相濟為務故下之於上也不徇其所長而輔其所短而大人君子之有志於天下者亦每每求其所不足而不安於其所有餘者彼誠知自律也故曰言不期逆順期於利行味不期甘苦期於衛生不然則彼以便柔為佳士此以容容為得計而相濟相成之道亡矣而何以其士為哉夫論行而結交者蚤知之士也虛已以成業者忠正之輔也然世之大臣其佞媚從臾之士常有餘而蹇諤之士常不足成侯之美其不如城北徐公固也而一時客其門下者莫不以為過之何哉蔽於求耳元行沖之於仁傑乃獨有不然者其言於梁公曰明公之門珍味多矣元沖請備藥物之末此豈非能以相濟為務輔其所短而不徇其所長者乎夫以大臣如仁傑宜若可以勿藥矣而行沖之所以惓惓者殆未可遂謂之過慮也美疢不如惡石此臧大夫之所以致慟於孟孫茍惟其愛已之是徇而不知其害焉則紇之涕為無從已行沖其能無意乎今夫上之人所貴於士者非徒欲其遊楊令名譽道功德習為依阿軟美之詞俯仰竦脅諧婉之態茍以取悅目前而鼓脣吻㺯筆墨飾容觀逐班行伈伈睍睍進云則進退云則退者又豈知道之士之所甘心於其上哉然而為羊皮者比肩為狐腋者不一二下日以諂上日以驕而天下之事日以益壞其平日之所以自尊而快意者適所以養成今日之病而已蓋嘗見有富厚之家盛奉養竭滋味煎熬燔炙惟嗛口是務非芻豢莫陳非遐方異物莫御此其視參苓芷术真若辨髦土梗無所用之一旦氣失其平而疾攻其內則其平日方丈之珍九鼎之實一不足濟而牛溲馬勃顧有貴於熊蹯豹胎者矣何者物各有適用各有宜平則養疾則攻此固理身之常道而君子之所以砥行立功者亦若是而已昔嘗有桓侯者方其疾之在腠理腸胃而不治以為醫之好利而誣之耳及其疾深而覺痛則越人之逸去久矣而尚可救藥乎哉吾以是知行沖之不能無意於仁傑也當是之時女主恣睢於上酷吏羅織於下虐熖熏灼以鉗鈇刀鋸待天下之士士之以無辜逮戮者不可選數英才碩望陷疑似而赤其族者相屬也仁傑以區區唐室舊臣處於其間亦危矣夫自其孝之行於事親也廉之著於律身也義之激於代僚友而任患也仁之昭於雪無罪也直之切切於無濫刑無崇飾異端之諫也明之見於舉親也而精忠大節尤有不可以一二言者此非必行沖之心知其無所事藥雖仁傑亦自知之矣獨計以為知者不觀能以速禍忠臣不危身以圖功唐嗣之弗殄繄仁傑是賴茍為不能深自韜晦密其機緩其為而以虛名結主疑以危言賈戮則功不建社稷家先無炊火此固行沖之所深憂也歟此固行沖之所欲隂藥而預防之者歟卒之母子天性之言復而不厭直而不訐曲而不諂柔而不懾而唐之正朔遂復其魄雖其授龍洗光功固有在吾謂行沖亦與有力焉耳矣雖然行沖者藥也儲之者仁傑也藥籠中物仁傑之所儲富矣其所以自醫者有餘矣故一旦出之以醫國而武氏之墨守發焉廬陵之廢疾起焉李氏社稷之膏肓針焉一脈既活大命斯還然後知柬之彥範輩真強劑而仁傑之所儲為有賴也故愚嘗為之説曰行沖之藥不驗於攻仁傑之時而驗於復唐祚之日仁傑之藥不驗於復唐祚之日而驗於授五龍之時謹論擬宋范祖禹進三經要語表伏以學典始終事莫先於稽古道存精一義尤切於纂言爰資時習之勤庶廣日新之益動關君德喜洽臣鄰臣祖禹誠惶誠恐稽首頓首上言竊惟紀言專乎右史六經莫古於尚書立教昉於素王四子獨尊夫論語暨孝經垂訓於千古由曽參請益於一時誦其言莫非洋洋之聖謨資其理足成蕩蕩之王道卓兹經世之典允惟載道之文自堯舜以來其法攸具由周公而下其説斯長顧王政布在於方䇿之間而聖學不專於章句之末欲圖可久而可大莫若易知而易從兹蓋伏遇皇帝陛下聖神立極睿智先天必世久王者之仁因心廣天子之孝庶矣富矣教矣化既無為知之好之樂之學尤有獲兹當聽講之暇聿求守約之方謂三經之淵微開卷有益而百篇之繁悉更僕未終誕命愚臣纂成要語視為朴學奚取漢武之表章托之空言徒陋唐玄之序製及我朝之命講乃更進夫三書至先臣之奮庸亦兩由於半部時將有待道不虛行臣祖禹學本面牆官叨從輦啓乃心以沃朕職未盡於交修資於父以事君忠敢忘於將順肆厪搜輯冀罄愚𠂻或取二三册於一篇之中或得一兩句於數章之內先王之法言德行紀録罔遺聖人之綏來動和規橅具在用塵睿覽仰贊皇猷伏願學每知新人惟求舊恭已同乎帝舜之治率祖體夫殷王之心作之君作之師兆民賴一人之慶長守貴長守富萬年嚮五福之全臣無任瞻天仰聖激切屏營之至謹以三經要語若干卷隨表上進以聞擬進燕享九奏樂章表洪武四年洪武四年某月某日吏部尚書臣詹同禮部尚書臣陶凱謹以所撰燕享九奏樂章進呈者伏以禮洽泰交見君臣之相悅樂由豫奮與天地而同和式昭至德之光用助大享之養九成備奏百辟咸歡臣等誠惶誠恐稽首頓首上言竊惟卑髙陳貴賤之位燕享通上下之情自六典備於周官而賓禮掌於宗伯折俎體薦爰存名義之殊鹿鳴魚麗備見瑟笙之協恩優湛露澤沛需雲慨宵雅之詩既亡而綿蕞之儀徒在漢因秦舊唐襲隋乖擊柱競功臣驕未戢佩刀侈賜君好罔終雖宋宴之歲行第詩章之日褻詎非一人建中和之極孰能百年肇禮樂之興兹蓋伏遇皇帝陛下聰明齊聖濬哲溫恭一怒止戈還綱常於萬古兩階舞羽敷文德於九陔顧功允宜於象成而樂猶沿於勝國淫哇亂先王之雅夷韎雜中國之音將因律以和聲遂命官而正樂德已同乎覆載節必貫乎始終爰分九奏之章庶極一成之妙渙頒嚴命俯及愚儒臣等陋擬魯生聰非師曠繆綴和平之響猥多蕪謭之詞一奏而為本太初之章再奏而為仰大明之曲民初生也品物亨也御六龍也固皆淡而不傷曰泰階平曰君德成曰聖道成亦皆樂而不厭肆惟畢奏在樂清寧泱泱大風未敢動季札之嘆洋洋盈耳庶幾如師摰之初體裁僅别於下俚善美未彰於上德被之律吕聊宣鎬飲之歡間以笙鏞庶續徵招之作伏願聽音而思臣德非獨取其鏗鏘好樂而與人同咸欲聞乎管籥金聲玉振心和時發於氣和獸舞鳳儀今樂遂同於古樂臣等無任瞻天仰聖激切屏營之至謹以所撰九奏樂章隨表上進以聞問張良為韓報讐何如觀古人之忠義者固當體其志於顯然之際尤當察其機於隱然之中夫忠義一心根於天地力之所及何莫不存其見之事為之著者固不能自晦於人人而寓之謀畫之微者有不可遽得而推測此所以顯然者夫人得而知之而隱然者則非有超見而卓識者有所不能知也張良終始為韓請因明問而復之蓋自韓非懷擯棄之忿而隂禍王安之宗吕政縱并吞之謀而首郡潁川之地良也以五世之相韓恥一朝之就滅將欲效臣靡之興夏而無一旅之可資抑欲如田單之復齊而無二城之未下由是弟死不葬而汲汲於始皇之報萬金不吝而切切於力士之求雖其舉事非出於萬全有類乎刺客之習而其忠憤內根於一念蓋卓哉國士之風由今觀之博浪之椎不共戴天下邳之匿幾陷死地此其忠猶未灰也所幸祖龍死而秦鹿失祠狐效姦而罾魚倡亂良也乘豪傑起事之秋奮義士彎弓之志説項梁以求夫韓後立橫陽而為之申徒卒之望夷之誅兆應於嚙驂之虎而霸上之組祚絶於當道之蛇而復讐之心於是乎遂矣方將輔韓成以馳驅而恃之以興復奈何天不祚韓楚復見殺則其讐秦之心復移於楚而為韓之念未改其初是以鴻溝之割甫息楚漢之爭而養虎之喻頓悟沛公之意卒使垓下悲歌烏江授首良之心於是乎畢矣夫其始滅韓者秦也則未嘗一日而忘秦其既殺成者楚也則未嘗一念而釋楚進説於項氏而非為項氏謀委身於沛公而非為沛公計區區楚漢彼豈樂為之臣哉不然則何黃石之編方試而赤松之念頓萌也使成也若在則天下當不在漢而在韓矣故夫康節謂之善藏其用而有取於燒棧之謀伊川稱其儒者氣象而獨惜其養虎之説愚則以為燒棧之謀固為韓也而養虎之説亦為韓也始欲阻之於蜀而歸為韓氏之臣繼欲速其誅項而終報韓氏之怨吁留侯誠人傑也哉擬漢令郡國舉孝廉詔元光元年朕惟周官以六行教萬民以六計弊羣吏實惟孝與廉為厥攸重是固風化之原治道所賴乃者德色誶語之俗稍變秦故越小大臣亦多自飾於簠簋者夫事親孝則忠可移於君亦克施於有政孟公綽之不欲則庶幾為成人焉其令郡舉孝廉各一人朕將顯擢焉以勸來者具茨文集卷八
