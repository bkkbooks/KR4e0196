body:
  text: 具茨文集巻四明王立道撰序送某御史提學校序嘉靖丙申御史某君以天子之命督學於某過予而告之行予因止而觴之既而慨然謂曰夫古之所以為治者四曰井田學校封建肉刑今亡矣獨學校僅存焉耳古之所以為學校者三曰養老用師興賢能今亡矣獨興其賢能而已故賢能之盛衰者學校興廢之所繇也然賢能之盛衰者存乎教教之隆汚存乎人國家稽古建學師儒有専設之官守令有提調之職而又特簡御史以提督之責諸人也然位下者弗尊事兼者罔功則御史之責於是為重以其秩崇而職専耳夫以其崇秩與其専職宜遂有以風一方甄異材彰化而底績以無負於聖天子所以育才命官之意而御史乃或有不然者自予為諸生時歴數御史方其未至也諸生率羣聚稱曰是某也某藩之名士也朝之賢御史也誠屈服之矣至則其賢而可稱者二三耳而其揚揚出入美食安坐徒以呼唱震眩市里者比比也言教而威惕馭諸生若束濕然使豪傑扼擥志士喪氣即有異能不能自表見而若人者又何以能得異能也則學校雖名存不其廢乎今子之簡而為御史也名士也其又簡而督學也賢御史也諸生他日稱賢而可師者子真其人矣然予竊有説焉夫以御史督學校其責誠重然其業則文章也其相與從事則諸儒生也無簿書之勞無錢穀甲兵獄市之擾故其治順矣責重者化易究治順者勢易行而職是者猶或難之夫亦未加之意而已大抵正躬以立其範故士無辟衷審好以定其趨故士無詭習精鍳以程其才故士無惰修隆禮以養其氣故士無卑節如此而復崇之以寛大待之以優㳺則所以成一方之賢能以為他日之用者其功不亦偉乎某曰然是忠告也可書遂書以為贈擬九卿㑹餞少司馬劉公搃制三邉序少司馬劉公傑魁文武才也以天子之命出搃邉事諸公卿於其行觴焉客有言於劉公曰中國與外國異治也内與外異任也民與兵異御也以民御兵則無威以内任外則罔功以中國治外國則亂也夫政以一之刑以防之禮以約束之撫其良而戮其弗若此治中國法也欲以施諸外國得乎是故其治異也上古之将君推轂而遣之分閫而授之其在軍君令有所不受惟是故能行便宜而責成功焉今且兢兢焉畏文吏之繩其後見可而不為之所謀擇利而弗乗其機苟以無事而可其功幾何此以内任外之弊也民柔而易馴令而不犯故可煦嫗字之若赤子然兵驕則不戢威行如流故曰威克厥愛允濟此御兵術也愚聞而疑之曰客之説其見於古而未見於今者乎意者其守而未廣乎夫古者天子守在四夷以為天地所覆載不以其地逺而别異之一道同風雖鳥獸罔不咸若况於外國乎是故限以山川嚴其疆域即政也来而禦之即刑也慕義而朝則撫納而賓接之即禮也奚在其非中國治也夫仁人之兵上下一心三軍同力若子弟之扞父兄何則情有以相感也語曰視卒如愛子可與同生死故威有所必行恵有所必用體其情而恤其私寛繩尺而略小過故水清無大魚察政不得下和此班生之所以語任尚者即将體也况夫邇者狂卒倡禍變至再起雖甫就寧輯而上下之情未孚漏魚逸獸猶累足側目於行伍之間此非崇以寛和撫以恵愛而徒威以鎮之即愚見其不能安也故御兵猶御民治外國猶中國愚以為非異也雖然客所謂内外異任之説則得之矣此李牧之所以成功於雁門而魏尚之所以不能久於雲中者也雖然明天子在上公其可無慮矣劉公聞而是之遂書以為贈送王延亨知道州序余嘗竊疑今之世吏治鮮成績而循良之化環數千里未或一二覩者豈誠長民者皆非其人意亦賢哲之典刑日逺無所感慕以興起而則效之云耳况夫喜怒操縱之任情玩好財賄之動欲不然則束縛於期㑹簿書之繁折困於迎将奔走之勞又皆足以亂其慮而怠其氣乎是無怪乎治理之弗振也夫頺波流俗因循苟且之餘雖賢者或難於自反風聲之所激名教之所裁則雖中人亦知自力於善詩曰髙山仰止景行行止蓋㳺曲阜之里者觀其揖譲與其金石絲竹之和則必不敢為讒慝詭瑣之行吏武城宰單父則必惕然懐言偃子賤之餘澤而隂沮其不肖之心殘賊之政若是者固皆有以啓其景仰而興起其朝夕之思也何則古之聖賢其休光懿美勒諸箴銘傳之圗史猶足以垂憲立則為修徳宣化之助而况乎入其鄉撫其民以日覩其遺躅而想其風烈者乎設革而招之射雖巧拙異藝强弱異力要之未有背的而注矢者其凖立也余同年王君延亨為太學録既滿考冢宰上其㝡乃擢守道州夫道州濓溪周子之故里也而又唐陽公之所嘗治也入其鄉仿佛曲阜之瞻焉撫其民宛乎武城單父之遺焉其所望以為髙山景行以興起而則效之者将不在是乎其於為政也有的矣他日聞有治民如家拙於催科而勤於撫字者必道之治也推所學以淑斯世厚於得民而惸婺咸被其恵者亦必道之治也王君文雅而明達才足以充其志有堅慎之操其教蕪湖教太學皆籍籍有聲其往而紹二賢之休不逺矣且陽公之為刺史也自太學往而君亦以太學往其迹又有甚類者惜余服官史局不能相從以徜徉濂溪之上而咏歌其風月也於其别是故不能已於言擬諸公卿郊餞少司空林公遼東勘事序迺嘉靖乙未遼陽廣寧士卒相繼困辱撫臣亂我天子邊事事聞天子曰是必不皆亂亂且有原朕亦何憚用師顧弗忍以數悍卒故横傷我無辜民古於夷蠻戎狄猶不妄斧鉞况兹守邊士何非朕赤子弗一訊而曹誅之亦弗忍也惟爾左右臣其姑為朕往省諸於時大臣疏四三人以請天子曰命某則我少司空小泉林公也公行諸公卿咸出祖張上東門外酒未半有執爵而言者曰古者兵無官蠻夷猾夏寇賊姦宄乃悉以屬士師其在唐虞則臯陶其人也命詞曰惟明克允天子欲復唐虞之化以臯陶之事屬公公其祗哉或曰是固未盡司空在漢唐為三公官唐憲宗討淮蔡惟時裴度以司空往視師蔡平乃入鎮撫其人蠲徳滌罪除蔡之苛法與俱新蔡人恩之故昌黎作碑多其功公司空也天子其以晉公之任授公使公廣延周咨相擇便宜綏兹遼土罔不底定用㜶晉公休或又執爵而言曰今天子考禮定制一𢎞前模五材彚集百工飭作公之攸司實於是乎在乃釋此而以境外之事屬公此天子知公擇能而使也公其朂哉或曰是亦未盡若知司空之職乎其大在居四民時地利其細在董繩墨規矩使中則禁竒衺使無非彛懲㳺惰均稍食使安分守辨其良賤與能不能使無枉才若是則天子之所以命公者可知也其欲公以是而施諸遼人乎是行也布令宣化使耕㕓出入咸復其所則四民其居乎修其疆理燮其隂陽以宜其土俗則地利其時乎申國家之憲令犯上者誅首禍者族有常無赦其諸規矩繩墨以正之者乎昔之呌囂而跳梁者咸屏息受約束莫復敢有佚志焉其諸禁其竒衺者乎獄必以情誅必當罪刑其故而宥其小過殲其渠首而不及於非辜若黒白一二截然無差其諸辨其良賤與能不能者乎修屯田之利驅其卒使𨽻農冬夏衣廪予無失時其諸懲㳺惰而均稍食者乎若是則天子之所以命公者可知也公遂起而應曰然某其敢不敬共天子之命若臯陶裴度之事竊非某所及也請書之遂書以為公贈賀邑侯萬楓潭奬勸序夫史所以勸善而懼淫也古者列國各有史官若丘明倚相之儔卓哉邈矣漢以来乃獨稱司馬氏是時郡國上計先上太史用能網羅放失㕘以石室金匱之藏以明天人之統覽得失之故闚興廢之端綜禮樂之用勒成一書垂法来世盖非特子長之良於史抑亦有所考信博而能徵者也我國家倣古置官其於分職詳矣每嵗臺臣疏其屬而廷遣之以代時巡比竣事乃以其所受命復而一方之治緩急進退藩臬郡縣之吏賢愚才不才皆料簡其實而以聞於天子然則今之太史日執筆天子左右其於四方之事可無須郡國計上而知而内臺之屬其職與太史常相通為一故譽成則番君以永其芳訾行則屠伯以流其惡榮辱止乎其身善滛垂於千禩斯國家所以馭世之大權而正百官之軌也余竊恠子長之史漢興已七八十年而循吏一傳獨靳靳焉豈亦未得其人歟将郡國所上有遺徳歟夫以一計吏之㣲其好惡取舍良亦無當而遂欲書而傳之此遷之所慎而不敢也不然則計簿具文安得獨弊於孝宣之世乎今内臺天子所任耳目之臣職親而權重故其情必有所不忍負出有諭告之詞入有糾察之令故其志必有所畏以有畏之志挟不忍負之情則其道常直而於言信此其所論賢愚才不才正太史氏之所宜考信而書之以為天下勸懼者也楓潭萬侯以嵗庚子來令吾錫潔㢘恵和有古循吏之風踰年民安其政士服其教侍御歴城趙君是用表章其賢以勵屬邑而余適䝉恩歸省又深知侯盖喜侍御之得人而能為史氏助也夫以采摭於郡國之吏既不若内臺之可信而内臺之可信則又不若親得之於所見聞此余之於侯所以不容無言已他日復歸執筆書一代循吏非侯其誰與惜乎余無子長之文而病其弗傳也趙君嘗儲英中秘有館閣之雅其必更以是諗之諸同志者擬六卿送衍聖公慶賀禮成東歸序予自童卯誦法夫子竊幸吾夫子之道之行雖不能及其身而卒以淑萬世既得備觀載籍又益幸吾夫子之道不獨以淑諸人而因以澤諸其子孫盖古今稱世家者率推先孔氏而孔氏亦世有聞人以無隳吾夫子教者子思而下可數也其在戰國時則有若齊相白時則有若魏相子順時則有若秦博士鮒之非吾夫子裔耶其在漢時則有若大将軍延年也太常臧也大夫安國也僖也褒也融也之又吾夫子裔也其在唐時則有若昌㝢也振也巢父也戣也戡也温裕温業也之又吾夫子裔也吾所知知猶未如孔氏加詳然亦皇皇乎盛矣諸凡徳業聞望與其履歴之終始今具在史氏曰某為孔子如干代孫者無虚䇿焉噫蔑以加矣予又觀歴代所以象賢之典至宋愈盛而孔氏子孫之望於宋者不加多或不及焉者抑又何哉此殆氣數適然也然猶有若道輔者若傅者若端者兹亦未為乏人矣我國家稽古右文髙皇帝闕里一祀為萬代首政儒道之振於今烈焉繼復建爾上公永世無極至於列聖之所尊崇皆視宋殊絶然而孔氏輙又不得如道輔者二三人以其直道正節出為朝廷光又何也予觀今世之人雖甚强戾無道然入吾夫子廟而覿其遺像未有不肅然敬者士有道鄒魯之風雖愚無知聞之輙欣然向往何哉道固然也今天下不問海内外竊吾夫子之緒教以顯其身以為朝廷用者何可指數而孔氏子孫顧獨泯泯豈皆服吾夫子之道以自淑已乎保身全名以養髙而無當世意乎見今世仕者僅以希世干祿謀身及家而恥與俱乎抑時未可乎遺世獨善其殆非吾夫子意也不然其亦可以出而仕也况今天子更化善治方大有為雖庸才下位皆知自奮䇿而孔氏子孫顧獨不一見其又吾夫子意哉今公之自京師而歸也其既有覩矣歸且為諸孔氏子若弟言之矣其當有奮而為朝廷用者視漢唐兹僅僅矣予固将慶孔氏之有人而又以賀國家之盛治也扵是乎書以為贈送李大夫擢貳松江序余暇過全子汝禮而語政全子曰今之郡縣猶古也而州非古也其必兼置之何也余曰是難之也盖其地阻要而民雜或夸竒負氣以縣則權輕而下玩之以郡則賦弗給也故中而為州者難之也其長吏必秩五品爵大夫有郡之權而奉上之費不大侈於縣庶㡬俗定而財易供全子曰今之序最而陟良者率自州長史而使貳郡則位益崇然而失専達之職矣夫専達者制宜而掣肘者妨政位崇抑亦有崇任焉是優之乎曰優之郡猶州也諸錢榖訟獄爼豆軍旅與文移賓使之往来必其長吏身之貳之所事事成事爾或疑而以諮㳫而分之理者無㡬也而毁譽成敗又弗貳責焉是其勞逸難易相什伯矣夫佐鬬者不賁諸而勝其掎角易也佐庖者不易牙而調其割烹易也而謂不優之可乎是故任不期扵小大期於得職政不期彼已期於宜民全子曰然則吾鄞有李大夫者仕而守易易劇州也其難與邇擢而貳松江矣松江大郡也其優之與曰然古今人言勢理相遼絶者必曰燕越何則其道逺其風氣殊其嗜欲亦殊若參商然雖今之易非古之易不猶有荆卿之流風乎其慷忼悲歌不猶有丹之遺教乎抑畿之内州也畿之内州其錢榖訟獄爼豆軍旅與文移賓使之往来颷至雨集毁譽成敗朝舉而夕上徹其不與他州等明矣而李大夫又鄞士也越人而燕庸之不甚哉其難歟全子曰夫松獨非畿之内郡乎哉余曰不然南北之殊久矣生同聲長同情可以達言語通飲食者惟吴越則然故以越治吴辟之以水治水也雖畿之内郡固習之也而又貳焉㣲李大夫之才且賢吾猶宜之迺今以李大夫往不猶以賁諸佐鬬以易牙佐庖者乎甚哉其優之矣全子又曰夫李大夫老成而敏特是其在易也多殊政焉蔽寃獄堤決河崇儒術盖三載而旌而明之者相望也是可謂能易其難者矣而以貳於松雖李大夫有弗自信其優者歟其行有弗樂者歟迺其僚陸君方為請贈言於予予病未有以應也書此遺之可乎曰可玉河小稿序玉河小稿者予同年吴水部子誠所為詩若文也吴居玉河之壖與予宻邇故稿名焉我皇上綂御肇修典禮罔不惟古之稽鴻規懿矩丕振百代惟兹臣工亦罔不殫慮罄力奔走承事盖大者郊廟其次宫館池籞翼然並新于時冬官之屬視百司為難而選任亦重必擇强幹明敏有心計者迺能其官而子誠又久試政遂擢主水部既拜命諸吏魚貫立庭下持紙求署貨有局材有場賈輸商販輦積以須惟時良苦雜入並緣為姦或依倚權貴請屬無厭根盤絲棼不可以耳目理不可以軌法裁又百工旁午月㑹日給斂有度而散無恒攻木者徯斵設色者需繢一不繼則主者以為玩慢不舉職間有所糾讁以警動其餘吴子用是益恪勤於官出入恒無寧暇時然性獨喜為文辭懇懇不懈夫文主於志輔於氣志定而氣完則其思不涸其詞雍容蔚然而有章粹然而不叛於道今且求之龎雜倥偬之中其成鮮矣余竊觀世之學者其始賾探竒搜皇皇然日若不足騖精㳺神擷華摛英期以文章名家追古作者一出身仕輙盡捐其所業不啻弁髦何哉彼其志氣思慮誠有所拂亂而沮奪之也又仕者率尚吏事厭文學或操觚簿書之間以詞藝自見則衆皆指目之矣今子誠既已陟仕籍官劇曹不為所拂亂沮奪以捐其故業而其蔚然粹然而可觀者皆得之龎雜倥偬之中夫人所優㳺以求之而不能至焉者也於乎是可不謂好學而文篤志而有立者哉時子誠門人某将梓其文以行聞余言請書以序玉堂麗藻序玉堂麗藻者沈君徳夫合同館諸君子所贈行之詩而名之夫詩之作也所以咏歌嗟歎以抒其中之不平者也非是則無所為詩今國家清夷衮職靡闕而徳夫以諫臣久次進丞大理於南寺以秩則卿貳於司諫為崇以務則請讞於封駁為簡此天子所以旌言責之臣而優其敘者也而吾同館諸君子迺猶有不平於中而不能已於言者何哉惟皇上御極十有四年乙未既廷䇿多士而賜之第矣復親試於文華殿拔其什一發中秘之藏羣四方之彦以資其多聞而淬勵其徳業其㳺未嘗晨夕間盖驩然甚相得也又明年乃各授以職前後職諫垣者凡七人徳夫與焉然不三數年五人者已相繼補外其猶得以正言直氣與余諸史氏日執簡天子左右者惟徳夫與任君登之二人而已則諸君子於徳夫之徃也雖其秩崇其務簡知天子将由是而遂大庸之而於聚散盛衰之㡬能不重有感於中而慨然為之不平矣乎是故其辭和而不昵怨而無誹有悠長之思焉其所發者真也抑金陵我皇祖之所經營環長江以為帶鍾山石城嵂屼而盤踞俯秦淮之清流覽其土風六朝之墟於是乎在前瞻牛首矯若天闕徘徊東山憮然安石之想憩鳳䑓臨鷺洲而悵太白之雄才不復作也則所謂江山之美觀㳺之樂又孰有如金陵者乎余江左人也往嘗數數為諸君子道之未有不躍然願往者而徳夫顧又獨先焉丞之職於諸卿佐既若無所事事而地之所遇又足以寄其耳目而適其餘閒此尤諸君子之所深羡也語有之在心為志發言為詩諸君子寤寐金陵之勝而不可得至故因其不平之懐而并發之其於江山之美觀㳺之樂無不三致意焉盖詩之志也乃徳夫固曰啟諸君子之志者余也授之巻使序其端送同邑張掾序文中子曰吏而登仕非古也愚竊以為不然古之官人惟才是索不問其類雖以春秋戰國之敝而此意猶存故管夷吾取盗二人趙文子所舉於晉國之士七十有餘家皆筦庫也吏而登仕不猶愈乎後世有亷孝明茂之科至於品以中正制以策舉崇以生徒進士蓋其用重則其取嚴故非其類者徃徃見擯於流品所從来舊矣而非其類者亦輙謂清資要秩没身不復可致多不自貴重顧藉故士益尊而取之而用之其法益峻其指益嚴其雜流不得與士齒者獨吏乎哉然則吏而登仕猶古也其擯而不叙者非古也國家法古為治官人以才非類者多得效用故吏之仕其途稍廓焉予觀今天下之大若藩臬若州府縣其在州府若縣者又有若學校倉徼傳獄之㣲皆有吏其滿考無過者皆得至於京師其在京師若館閣以至於部府寺監凡設官之所又皆有吏其又滿而無過者則遂得官帶歸鄉里計日而得官焉蓋其人非必雄俊明博苟僅如中人者他日皆一官也然予觀今之吏其自藩臬府州若縣學校倉獄傳而得至於京師者常什一其自京師若館閣部府寺監諸設官之所而得冠帶以歸其鄉里者常什九何也譬如為山其功已半則必不肯舍其積年之勞而苟於一旦至於冠帶以歸其鄉里而猶不得官者宜又寡矣此則猶一簣未成而棄之也而或者猶為之夫以積年勞之一簣未成而棄之其愚智可知也已故書之以為吏朂使無以非類自嫌以一簣棄成功也老子煉丹圖序夀陳翁志槐六十老氏之説與吾儒異指而為長生久視之學者多祖之然古之所以長生久視者修其身而已後世乃有吹呴呼吸之法以吐故而納新又其後也則為黄冶變化陋矣黄治變化云者今之所謂丹也吾鄉陳翁志槐年六十適自江南来視其子户部君於京師户部君謀所以為夀因得所謂老子煉丹圗者夫老子信古之得道仁人長生而久視者然余觀聃所論道徳五千言以及荘列諸子之所稱述皆修身之説耳今此圖一翁䪻顙而孺子色凝然盤屈坐目光内注息深深若有所俟而其旁藥物水火烹治之状種種具者謂所煉丹也則無乃有不類者與取世俗之術之陋者而附麗古之真人此方外之士神其説以眩天下不足論也然圖者之意抑有可得而推者老子之所謂丹豈夫黄冶變化之謂哉一以持之精炁神以和之是其物不假於藥石也嗇以治人事天慈儉不敢為天下先以為寳是其用不資於水火也虚静以觀復雌黒辱以為守無為以為為是其功非有烹治之節度也由是極於道徳妙於𤣥反其嬰兒而老子之丹於是乎在矣斯所以能長生而久視者也然道徳之屬不可得而圗也圗其所謂藥物水火烹鍊者而象之則頌禱之義其有章乎蓋余嘗見世所圖彭祖觀井者既寘木井上縱横若積而復絙其身於旁之大樹此豈誠然哉明祖之愛重其身若此耳聃與彭皆養生家所宗今其圖亦大類求聃以丹求祖以井二者皆失也觀者要得之象外而已余又觀陳翁貌古而氣和愿而能仁其意謙然不競於世其容寂然不擾於欲年既六十而視聴步履日以聰明便利蓋已庶㡬能修其身者而余又申之以圗之意焉翁将犂然有當於心則益求老子之丹而服之則於長生久視乎何有此亦户部君之意也余與户部君同年而戚故為推而序之且以質之諸歌詠者萱節圗序俞君汝成既第進士将遂以是嵗夏六月乞差便省其友為繪萱竹為圗系之詩歌使歸以夀而以稔於予予曰善頌者必取類取類者必依其似頌而不獲於義君子以為謟且誣也昔者屈平之作離騷所稱多荃蕙蘅蘭辛夷杜若南國之詩取蘋蘩焉夫有明信之志必象其潔而山谷澗溪芳烈之物於幽人之貞固宜之今斯圖也而以夀逺於取類矣曰不然汝成兄弟蓋㓜而孤母楊屏處一室中伶仃寒苦無族姻之托又仰有舅姑日藉以共養提五七嵗童子而與共門内外之事生人之憂莫惨於此矣然母以貞信之操持之廿餘年而無貳慮生有養死有𦵏賓婚百需十指具給字二子而教之曰必毋隳乃父之訓雖丈夫之節不烈於此矣今汝成獲第而歸也驅車而入里閭聲光燁燁動人耳目冠帶珮舄上堂奉巵酒為夀母子相歡視廿餘年所經已恍若隔世事其伶仃惸獨之憂有不遂釋然者乎鄉人之相與語曰此某之孤也而母之節益大章明於時夫世之言忘憂者必於萱言節者必於竹則斯圖之所取類也舍二物其奚以哉抑竹直而不倨外澤而中虚形中規聲中律吕蓋風人嘗以比徳於君子焉母素善教夫既以節自成其身其又将益充其類成汝成以君子之徳而終其令名不然猶母之憂也而安能忘諸予既與聞斯圖之義㑹汝成以序請遂次第其語而書之趙東浦暨吴安人雙夀序上海趙翁於嘉靖戊戌為七十之年厥配安人吴如之而加二焉先是子成将歸為夀於誕辰以語其同年王子王子曰嘻夫禮行於朝而民若徳禮行於鄉而民肅敬禮行於家而民作孝黄唐養老之政邈乎罔質之矣記禮者率於虞夏商周詳焉而首曰有虞氏有虞氏則四代其昉也先王所以一庶政殖兆民風四國淑百世者皆於是乎基之是故其化逺其澤思於無窮則養老之禮隆之矣禮失而治衰故天下有遺年者於以期民之孝敬而若徳不亦難乎四代上庠更老之政後世既無以稽之猶幸或存者惟鄉飲禮耳然今之鄉飲非古也其輿合而齒尚盖仿彿先王之意云故賢者修之以式治衆庶則之而成教仁孝興行始乎鄉達諸天下繇此其訓也孔子曰吾觀於鄉而知王道之易易也不其然哉不其然哉然今郡邑不皆良大夫則鄉之舉也往往賓夫愿人耄老而几豆之或儒衣冠而閭市行者顧軒軒然西北位斯徳而齒者有不欲揖譲其間而其究亦為虚文耳矣夫老也養不於朝齒也飲不於鄉則孝子之欲親其親老其老者始各謀其時以為親夀而比黨之人因合㑹羞飲焉以重其年蓋朝失而索諸鄉鄉失而成之家其流然也矧今天子躬化導民明詔毎下輙求天下之老肉帛之而有司又時舉飲於鄉以祗徳意布常憲所謂朝與鄉之失殆稽古四代之政而漸𣸪之矣又奚家焉之足云夀矧今有位於朝者率以滿考或未滿考而天子下推恩之令例皆得封錫於其父母子成既有位矣而親之年適又相值也其尚冀朝夕獲封以為親榮昭天子之寵命而曷為以私是圖抑亦使里有慕邑有漸焉家是以各親其親人是以無犯齒其無乃非飲食之謂嘻是教之寓也夫能不忘君寵忠也舉以榮親孝也有親親之教焉仁也一事而三物成謂此類也夫既趙子以請乃書而歸之勅封孺人茹母楊氏七十夀序余觀天地之氣屈伸消息猶循環之無端故其散於萬物也厚薄盛衰遲速强弱亦雜出而不齊夫豈獨氣之不齊将造物者亦有所靳而不輕畀之以其全與抑亦使人有不可測者與故或厚焉而薄或衰焉而盛其遲速强弱也亦然有得失之機有終始之變語曰松栢之下其草不殖此得失之機也易有泰有否有剥有復此終始之變也夫寒暑晝夜自天地猶不能以常而况於人乎是故智士觀物而知㣲賢者持盈以慮逺不强其所不可齊亦不妄意於其所不可測而修已立徳以俟其自致則造物者之於我将亦有輔其所不能增益其所不足以厚吾終以大吾之所得者矣噫此果造物者之有意與抑其理然也吾鄉茹君節菴嘗以英才偉志有聲庠序問比登甲科為名進士筮仕為良吏而棲遲於州縣之職藩臬之佐者若干年不克竟其所施設窺其意常若有齟齬詆挫之疑嫉俗之憤而人亦數數為君弗平然至於今而君之家聲日益光大有孺人之夀考焉有三子之負荷焉有諸孫之繩繩焉則夫所以棲遲齟齬於君之身固造物者将有以厚其終大其所得而故靳其全示人以不可測者也夫以君之才力使少自矜飾或有所附離如今之人則其仕未必不即達其歸而休也未必若是遽然挟其能以與造物者争衡則所謂天定勝人之説将必有在其身之不能恤又安能以其餘遺其身後而啟無窮之休耶信乎氣之所鍾必鬱而盛物之所虧必有待而完以吾觀於茹氏蓋鬱而有待者也其澤未艾也嵗辛丑三子者民澤民望民瞻以孺人夀七十徵余文以祝余聞孺人宦族子事節菴君夙有婦道又慈恵善訓諸子孫皆雍雍觀法其致夀考盖又非偶然者故為書是説以歸之使知節菴君之善遺而孺人之得於天者方未已也擬重刋文章正宗序夫自孔子没而斯文湮六經之道熄而㣲言絶數千百年之間所謂鉅人宗工以文章鳴者盖彬彬焉然而盛衰存乎運醇疵存乎道精粗存乎功則其髙下取舍殆有不能逃於尚論者之權衡矣今夫三代皆文人六經皆文法而君子以為不然豈非至文不華徳立而言該者哉是故其中粹以和其外燦以光不期於文而天下後世莫復以文爭雄焉自今觀之或播告以暢㫖或敷陳以析義或紀載以該往或咏歌以揄情㫖暢則民可明也義析則變可盡也往該則故可覈也情揄則志可章也然豈有意而為之哉如日月之光華如星辰之經緯繁麗如雲霞朝夕之瓌竒絢赫倏忽萬状莫非自然而然故聖人之文天之文也乃若後世之所謂文者吾惑焉非絺繪藻飾悦耳目以為佳則或剽盗陳言熟爛可厭非窮探㝠搜為荒唐不經之語則鄙俚而無足觀而不然者又或鉤章棘句竒澀聱牙險讋神鬼髙嫓皇墳務以劌目鉥心駭眩愚俗而實則假艱深文其淺近夫是以言愈工而道愈離作之愈多而不可以為文之正也豈六經之外三代而下獨無文乎抑亦氣運致然人不得而與也雖然河海之深挹流者不一源而取潤日月之照遡光者隨小大而皆明聖人之道猶之河海日月也故學術之士詞藝之賢以其明資博識宏才雅思操觚搦管亦往往而有得焉雖醇疵異致精粗靡一苟掇其精而采其醇要之不詭於六經云爾斯於河海為正源於日月為正明而聖人之所不棄也然代存制作家傳簡冊汗牛塞宇實浩以繁懼覧者或昧焉矣迨宋儒真徳秀氏乃獨於兹而究心焉於是盡取古人之文自春秋以歴漢唐掇而采之於詩則又上及順則之謡解阜之歌以詩書所軼存乎古也序以世次體以類分而搃其凡例有四為辭之不可以已也故首之以辭命為議之可以見天下之心也故次議論為古記事之别有史也故次叙事為詩所以言志也故以詩賦終焉夫則其辭命可以明民法其議論可以盡變效其叙事可以覈故模其詩賦可以章志四體具而天下之文無餘法矣而必皆依於古不繆於先王合於六經而庶㡬哉為載道之作夫是以殊世並美異人同工麗而不靡近而指逺髙不淪於虚竒不過其則約而盡豐而弗餘一展巻而諸子心之精言之華皆於是乎在間又識其下方以明取舍之意而搃其集以文章正宗名焉於乎是可以見西山之用心矣曰宗者以見其猶日月之明河海之源曰正者以見其非旁流末光而天下後世之欲為文未有不由之者匪是悉邪也不可以為宗也是以至於今而業文者宗焉其利博矣顧其版久漫缺訛舛則亦未便覽觀遂出而重梓之而書其説以序擬金臺八景詩序夫金臺古幽冀之域我太宗以神武紹業用定厥都是誠上㳺之地而天下之首其山川綿亘逶迤盤峙兀業内拱外障風凝氣結入而守之足以朝萬方壮皇居出而用之足以震逺邇撫戎狄殆天設之以貽我國家使建不拔之基以恢千萬世之業者也夫負百二之險其地固乗建瓴之勢其形便地固形便斯王者之所以制天下而威不軌者也周詩有之曰瞻彼洛矣維水泱泱在商頌曰商邑翼翼四方之極夫是以能固家室而保後生焉豈非其處勢使然哉予始至京師得觀所謂金臺八景詩者竊怪其不能揚國靈頌皇業而區區於雲山雪月之觀㳺望之樂咏之歌之其無乃非商周詩人之意也乎噫是可知也夫務徳者遺險守道者忘力故盛世多逸情危時無易語昔召康公作詩於成王之時其首章曰有巻者阿飄風自南此固不聞其有誇侈之情而張大之語而今莫不以成王為令主康公為賢臣者何哉惟其時而已我國家隆徳顯治方将逺駕唐虞成周之治歌似有所不屑焉者然存此詩以備採擇亦以少續巻阿之歌云擬重刋大學衍義序六經羣聖人之作後之言學與治者必稽焉學殊方而協一治亦異則而同歸盖雖有内外本末而實相為終始體用出入未有語治而不根於學語學而不及於治者也然不繇其序則渙而無紀不繇其要則雜而易荒孔氏大學一書所以為之序而掲其要也夫吾夫子之道即羣聖人之道而吾夫子之説亦即羣聖人之説自曾子傳什已不能外六經而更為之辭其曰克明峻徳曰作新民曰於緝熙敬止曰宜其家人曰於戲前王不忘皆六經説也亦足以見聖無異道道無異説大學乃六經之搃㑹而吾夫子盖羣聖之大成顧夫子之經既宏大簡約曾氏之傳又加詳該焉自宋儒真徳秀氏衍義作而後六經羣聖人之道大學孔曾氏之心學所以為治治所以必本於學先后之序施為之要於是乎粲然益明且備矣舉而措之誠足以為君人軌範時以交疎於君乃不克卒究其施至今尚論宋治猶復為之扼擥惟我聖祖繼天立極方兵戈倥偬日不暇給獨於是書心好而表章之適内殿落成即命侍臣書之廡壁便顧諟也其所以上繼列聖之綂而啟我國家千萬年之治者要未為無助已皇上緝熙聖學日就月将方将以明徳之藴大新斯民其於大學之道固躬行而心得之矣顧板刻舊汗漫不足以備乙覽遂命重梓焉以遺来世蓋一舉而我皇上稽古之學法祖之心裕後之規純王之治皆於是乎在是用記之以揚厲於萬一若夫其綱二其目十有二其目之詳十有四本書具存兹不重錄擬送太宰汪公致政南還序所謂大臣者以天下為公不以毁譽榮辱不以進退欣戚而其心常恐恐焉觀庶官之得行其職與否以測國家治亂之機而因以為已榮辱欣戚盖庶官之職不同而要無外於官守言責二者於言責而得其言此尤國家大治之機而公天下者之所甚欲也何則維辟作福維辟作威其爵之祿之廢之置之殺之生之予且奪之蓋莫非一人之權而天下之所奉行而弗敢逆者而諫官者乃欲奪其所予廢其所置屈萬乗之尊以從一介兹非有囘天之難者哉古之昏世庸辟保囘暱奸其所崇長信使雖以刀鋸之餘優伶之賤阿保乳媪之㣲其臣且不敢言或言之而反以為僇而况於左右之大臣素所信任者乎今太宰大臣也天子之所信任也雖有大故不可其廢去宜出自天子而今乃以四三諫臣言輙至致政去是諫官之得其言而國家大治之機也吾意太宰有公天下之心且将以為大賀焉而不復以已之毁譽進退為介介也且君子能必已之無媿而不能必天下之無言故有䝉負俗之累而安受不韙之名而處之若不聞也者其心有以自信而知天下之必有能知我者也傳曰心苟無瑕何恤乎無家晉王昶有言使已有可毁之行則彼言當矣使已無可毁之行則彼言妄矣當則無怨於已妄則無害於身昶非知道者猶若是吾又益知太宰之能自信而無恤乎天下之有言與否也古之愛君者殺其身有益於君則為之況廢其身以善其君乎太宰其有見矣不然以一大臣之去宜不能無怏怏者而太宰不然其所惡有甚於去也太宰行予與祖焉因推其意以序具茨文集巻四
